    // Hilfsfunktion: Szenen-Liste in Array-Reihenfolge (frei verschiebbar)
    function renderGruppierteSzenenListe() {
      // Falls keine Szenen, Hinweis zeigen
      if (state.szenen.length === 0) {
        return '<div class="text-xs text-gray-400 p-2 text-center">Keine Szenen vorhanden</div>';
      }
      
      let html = '';
      let lastGruppe = null;
      
      // Szenen in Array-Reihenfolge durchgehen (NICHT sortiert!)
      state.szenen.forEach((s, idx) => {
        const gruppe = s.gruppe || 'Ohne Zuordnung';
        
        // Gruppen-Überschrift einfügen wenn sich die Gruppe ändert
        if (gruppe !== lastGruppe) {
          html += `<div class="text-xs font-bold text-gray-400 uppercase px-2 py-1 bg-gray-100 rounded mb-1 mt-2">${gruppe}</div>`;
          lastGruppe = gruppe;
        }
        
        html += `
          <div class="szene-item ${s.id === state.aktiveSzene ? 'active' : ''} flex items-center group" 
               draggable="true"
               data-szene-id="${s.id}"
               data-szene-idx="${idx}"
               ondragstart="onSzeneDragStart(event, '${s.id}')"
               ondragover="onSzeneDragOver(event)"
               ondragenter="onSzeneDragEnter(event)"
               ondragleave="onSzeneDragLeave(event)"
               ondrop="onSzeneDrop(event, '${s.id}')"
               ondragend="onSzeneDragEnd(event)"
               onclick="selectSzene('${s.id}')">
            <div class="drag-handle" style="cursor:grab;padding:0 4px;color:#ccc;font-size:12px;user-select:none;" title="Ziehen zum Sortieren">⠿</div>
            <div class="flex-1 min-w-0">
              <div class="font-medium text-sm">${s.nummer}</div>
              <div class="text-xs text-gray-500" style="word-break: break-word;">${s.titel}</div>
            </div>
            <div class="flex flex-col gap-0.5 opacity-0 group-hover:opacity-100 transition-opacity ml-1" onclick="event.stopPropagation()">
              <button class="text-xs text-gray-400 hover:text-blue-600 px-1 ${idx === 0 ? 'invisible' : ''}" onclick="moveSzene('${s.id}', -1)" title="Nach oben">▲</button>
              <button class="text-xs text-gray-400 hover:text-blue-600 px-1 ${idx === state.szenen.length - 1 ? 'invisible' : ''}" onclick="moveSzene('${s.id}', 1)" title="Nach unten">▼</button>
            </div>
          </div>
        `;
      });
      
      return html;
    }

    // ============================================
    // TEXTBUCH VIEW (v1.2: mit Streichungs-Button)
    // ============================================
    function renderTextbuch() {
      // Sicherheitsprüfung: Wenn keine Szenen vorhanden, automatisch eine erstellen
      if (state.szenen.length === 0) {
        const startSzeneId = genId();
        const startSzene = {
          id: startSzeneId,
          nummer: '1.1',
          titel: 'Start',
          gruppe: state.projektMeta.eigeneGruppen?.[0] || 'Erster Akt',
          ort: '',
          zeit: '',
          zusammenfassung: '',
          figuren: []
        };
        state.szenen.push(startSzene);
        state.textbuch[startSzeneId] = '<p class="format-standard"><br></p>';
        state.aktiveSzene = startSzeneId;
        saveProjektDaten();
      }
      
      // Sicherheitsprüfung: Wenn keine aktive Szene, erste Szene auswählen
      if (!state.aktiveSzene && state.szenen.length > 0) {
        state.aktiveSzene = state.szenen[0].id;
      }
      
      const szene = state.szenen.find(s => s.id === state.aktiveSzene);
      let content = state.textbuch[state.aktiveSzene] || '';
      const szeneCues = state.cues.filter(c => c.szeneId === state.aktiveSzene);
      const szeneFiguren = szene?.figuren?.map(fId => state.figuren.find(f => f.id === fId)).filter(Boolean) || [];
      
      // In Technik-Ansicht: Cue-Marker im Text anzeigen
      // In Änderungen-Ansicht: Diff gegen Referenz berechnen
      let displayContent;
      let diffResult = null;
      if (state.textAnsicht === 'technik') {
        displayContent = enrichTextWithCueMarkers(content, szeneCues);
      } else if (state.textAnsicht === 'aenderungen') {
        diffResult = computeDiffHtml(state.aktiveSzene);
        displayContent = content; // Fallback, wird unten überschrieben
      } else {
        displayContent = content;
      }
      
      // Inline-Regieanweisungen in Dialogen markieren
      if (state.textAnsicht !== 'aenderungen') {
        displayContent = wrapInlineRegie(displayContent);
      }
      
      return `
        <div class="flex-1 flex overflow-hidden">
          <!-- Szenen-Liste links -->
          <div class="szenen-sidebar w-48 bg-gray-50 border-r border-gray-200 flex flex-col ${state.szenenListeOpen ? '' : 'collapsed'}">

              <div class="text-xs font-semibold text-gray-500 uppercase">Szenen</div>
              <button class="btn btn-xs btn-primary" onclick="openSzeneModal()">+</button>
            </div>
            <div class="flex-1 overflow-y-auto p-2">
              ${renderGruppierteSzenenListe()}
            </div>
          </div>
          
          <!-- Editor Mitte -->
          <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Toolbar -->
            <div class="toolbar">
              <!-- Panel-Toggle links: Szenen-Liste -->

                      onclick="state.szenenListeOpen = !state.szenenListeOpen; render();" 
                      title="${state.szenenListeOpen ? 'Szenen-Liste ausblenden' : 'Szenen-Liste einblenden'}">
                ${state.szenenListeOpen ? '◀' : '▶'}
              </button>
              
              ${state._cameFromSzenen ? `
              <button class="btn btn-xs btn-outline" onclick="state._cameFromSzenen = false; navigateTo('szenen');" title="Zurück zur Szenenübersicht" style="margin-right: 8px; font-size: 12px;">
                ← Szene
              </button>
              ` : ''}
              ${state.textAnsicht !== 'aenderungen' ? `
              <select class="format-select" id="format-select" onchange="state.selectedFormat = this.value; applySelectedFormat();">
                ${Object.entries(FORMATVORLAGEN).map(([key, val]) => `
                  <option value="${key}" ${state.selectedFormat === key ? 'selected' : ''}>
                    ${val.icon} ${val.name}
                  </option>
                `).join('')}
              </select>
              
              <div class="toolbar-divider"></div>
              
              <div class="toolbar-group">
                <button class="toolbar-btn" onclick="execCommand('bold')" title="Fett (Ctrl/Cmd+B)"><b>F</b></button>
                <button class="toolbar-btn" onclick="execCommand('italic')" title="Kursiv (Ctrl/Cmd+I)"><i>K</i></button>
                <button class="toolbar-btn" onclick="execCommand('underline')" title="Unterstrichen (Ctrl/Cmd+U)"><u>U</u></button>
                <button class="toolbar-btn" onclick="toggleSearchReplace()" title="Suchen & Ersetzen (Ctrl/Cmd+F)" style="font-size:13px;">🔍</button>
              </div>
              
              <div class="toolbar-divider"></div>
              
              <div class="toolbar-group">
                <button class="toolbar-btn" id="undo-btn" onclick="undo()" title="Rückgängig (Ctrl/Cmd+Z)">↩</button>
                <button class="toolbar-btn" id="redo-btn" onclick="redo()" title="Wiederholen (Ctrl/Cmd+Shift+Z)">↪</button>
              </div>
              
              <div class="toolbar-divider"></div>
              ` : `<span style="font-size:12px; color:#6b7280;">Nur-Lese-Ansicht – Änderungen werden automatisch erkannt</span><div style="flex:1;"></div>`}
              
              <!-- Ansicht-Auswahl (kombiniert Modus + Ansicht) -->

                <option value="szene-schauspieler" ${state.textbuchModus === 'szene' && state.textAnsicht === 'schauspieler' ? 'selected' : ''}>📄 Szene · Schauspieler</option>

                <option value="fliesstext-technik" ${state.textbuchModus === 'fliesstext' && state.textAnsicht === 'technik' ? 'selected' : ''}>📜 Fliesstext · Technik</option>
                <option value="fliesstext-schauspieler" ${state.textbuchModus === 'fliesstext' && state.textAnsicht === 'schauspieler' ? 'selected' : ''}>📜 Fliesstext · Schauspieler</option>
              </select>
              
              ${state.textAnsicht !== 'aenderungen' ? `

              <button class="toolbar-btn toolbar-icon-only" onclick="cleanupFormatting()" title="Formatierung bereinigen – Word-Styles entfernen">🧹<span class="toolbar-label">Bereinigen</span></button>

              <!-- Panel-Toggle rechts: Details-Panel -->
              <button class="panel-toggle-btn ${state.detailsPanelOpen ? 'active' : ''}"

                ${state.detailsPanelOpen ? '▶' : '◀'}
              </button>
            </div>
            
            <!-- Editor -->
            <div class="flex-1 overflow-y-auto p-4 bg-gray-100" id="editor-scroll-area">
              ${state.textbuchModus === 'fliesstext' && state.textAnsicht !== 'aenderungen' ? `

              <div class="editor-container max-w-4xl mx-auto shadow-lg fliesstext-container">
                ${state.szenen.map((s, idx) => {
                  const sContent = state.textbuch[s.id] || '';

                  let sDisplay = state.textAnsicht === 'technik' ? enrichTextWithCueMarkers(sContent, sCues) : sContent;

                  return `

                      <div class="fliesstext-szene-header ${isAktiv ? 'aktiv' : ''}" onclick="setAktiveSzeneInFliesstext('${s.id}')">

    function renderSzenenNachGruppen() {
      const eigeneGruppen = state.projektMeta.eigeneGruppen || ['Erster Akt'];
      
      // Szenen nach Gruppe gruppieren

      state.szenen.forEach(s => {

        if (!gruppen[gruppe]) gruppen[gruppe] = [];
        gruppen[gruppe].push(s);
      });
      
      // Sortierung: eigeneGruppen-Reihenfolge, dann unbekannte Gruppen
      const sortierteGruppen = Object.keys(gruppen).sort((a, b) => {
        const indexA = eigeneGruppen.indexOf(a);
        const indexB = eigeneGruppen.indexOf(b);
        return (indexA === -1 ? 999 : indexA) - (indexB === -1 ? 999 : indexB);
      });
      
      if (sortierteGruppen.length === 0) return '';
      
      return sortierteGruppen.map(gruppenName => {
        const szenen = gruppen[gruppenName].sort((a, b) => compareSzenenNummer(a.nummer, b.nummer));
        
        return `

                  return f ? `<span class="figur-badge">${f.kuerzel || (f.name || '').substring(0,2)}</span>` : '';
                }).join('') || '<span class="text-gray-400 text-sm">–</span>';
                const cueCount = state.cues.filter(c => c.szeneId === s.id).length;
                
                return `
                  <div class="p-4 hover:bg-blue-50 cursor-pointer transition-colors"
                       draggable="true"
                       data-szene-id="${s.id}"
                       ondragstart="onSzeneDragStart(event, '${s.id}')"
                       ondragover="onSzeneDragOver(event)"
                       ondragenter="event.preventDefault(); this.style.borderTop='3px solid #3b82f6';"
                       ondragleave="this.style.borderTop='';"
                       ondrop="this.style.borderTop=''; onSzeneDrop(event, '${s.id}')"
                       ondragend="onSzeneDragEnd(event)"
                       onclick="editSzene('${s.id}')"
                  >
                    <div class="flex items-start gap-4">
                      <div class="w-12 h-12 rounded bg-blue-100 text-blue-700 flex items-center justify-center font-bold text-lg flex-shrink-0">
                        ${s.nummer}
                      </div>
                      <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 flex-wrap">
                          <h4 class="font-semibold">${s.titel}</h4>
                          ${s.ort ? `<span class="text-xs bg-gray-100 px-2 py-0.5 rounded">🔍 ${s.ort}</span>` : ''}
                          ${s.zeit ? `<span class="text-xs bg-gray-100 px-2 py-0.5 rounded">🕐 ${s.zeit}</span>` : ''}
                          ${cueCount > 0 ? `<span class="text-xs bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded">💡 ${cueCount} Cues</span>` : ''}
                        </div>
                        ${s.zusammenfassung ? `<p class="text-sm text-gray-500 mt-1 line-clamp-2">${s.zusammenfassung}</p>` : ''}
                        ${s.bemerkungen ? `<p class="text-xs text-amber-600 mt-1 bg-amber-50 px-2 py-1 rounded"><span class="font-medium">📝</span> ${s.bemerkungen.length > 80 ? s.bemerkungen.substring(0, 80) + '...' : s.bemerkungen}</p>` : ''}
                        <div class="flex items-center gap-2 mt-2">
                          <span class="text-xs text-gray-400">Figuren:</span>
                          ${figurenNamen}
                        </div>
                      </div>
                      <div class="flex gap-1 flex-shrink-0">
                        ${getApiKey() ? `<button class="btn btn-xs" style="background:linear-gradient(135deg,#8b5cf6,#6366f1);color:#fff;font-weight:600;" onclick="event.stopPropagation(); analyzeSzeneKI('${s.id}')" title="KI: Requisiten, Kostüme, Bühnenbild und Cues in dieser Szene finden" ${state.szeneKiLoading === s.id ? 'disabled' : ''}>${state.szeneKiLoading === s.id ? '⏳ …' : '🔎 KI'}</button>` : ''}
                        <button class="btn btn-xs btn-primary" onclick="event.stopPropagation(); state._cameFromSzenen = true; selectSzene('${s.id}'); navigateTo('textbuch');" title="Zum Dialogtext springen" style="font-weight: 600;">
                          → Text
                        </button>
                        <button class="btn btn-xs btn-outline" onclick="event.stopPropagation(); editSzene('${s.id}')" title="Szene bearbeiten">
                          ✏️

    // ============================================
    // KI: SZENE ANALYSIEREN (Requisiten, Kostüme, Bühnenbild, Cues)
    // Auf Abruf pro Szene. Vorschläge erscheinen zur Bestätigung; erst
    // «Übernehmen» legt Einträge an. Der Knopf zeigt sich nur mit KI-Schlüssel.
    // ============================================
    async function analyzeSzeneKI(szeneId) {
      const apiKey = getApiKey();
      if (!apiKey) { alert('Für die Szenen-Analyse braucht es einen KI-Schlüssel (Menü → KI-Einstellungen).'); return; }
      const szene = state.szenen.find(s => s.id === szeneId);
      if (!szene) return;
      const tmp = document.createElement('div');
      tmp.innerHTML = state.textbuch[szeneId] || '';
      const text = (tmp.textContent || '').trim();
      if (text.length < 20) { alert('Diese Szene enthält kaum Text zum Analysieren.'); return; }

      state.szeneKiLoading = szeneId;
      render();

      const prompt = `Du bist ein erfahrener Regie- und Ausstattungsassistent. Analysiere den folgenden Szenentext und finde, was für die Inszenierung konkret gebraucht wird. Schreibe in Schweizer Rechtschreibung (immer "ss" statt Eszett).

Gib AUSSCHLIESSLICH gültiges JSON in diesem Format zurück (keine Erklärung davor oder danach):
{
  "requisiten": [{"name": "kurzer Name", "beschreibung": "knapp", "ankerText": "belegende Textstelle"}],
  "kostueme": [{"name": "Kleidungsstück/Kostüm", "figur": "zu welcher Figur, falls erkennbar", "beschreibung": "knapp", "ankerText": "Textstelle"}],
  "buehne": [{"name": "Bühnenbild-Element/Möbel/Versatzstück", "beschreibung": "knapp", "ankerText": "Textstelle"}],
  "cues": [{"typ": "lx | q | v", "beschreibung": "was passiert (lx=Licht, q=Ton/Musik/Geräusch, v=Video)", "ankerText": "auslösende Textstelle"}]
}

Regeln:
- Nur aufnehmen, was wirklich im Text steht oder klar impliziert ist. Nichts erfinden.
- "ankerText" ist ein kurzer, wörtlicher Ausschnitt aus dem Text (max. ca. 60 Zeichen).
- Video (typ "v") nur, wenn im Text tatsächlich Projektion/Video/Film vorkommt.
- Leere Liste, wenn es in einer Kategorie nichts gibt.

SZENENTEXT (${szene.nummer} ${szene.titel}):
${text}`;

      try {
        const response = await rebuFetchWithTimeout('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
          body: JSON.stringify({ model: CLAUDE_MODEL, max_tokens: 4000, messages: [{ role: 'user', content: prompt }] })
        }, 120000);
        if (!response.ok) { const t = await response.text(); throw new Error('API-Fehler ' + response.status + ': ' + t.substring(0, 200)); }
        const data = await response.json();
        if (!data.content || !data.content[0] || typeof data.content[0].text !== 'string') throw new Error('Unerwartete KI-Antwort.');
        const aiText = data.content[0].text;
        const codeBlock = aiText.match(/```(?:json)?\s*([\s\S]*?)```/);
        const raw = codeBlock ? codeBlock[1] : (aiText.match(/\{[\s\S]*\}/)?.[0] || aiText);
        const json = JSON.parse(raw.replace(/[\x00-\x08\x0b\x0c\x0e-\x1f]/g, '').replace(/,\s*([}\]])/g, '$1'));

        const flat = [];
        (Array.isArray(json.requisiten) ? json.requisiten : []).forEach(x => flat.push({ kat: 'requisit', name: x.name || '', beschreibung: x.beschreibung || '', anker: x.ankerText || '' }));
        (Array.isArray(json.kostueme) ? json.kostueme : []).forEach(x => flat.push({ kat: 'kostuem', name: x.name || '', figur: x.figur || '', beschreibung: x.beschreibung || '', anker: x.ankerText || '' }));
        (Array.isArray(json.buehne) ? json.buehne : []).forEach(x => flat.push({ kat: 'buehne', name: x.name || '', beschreibung: x.beschreibung || '', anker: x.ankerText || '' }));
        (Array.isArray(json.cues) ? json.cues : []).forEach(x => flat.push({ kat: 'cue', typ: (['lx', 'q', 'v'].includes(x.typ) ? x.typ : 'lx'), beschreibung: x.beschreibung || '', anker: x.ankerText || '' }));

        state.szeneKiVorschlaege = { szeneId: szeneId, flat: flat };
        state.szeneKiLoading = null;
        state.showSzeneKiModal = true;
        render();
      } catch (err) {
        state.szeneKiLoading = null;
        render();
        alert('Analyse fehlgeschlagen: ' + err.message);
      }
    }

    function _kiItemExists(it, szeneId) {
      const gl = (a, b) => (a || '').toLowerCase() === (b || '').toLowerCase();
      if (it.kat === 'requisit') return state.requisiten.some(r => gl(r.name, it.name) && (r.szenen || []).includes(szeneId));
      if (it.kat === 'kostuem') return state.kostueme.some(k => gl(k.name, it.name) && (k.szenen || []).includes(szeneId));
      if (it.kat === 'buehne') return state.buehne.some(b => gl(b.name, it.name) && (b.szenen || []).includes(szeneId));
      if (it.kat === 'cue') return state.cues.some(c => c.szeneId === szeneId && c.typ === it.typ && gl(c.beschreibung, it.beschreibung));
      return false;
    }

    function renderSzeneKiModal() {
      const v = state.szeneKiVorschlaege;
      if (!v) return '';
      const szene = state.szenen.find(s => s.id === v.szeneId);
      const cueTypLabel = { lx: '💡 Licht', q: '🔊 Ton/Musik', v: '🎬 Video' };
      const katLabel = { requisit: '🎭 Requisiten', kostuem: '👗 Kostüme', buehne: '🎪 Bühnenbild', cue: '💡 Cues (Licht/Ton/Video)' };
      const reihenfolge = ['requisit', 'kostuem', 'buehne', 'cue'];

      let bodyHtml = '';
      let anzahl = 0;
      reihenfolge.forEach(kat => {
        const items = v.flat.map((it, i) => ({ it, i })).filter(x => x.it.kat === kat);
        if (items.length === 0) return;
        bodyHtml += `<div class="mb-4"><div class="font-semibold text-sm mb-1">${katLabel[kat]}</div>`;
        items.forEach(({ it, i }) => {
          anzahl++;
          const exists = _kiItemExists(it, v.szeneId);
          const titel = it.kat === 'cue' ? (cueTypLabel[it.typ] + ': ' + (it.beschreibung || '')) : it.name;
          const sub = it.kat === 'kostuem' && it.figur ? ('Figur: ' + it.figur) : (it.kat !== 'cue' ? it.beschreibung : '');
          bodyHtml += `
            <label class="flex items-start gap-2 py-1.5 border-b border-gray-50 text-sm" style="cursor:pointer;${exists ? 'opacity:0.55;' : ''}">
              <input type="checkbox" data-ki-idx="${i}" ${exists ? '' : 'checked'} style="margin-top:4px;">
              <span style="flex:1;">
                <span class="font-medium">${escapeHtml(titel || '—')}</span>
                ${sub ? ` <span class="text-gray-500">– ${escapeHtml(sub)}</span>` : ''}
                ${exists ? ' <span class="text-xs text-gray-400">(schon vorhanden)</span>' : ''}
                ${it.anker ? `<div class="text-xs text-gray-400 italic mt-0.5">„${escapeHtml(it.anker)}“</div>` : ''}
              </span>
            </label>`;
        });
        bodyHtml += `</div>`;
      });

      if (anzahl === 0) {
        bodyHtml = '<div class="text-center text-gray-400 py-8">Die KI hat in dieser Szene nichts Konkretes gefunden.</div>';
      }

      return `
        <div class="modal-overlay" role="dialog" aria-modal="true" onclick="closeModal('showSzeneKiModal')">
          <div class="modal-content" style="max-width:620px;max-height:85vh;overflow-y:auto;" onclick="event.stopPropagation()">
            <div class="modal-header">
              <h2 class="text-lg font-semibold">🔎 KI-Analyse${szene ? ' · Szene ' + escapeHtml(szene.nummer) : ''}</h2>
              <button class="text-gray-400 hover:text-gray-600" onclick="closeModal('showSzeneKiModal')">✕</button>
            </div>
            <div class="modal-body">
              <p class="text-sm text-gray-500 mb-3">Vorschläge aus dem Szenentext. Häkchen setzen bei allem, was du übernehmen willst – erst dann werden die Einträge angelegt und mit dieser Szene verknüpft.</p>
              ${anzahl > 0 ? '<div class="mb-2"><button class="btn btn-outline btn-xs" onclick="toggleAllSzeneKi()">Alle auswählen / abwählen</button></div>' : ''}
              ${bodyHtml}
              <div class="flex justify-end gap-2 mt-4">
                <button class="btn btn-outline" onclick="closeModal('showSzeneKiModal')">Schliessen</button>
                ${anzahl > 0 ? '<button class="btn btn-primary" onclick="applySzeneKiVorschlaege()">Ausgewählte übernehmen</button>' : ''}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function toggleAllSzeneKi() {
      const boxes = document.querySelectorAll('input[data-ki-idx]');
      const anyUnchecked = Array.from(boxes).some(b => !b.checked);
      boxes.forEach(b => { b.checked = anyUnchecked; });
    }

    function applySzeneKiVorschlaege() {
      const v = state.szeneKiVorschlaege;
      if (!v) return;
      const szeneId = v.szeneId;
      const checked = new Set();
      document.querySelectorAll('input[data-ki-idx]').forEach(b => { if (b.checked) checked.add(parseInt(b.dataset.kiIdx, 10)); });
      let addR = 0, addK = 0, addB = 0, addC = 0;
      v.flat.forEach((it, i) => {
        if (!checked.has(i) || _kiItemExists(it, szeneId)) return;
        if (it.kat === 'requisit') {
          state.requisiten.push({ id: genId(), name: it.name || 'Requisit', zustaendig: '', beschreibung: it.beschreibung || '', szenen: [szeneId], bilder: [], notizen: '', erstelltVonKI: true });
          addR++;
        } else if (it.kat === 'kostuem') {
          let figurId = '';
          if (it.figur) { const f = state.figuren.find(f => (f.name || '').toLowerCase() === (it.figur || '').toLowerCase()); if (f) figurId = f.id; }
          state.kostueme.push({ id: genId(), name: it.name || 'Kostüm', figur: figurId, beschreibung: it.beschreibung || '', maske: '', szenen: [szeneId], notizen: '', kostuemBilder: [], maskeBilder: [], erstelltVonKI: true });
          addK++;
        } else if (it.kat === 'buehne') {
          state.buehne.push({ id: genId(), name: it.name || 'Element', kategorie: 'Sonstiges', beschreibung: it.beschreibung || '', bilder: [], notizen: '', szenen: [szeneId], erstelltVonKI: true });
          addB++;
        } else if (it.kat === 'cue') {
          const typ = it.typ || 'lx';
          const nummer = state.cues.filter(c => c.typ === typ).reduce((m, c) => Math.max(m, c.nummer || 0), 0) + 1;
          state.cues.push({ id: genId(), typ: typ, nummer: nummer, szeneId: szeneId, beschreibung: it.beschreibung || '', ankerText: it.anker || '', dauer: '', erstelltVonKI: true });
          addC++;
        }
      });
      saveProjektDaten();
      state.showSzeneKiModal = false;
      state.szeneKiVorschlaege = null;
      render();
      alert('Übernommen: ' + addR + ' Requisiten, ' + addK + ' Kostüme, ' + addB + ' Bühnenbild, ' + addC + ' Cues.');
    }

      return `

                <button class="btn btn-primary" onclick="openFigurModal()">+ Neue Figur</button>
              </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              ${state.figuren.map(f => {
                const szenenCount = state.szenen.filter(s => s.figuren?.includes(f.id)).length;
                // Besetzung aus Ensemble
                const besetzung = (state.ensemble || []).filter(e => (e.rolleIds || []).includes(f.id));
                // Beziehungen

    // Kostüm-Bilder asynchron nachladen
    async function loadKostuemBilder() {
      for (const k of state.kostueme) {
        // Neue Array-Struktur
        const kostuemBilder = k.kostuemBilder || (k.kostuemBildId ? [k.kostuemBildId] : []);
        const maskeBilder = k.maskeBilder || (k.maskeBildId ? [k.maskeBildId] : []);
        
        for (let i = 0; i < kostuemBilder.length; i++) {
          const imgId = kostuemBilder[i];
          if (!imageUrlCache[imgId]) {
            const url = await getImageUrl(imgId);
            if (url) {
              const img = document.getElementById(`img-kostuem-${k.id}-${i}`);
              if (img) img.src = url;
            }
          }
        }
        
        for (let i = 0; i < maskeBilder.length; i++) {
          const imgId = maskeBilder[i];
          if (!imageUrlCache[imgId]) {
            const url = await getImageUrl(imgId);
            if (url) {
              const img = document.getElementById(`img-maske-${k.id}-${i}`);
              if (img) img.src = url;
            }
          }
        }
      }
    }
    
    function openKostuemGallery(kostuemId, type, startIndex = 0) {
      const k = state.kostueme.find(x => x.id === kostuemId);
      if (!k) return;
      
      // Bilder je nach Typ
      let bilder;
      if (type === 'kostuem') {
        bilder = k.kostuemBilder || (k.kostuemBildId ? [k.kostuemBildId] : []);
      } else {
        bilder = k.maskeBilder || (k.maskeBildId ? [k.maskeBildId] : []);
      }
      
      const urls = bilder.map(id => imageUrlCache[id]).filter(Boolean);
      
      if (urls.length > 0) {
        openLightbox(urls, startIndex);
      }
    }
    
    async function exportKostuemeList() {
      // Bilder als Base64 laden
      const bilderBase64 = {};
      for (const k of state.kostueme) {
        if (k.kostuemBilder) {
          for (const imgId of k.kostuemBilder) {
            if (!bilderBase64[imgId]) bilderBase64[imgId] = await getImageAsBase64(imgId);
          }
        }
        if (k.maskeBilder) {
          for (const imgId of k.maskeBilder) {
            if (!bilderBase64[imgId]) bilderBase64[imgId] = await getImageAsBase64(imgId);
          }
        }
        // Fallback für alte Daten mit einzelnem Bild
        if (k.kostuemBildId && !bilderBase64[k.kostuemBildId]) {
          bilderBase64[k.kostuemBildId] = await getImageAsBase64(k.kostuemBildId);
        }
        if (k.maskeBildId && !bilderBase64[k.maskeBildId]) {
          bilderBase64[k.maskeBildId] = await getImageAsBase64(k.maskeBildId);
        }
      }
      
      let html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Kostüme - ${state.projektMeta.titel}</title>
        <style>
          body{font-family:Arial,sans-serif;padding:20px;} 
          .item{margin-bottom:30px;border:1px solid #ddd;padding:15px;page-break-inside:avoid;} 
          .images{display:flex;flex-wrap:wrap;gap:15px;margin:10px 0;}
          .image-box{text-align:center;}
          img{max-width:150px;max-height:150px;}
          h2{margin-bottom:10px;}
          @media print { .no-print{display:none;} }
        </style></head><body>`;
      html += `<div class="no-print" style="margin-bottom:20px;"><button onclick="window.print()" style="padding:10px 20px;font-size:16px;">🖨️ Als PDF drucken</button></div>`;
      html += `<h1>Kostüme & Masken: ${state.projektMeta.titel}</h1>`;
      html += `<p>Erstellt: ${new Date().toLocaleDateString('de-CH')}</p>`;
      
      state.kostueme.forEach(k => {
        const figur = state.figuren.find(f => f.id === k.figur);
        const szenenNamen = k.szenen?.map(sId => state.szenen.find(s => s.id === sId)?.nummer).filter(Boolean).join(', ') || '–';
        
        html += `<div class="item">`;
        html += `<h2>👗 ${k.name}</h2>`;
        html += `<p><strong>Figur:</strong> ${figur?.name || '–'}</p>`;
        html += `<p><strong>Szenen:</strong> ${szenenNamen}</p>`;
        
        // Kostüm-Bilder
        const kostuemBilder = k.kostuemBilder || (k.kostuemBildId ? [k.kostuemBildId] : []);
        const maskeBilder = k.maskeBilder || (k.maskeBildId ? [k.maskeBildId] : []);
        
        if (kostuemBilder.length > 0 || maskeBilder.length > 0) {
          html += `<div class="images">`;
          kostuemBilder.forEach(imgId => {
            if (bilderBase64[imgId]) html += `<div class="image-box"><img src="${bilderBase64[imgId]}"><br><small>Kostüm</small></div>`;
          });
          maskeBilder.forEach(imgId => {
            if (bilderBase64[imgId]) html += `<div class="image-box"><img src="${bilderBase64[imgId]}"><br><small>Maske</small></div>`;
          });
          html += `</div>`;
        }
        
        if (k.beschreibung) html += `<p><strong>Kostüm:</strong> ${k.beschreibung}</p>`;
        if (k.maske) html += `<p><strong>Maske:</strong> ${k.maske}</p>`;
        if (k.notizen) html += `<p><em>Notizen: ${k.notizen}</em></p>`;
        html += `</div>`;
      });
      
      html += `</body></html>`;
      openExportWindow(html, 'kostueme-liste');
    }

    // ============================================
    // LIGHTBOX (Bildvergrößerung)
    // ============================================
    function openLightbox(images, startIndex = 0) {
      state.lightboxImages = images;
      state.lightboxIndex = startIndex;
      state.showLightbox = true;
      render();
    }
    
    function closeLightbox() {
      state.showLightbox = false;
      render();
    }
    
    function lightboxPrev() {
      state.lightboxIndex = (state.lightboxIndex - 1 + state.lightboxImages.length) % state.lightboxImages.length;
      render();
    }
    
    function lightboxNext() {
      state.lightboxIndex = (state.lightboxIndex + 1) % state.lightboxImages.length;
      render();
    }
    
    function renderLightbox() {
      const images = state.lightboxImages;
      const idx = state.lightboxIndex;
      if (!images || images.length === 0) return '';
      
      const currentImg = images[idx];
      const showNav = images.length > 1;
      
      return `
        <div class="lightbox-overlay" onclick="closeLightbox()">
          <span class="lightbox-close" onclick="closeLightbox()">✕</span>
          ${showNav ? `<span class="lightbox-nav prev" onclick="event.stopPropagation(); lightboxPrev()">❮</span>` : ''}
          <img src="${currentImg}" class="lightbox-content" onclick="event.stopPropagation()">
          ${showNav ? `<span class="lightbox-nav next" onclick="event.stopPropagation(); lightboxNext()">❯</span>` : ''}
          ${showNav ? `<div class="lightbox-counter">${idx + 1} / ${images.length}</div>` : ''}
        </div>
      `;
    }

    // ============================================
    // FASSUNGEN VIEW (v1.2: mit Uhrzeit)
    // ============================================
    function fassungSourceIcon(source) {
      if (source === 'browser') return '\u{1F4BB}';
      if (source === 'datei') return '\u{1F4C1}';
      if (source === 'manuell') return '\u{1F516}';
      return '\u{1F4CB}';
    }
    function fassungSourceLabel(source) {
      if (source === 'browser') return 'Browser';
      if (source === 'datei') return 'Datei';
      if (source === 'manuell') return 'Manuell';
      return 'Unbekannt';
    }
    function fassungApproxSize(f) {
      try {
        var bytes = JSON.stringify(f).length;
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
      } catch(e) { return '?'; }
    }

    function fassungVorschau(fassungId) {
      var fassung = state.fassungen.find(function(f) { return f.id === fassungId; });
      if (!fassung) return;
      var overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:20000;display:flex;align-items:center;justify-content:center;';
      var dialog = document.createElement('div');
      dialog.style.cssText = 'background:white;border-radius:12px;padding:1.5rem;max-width:700px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);';
      var szenenHtml = '';
      if (fassung.szenen) {
        fassung.szenen.forEach(function(s) {
          var text = fassung.textbuch && fassung.textbuch[s.id] ? fassung.textbuch[s.id] : '<em>Kein Text</em>';
          var preview = text.length > 500 ? text.substring(0, 500) + '...' : text;
          szenenHtml += '<div style="margin-bottom:1rem;padding:0.75rem;background:#f9fafb;border-radius:8px;">' +
            '<h4 style="margin:0 0 0.5rem;font-size:0.9rem;color:#374151;">' + (s.nummer || '') + ' ' + (s.titel || '') + '</h4>' +
            '<div style="font-size:0.8rem;color:#6b7280;max-height:150px;overflow:hidden;">' + preview + '</div></div>';
        });
      }
      dialog.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">' +
        '<h3 style="margin:0;font-size:1.1rem;">' + fassungSourceIcon(fassung.source) + ' ' + fassung.name + '</h3>' +
        '<button onclick="this.closest(\'div[style*=fixed]\').remove()" style="background:none;border:none;font-size:1.5rem;cursor:pointer;color:#9ca3af;">&times;</button></div>' +
        '<p style="color:#6b7280;font-size:0.85rem;margin-bottom:1rem;">' + formatDateTime(fassung.datum) + ' &middot; ' + fassungSourceLabel(fassung.source) + ' &middot; ~' + fassungApproxSize(fassung) + '</p>' +
        '<div>' + szenenHtml + '</div>' +
        '<div style="display:flex;gap:0.75rem;margin-top:1rem;justify-content:flex-end;">' +
          '<button onclick="this.closest(\'div[style*=fixed]\').remove()" style="padding:0.5rem 1rem;border:1px solid #d1d5db;border-radius:6px;background:white;cursor:pointer;">Schliessen</button>' +
          '<button onclick="this.closest(\'div[style*=fixed]\').remove(); fassungLaden(\'' + fassung.id + '\');" style="padding:0.5rem 1rem;border:none;border-radius:6px;background:#6b4423;color:white;cursor:pointer;font-weight:600;">Wiederherstellen</button>' +
        '</div>';
      overlay.appendChild(dialog);
      document.body.appendChild(overlay);
      overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
    }

    async function uploadRechercheBild(materialId, input) {
      const file = input.files[0];
      if (!file) return;
      // Bild in IndexedDB speichern (NICHT als Base64 in localStorage – Quota!)
      const imgId = 'recherche_' + materialId;
      try {
        await saveImageToDB(imgId, file);
        updateRechercheMaterial(materialId, 'bildData', 'idb:' + imgId);
        render();
      } catch (e) {
        console.error('Recherche-Bild konnte nicht gespeichert werden:', e);
        alert('Bild konnte nicht gespeichert werden: ' + (e.message || e));
      }
    }

    // Migration: Alte Base64-Recherche-Bilder aus localStorage nach IndexedDB verschieben
    async function migrateRechercheBilder() {
      const items = (state.rechercheMaterial || []).filter(r =>
        r.bildData && typeof r.bildData === 'string' && r.bildData.startsWith('data:image/'));
      if (items.length === 0) return;
      let migriert = 0;
      for (const item of items) {
        try {
          const imgId = 'recherche_' + item.id;
          const resp = await fetch(item.bildData);
          const blob = await resp.blob();
          const file = new File([blob], 'recherche.jpg', { type: blob.type || 'image/jpeg' });
          await saveImageToDB(imgId, file);
          item.bildData = 'idb:' + imgId;
          migriert++;
        } catch (e) {
          console.warn('Recherche-Bild-Migration fehlgeschlagen:', e);
        }
      }
      if (migriert > 0) {
        console.log('✅ Migration: ' + migriert + ' Recherche-Bilder nach IndexedDB verschoben');
        saveProjektDaten();
        render();
      }
    }

      if (kind === 'team') {

    // File Picker - global reference to prevent garbage collection
    let globalFileInput = null;
    
    function openFilePicker() {
      // Neues Input-Element erstellen
      globalFileInput = document.createElement('input');
      globalFileInput.type = 'file';
      globalFileInput.accept = '.mp3,.wav,.ogg,.m4a,.mp4,.mov,.avi,.webm,audio/*,video/*';
      globalFileInput.style.display = 'none';
      document.body.appendChild(globalFileInput);
      
      globalFileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
          processFile(file);
        }
        // Aufräumen
        if (globalFileInput && globalFileInput.parentNode) {
          globalFileInput.parentNode.removeChild(globalFileInput);
        }
        globalFileInput = null;
      });
      
      globalFileInput.click();
    }
    
    // Drag & Drop Handlers
    function handleDragOver(e) {
      e.preventDefault();
      e.currentTarget.classList.add('border-blue-400', 'bg-blue-50');
    }
    
    function handleDragLeave(e) {
      e.currentTarget.classList.remove('border-blue-400', 'bg-blue-50');
    }
    
    function handleFileDrop(e) {
      e.preventDefault();
      e.currentTarget.classList.remove('border-blue-400', 'bg-blue-50');
      const file = e.dataTransfer.files[0];
      if (file) processFile(file);
    }
    
    async function processFile(file) {
      // MIME-Type prüfen
      let isAudio = file.type.startsWith('audio/');
      let isVideo = file.type.startsWith('video/');
      
      // Fallback: Dateiendung prüfen (für Dateien ohne MIME-Type)
      if (!isAudio && !isVideo) {
        const ext = file.name.split('.').pop().toLowerCase();
        const audioExtensions = ['mp3', 'wav', 'ogg', 'm4a', 'aac', 'flac', 'wma'];
        const videoExtensions = ['mp4', 'mov', 'avi', 'webm', 'mkv', 'm4v', 'wmv'];
        
        if (audioExtensions.includes(ext)) {
          isAudio = true;
        } else if (videoExtensions.includes(ext)) {
          isVideo = true;
        }
      }
      
      if (!isAudio && !isVideo) {
        alert('Nicht erkannt als Audio oder Video.\nBitte MP3, WAV, MP4, MOV oder ähnliche Dateien verwenden.');
        return;
      }
      
      pushUndo();
      
      const mediumId = 'med_' + Date.now();
      
      const medium = {
        id: mediumId,
        name: file.name.replace(/\.[^/.]+$/, ''),
        source: 'local',
        url: '',
        filename: file.name,
        localFileUrl: createTrackedObjectURL(file),
        type: isAudio ? 'audio' : 'video',
        szenen: [],
        notizen: '',
        audioStored: false
      };

      // Audio UND Video permanent in IndexedDB speichern
      // (Blob-URLs überleben keinen Reload – ohne DB-Kopie wäre die Datei danach weg)
      try {
        await saveAudioToDB(mediumId, file);
        medium.audioStored = true;
        console.log('✅ ' + (isAudio ? 'Audio' : 'Video') + ' permanent gespeichert');
      } catch (e) {
        console.error('Medien-Speicherung fehlgeschlagen:', e);
        alert('Hinweis: Die Datei konnte nicht dauerhaft gespeichert werden und ist nach einem Neuladen nicht mehr verfügbar.\n(' + (e.message || e) + ')');
      }

      state.medien.push(medium);
      saveProjektDaten();
      render();

      // Speicherinfo aktualisieren
      updateStorageInfo();
    }
    
    function addFromUrl() {
      const urlInput = document.getElementById('url-input');
      const url = urlInput.value.trim();
      
      if (!url) return;
      
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        alert('Bitte eine gültige URL eingeben (https://...)');
        return;
      }
      
      pushUndo();
      
      const isYouTube = url.includes('youtube.com') || url.includes('youtu.be');
      const isVideo = /\.(mp4|mov|avi|webm|mkv)(\?|$)/i.test(url) || 
                      isYouTube || url.includes('vimeo.com');
      
      // Name generieren
      let name = 'Neues Medium';
      if (isYouTube) {
        name = 'YouTube Video';
        // Versuche Video-ID als Hinweis zu nutzen
        const ytId = getYouTubeId(url);
        if (ytId) name = 'YouTube: ' + ytId;
      } else {
        try {
          const urlObj = new URL(url);
          const filename = urlObj.pathname.split('/').pop();
          if (filename && filename.length > 0) {
            name = decodeURIComponent(filename.replace(/\.[^/.]+$/, ''));
          }
        } catch(e) {}
      }
      
      const medium = {
        id: 'med_' + Date.now(),
        name: name,
        source: 'cloud',
        url: url,
        filename: '',
        type: isVideo ? 'video' : 'audio',
        szenen: [],
        notizen: ''
      };
      
      state.medien.push(medium);
      urlInput.value = '';
      saveProjektDaten();
      render();
    }

                <span class="text-sm text-gray-500">Szenen:</span>
                ${state.szenen.length === 0 ? `
                  <span class="text-xs text-gray-400">Keine Szenen vorhanden</span>
                ` : state.szenen.map(s => `
                  <label class="inline-flex items-center gap-1 text-sm cursor-pointer hover:bg-gray-100 px-2 py-1 rounded">
                    <input type="checkbox" ${medium.szenen?.includes(s.id) ? 'checked' : ''}
                           onchange="toggleMediumSzene('${medium.id}', '${s.id}', this.checked)">
                    <span>${s.nummer}</span>
                  </label>
                `).join('')}
              </div>
              
              <!-- Notizen -->
              <input type="text" class="input w-full text-sm" value="${medium.notizen || ''}"
                     onchange="updateMedium('${medium.id}', 'notizen', this.value)"
                     placeholder="Notizen (z.B. Ab 2:30 neue Variante)">
              
              <!-- Player Controls -->
              <div class="flex items-center gap-2 flex-wrap pt-2">
                ${hasFile || isYouTube ? `
                  <button class="btn btn-sm ${isPlaying ? 'btn-primary' : 'btn-outline'}" 
                          data-play-btn="${medium.id}"
                          onclick="togglePlayMedium('${medium.id}')">
                    ${isPlaying ? '⏸️ Pause' : '▶️ Play'}
                  </button>
                ` : medium.source === 'local' ? `
                  <button class="btn btn-sm btn-outline" onclick="reloadLocalFile('${medium.id}')">
                    📂 Datei neu laden
                  </button>
                ` : ''}
                
                <!-- Tempo (nicht für YouTube) -->
                ${!isYouTube ? `
                  <div class="flex items-center gap-1">
                    <span class="text-xs text-gray-400 mr-1">Tempo:</span>
                    ${['0.5', '0.75', '1.0', '1.25', '1.5'].map(rate => `
                      <button class="btn btn-xs ${state.playbackRate == rate ? 'btn-primary' : 'btn-outline'}" 
                              data-tempo-btn="${rate}"
                              onclick="setPlaybackRate(${rate})" style="padding: 2px 6px;">
                        ${rate}x

                ` : ''}
              </div>
            </div>
            
            <!-- Delete -->
            <button class="btn btn-sm btn-outline text-red-500 hover:bg-red-50" 
                    onclick="deleteMedium('${medium.id}')" title="Löschen">🗑️</button>
          </div>
          
          <!-- Player Element -->
          <div id="player-${medium.id}" class="mt-3 ${isPlaying ? '' : 'hidden'}">
            ${isYouTube && youtubeId ? `
              <iframe 
                width="100%" 
                height="250" 
                src="https://www.youtube.com/embed/${youtubeId}?autoplay=0" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen
                class="rounded">
              </iframe>
            ` : medium.type === 'audio' ? `
              <audio id="media-${medium.id}" class="w-full" controls
                     src="${medium.source === 'cloud' ? convertToDirectUrl(medium.url) : (medium.localFileUrl || '')}"></audio>
            ` : `
              <video id="media-${medium.id}" class="w-full rounded" controls style="max-height: 300px;"
                     src="${medium.source === 'cloud' ? convertToDirectUrl(medium.url) : (medium.localFileUrl || '')}"></video>
            `}
          </div>

      `;
    }
    
    function updateMedium(mediumId, field, value) {
      const medium = state.medien.find(m => m.id === mediumId);
      if (medium) {
        medium[field] = value;
        saveProjektDaten();
      }
    }
    
    function toggleMediumSzene(mediumId, szeneId, checked) {
      const medium = state.medien.find(m => m.id === mediumId);
      if (medium) {
        if (!medium.szenen) medium.szenen = [];
        
        if (checked && !medium.szenen.includes(szeneId)) {
          // Szene hinzufügen
          medium.szenen.push(szeneId);
          
          // ========== CUE ERSTELLEN ==========
          const existiertBereits = state.cues.some(c => 
            (c.typ === 'q' || c.typ === 'v') && c.mediumId === mediumId && c.szeneId === szeneId
          );
          if (!existiertBereits) {
            const cueTyp = medium.type === 'audio' ? 'q' : 'v';
            const cuesInSzene = state.cues.filter(c => c.typ === cueTyp && c.szeneId === szeneId);
            const nextNummer = cuesInSzene.length > 0 
              ? Math.max(...cuesInSzene.map(c => c.nummer)) + 1 
              : 1;
            
            state.cues.push({
              id: genId(),
              typ: cueTyp,
              nummer: nextNummer,
              szeneId: szeneId,
              beschreibung: medium.name,
              mediumId: mediumId,
              ausloeser: '',
              dauer: '',
            });
          }
          // ====================================
        } else if (!checked) {
          // Szene entfernen
          medium.szenen = medium.szenen.filter(id => id !== szeneId);
          
          // ========== CUE LÖSCHEN ==========
          state.cues = state.cues.filter(c => 
            !((c.typ === 'q' || c.typ === 'v') && c.mediumId === mediumId && c.szeneId === szeneId)
          );
          // ==================================
        }
        
        saveProjektDaten();
      }
    }
    
    function reloadLocalFile(mediumId) {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'audio/*,video/*';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (file) {
          const medium = state.medien.find(m => m.id === mediumId);
          if (medium) {
            medium.filename = file.name;
            medium.localFileUrl = createTrackedObjectURL(file);
            // Auch dauerhaft in IndexedDB ablegen (überlebt Reload)
            try {
              await saveAudioToDB(mediumId, file);
              medium.audioStored = true;
            } catch (err) {
              console.warn('Dauerhafte Speicherung fehlgeschlagen:', err);
            }
            saveProjektDaten();
            render();
          }
        }
      };
      input.click();
    }
    
    function convertToDirectUrl(url) {
      if (!url) return '';
      if (url.includes('drive.google.com')) {
        const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
        if (match) return 'https://drive.google.com/uc?export=download&id=' + match[1];
      }
      if (url.includes('dropbox.com')) {
        return url.replace('dl=0', 'dl=1').replace('www.dropbox.com', 'dl.dropboxusercontent.com');
      }
      return url;
    }
    
    // YouTube URL zu Embed-ID extrahieren
    function getYouTubeId(url) {
      if (!url) return null;
      // Verschiedene YouTube URL-Formate
      const patterns = [
        /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/,
        /youtube\.com\/watch\?.*v=([a-zA-Z0-9_-]{11})/
      ];
      for (const pattern of patterns) {
        const match = url.match(pattern);
        if (match) return match[1];
      }
      return null;
    }
    
    function isYouTubeUrl(url) {
      return url && (url.includes('youtube.com') || url.includes('youtu.be'));
    }
    
    function togglePlayMedium(mediumId) {
      const medium = state.medien.find(m => m.id === mediumId);
      if (!medium) return;
      
      // YouTube braucht Sonderbehandlung
      if (isYouTubeUrl(medium.url)) {
        // Toggle visibility des Players
        const playerContainer = document.getElementById('player-' + mediumId);
        if (playerContainer) {
          const isHidden = playerContainer.classList.contains('hidden');
          
          // Andere Player verstecken
          document.querySelectorAll('[id^="player-"]').forEach(el => {
            el.classList.add('hidden');
          });
          
          if (isHidden) {
            playerContainer.classList.remove('hidden');
            state.currentlyPlaying = mediumId;
          } else {
            playerContainer.classList.add('hidden');
            state.currentlyPlaying = null;
          }
        }
        updatePlayButtons();
        return;
      }
      
      // Wenn bereits spielt → Pause
      if (state.currentlyPlaying === mediumId) {
        const mediaElement = document.getElementById('media-' + mediumId);
        if (mediaElement) mediaElement.pause();
        state.currentlyPlaying = null;
        updatePlayButtons();
        // Bottom-Player entfernen
        updateBottomPlayer();
        return;
      }
      
      // Stop andere Player
      if (state.currentlyPlaying) {
        const otherMedia = document.getElementById('media-' + state.currentlyPlaying);
        const otherPlayer = document.getElementById('player-' + state.currentlyPlaying);
        if (otherMedia) otherMedia.pause();
        if (otherPlayer) otherPlayer.classList.add('hidden');
      }
      
      // State setzen
      state.currentlyPlaying = mediumId;
      
      // Versuche existierenden Player zu finden (Medien-View)
      const existingPlayer = document.getElementById('player-' + mediumId);
      const existingMedia = document.getElementById('media-' + mediumId);
      
      if (existingPlayer && existingMedia) {
        // Player existiert im DOM (z.B. in Medien-Ansicht)
        existingPlayer.classList.remove('hidden');
        existingMedia.playbackRate = state.playbackRate;
        existingMedia.play().catch(e => {
          console.warn('Wiedergabe fehlgeschlagen:', e);
          alert('Wiedergabe fehlgeschlagen. URL prüfen oder Datei neu laden.');
        });
        updatePlayButtons();
        return;
      }
      
      // Player existiert noch nicht im DOM (Textbuch-Ansicht / Sidebar)
      // → Bottom-Player erstellen und abspielen
      updateBottomPlayer();
      updatePlayButtons();
      
      // Nach DOM-Update abspielen
      requestAnimationFrame(() => {
        setTimeout(() => {
          const newMedia = document.getElementById('bottom-media-player');
          if (newMedia) {
            newMedia.playbackRate = state.playbackRate;
            newMedia.play().catch(e => {
              console.warn('Wiedergabe fehlgeschlagen:', e);
              alert('Wiedergabe fehlgeschlagen. URL prüfen oder Datei neu laden.');
            });
          }
        }, 50);
      });
    }
    
    // Bottom-Player im Textbuch: volle Breite am unteren Rand der Schreibfläche
    function updateBottomPlayer() {
      let container = document.getElementById('bottom-player-bar');
      
      if (!state.currentlyPlaying) {
        if (container) container.remove();
        return;
      }
      
      const medium = state.medien.find(m => m.id === state.currentlyPlaying);
      if (!medium) {
        if (container) container.remove();
        return;
      }
      
      const isYouTube = isYouTubeUrl(medium.url);
      if (isYouTube) return; // YouTube handled separately
      
      const src = medium.source === 'cloud' ? convertToDirectUrl(medium.url) : (medium.localFileUrl || '');
      if (!src) return;
      
      // Finde den Editor-Bereich
      const editorColumn = document.querySelector('.flex-1.flex.flex-col.overflow-hidden');
      if (!editorColumn) return;
      
      if (!container) {
        container = document.createElement('div');
        container.id = 'bottom-player-bar';
        editorColumn.appendChild(container);
      }
      
      container.style.cssText = 'padding: 8px 16px; background: #eff6ff; border-top: 2px solid #3b82f6; display: flex; align-items: center; gap: 12px;';
      
      const tempoButtons = ['0.5', '0.75', '1.0', '1.25', '1.5'].map(rate => 
        `<button onclick="setPlaybackRate(${rate})" data-tempo-btn="${rate}" 
                style="padding: 2px 6px; font-size: 11px; border-radius: 4px; border: 1px solid #cbd5e1; cursor: pointer;
                       background: ${state.playbackRate == rate ? '#3b82f6' : '#fff'}; color: ${state.playbackRate == rate ? '#fff' : '#374151'};"
                >${rate}x</button>`
      ).join('');
      
      container.innerHTML = `
        <div style="display: flex; align-items: center; gap: 6px; white-space: nowrap;">
          <span style="font-size: 16px;">🎵</span>
          <span style="font-size: 12px; color: #1e40af; font-weight: 500; max-width: 150px; overflow: hidden; text-overflow: ellipsis;">${medium.name}</span>
        </div>
        <${medium.type === 'audio' ? 'audio' : 'video'} id="bottom-media-player" controls 
            src="${src}" style="flex: 1; height: ${medium.type === 'audio' ? '36px' : '48px'}; min-width: 0;"></${medium.type === 'audio' ? 'audio' : 'video'}>
        <div style="display: flex; gap: 3px; align-items: center;">
          ${tempoButtons}
        </div>
        <button onclick="togglePlayMedium('${medium.id}')" 
                style="padding: 4px 8px; font-size: 12px; border-radius: 4px; border: 1px solid #cbd5e1; cursor: pointer; background: #fff;">
          ⏹️
        </button>
      `;
      
      // Event: Wenn fertig gespielt, aufräumen
      const playerEl = container.querySelector('#bottom-media-player');
      if (playerEl) {
        playerEl.addEventListener('ended', () => {
          state.currentlyPlaying = null;
          updatePlayButtons();
          updateBottomPlayer();
        });
        playerEl.addEventListener('pause', () => {
          // Nur wenn nicht manuell gestoppt
        });
      }
    }
    
    // Nur die Play-Buttons aktualisieren, ohne render()
    function updatePlayButtons() {
      document.querySelectorAll('[data-play-btn]').forEach(btn => {
        const mediumId = btn.getAttribute('data-play-btn');
        const isPlaying = state.currentlyPlaying === mediumId;
        btn.textContent = isPlaying ? '⏸️ Pause' : '▶️ Play';
        btn.className = btn.className.replace(/btn-primary|btn-outline/g, '').trim();
        btn.classList.add(isPlaying ? 'btn-primary' : 'btn-outline');
      });
      
      // Tempo-Buttons aktualisieren
      document.querySelectorAll('[data-tempo-btn]').forEach(btn => {
        const rate = btn.getAttribute('data-tempo-btn');
        btn.className = btn.className.replace(/btn-primary|btn-outline/g, '').trim();
        btn.classList.add(state.playbackRate == rate ? 'btn-primary' : 'btn-outline');
      });
    }
    
    function setPlaybackRate(rate) {
      state.playbackRate = rate;
      
      // Auf allen aktiven Media-Elementen setzen
      if (state.currentlyPlaying) {
        const mediaElement = document.getElementById('media-' + state.currentlyPlaying);
        if (mediaElement && mediaElement.playbackRate !== undefined) {
          mediaElement.playbackRate = rate;
        }
        // Auch Bottom-Player
        const bottomPlayer = document.getElementById('bottom-media-player');
        if (bottomPlayer && bottomPlayer.playbackRate !== undefined) {
          bottomPlayer.playbackRate = rate;
        }
      }
      
      updatePlayButtons();
      // Bottom-Player Tempo-Buttons aktualisieren
      updateBottomPlayer();
    }
    
    async function deleteMedium(mediumId) {
      if (!confirm('Medium wirklich löschen?')) return;
      
      // Audio/Video aus IndexedDB löschen
      const medium = state.medien.find(m => m.id === mediumId);
      if (medium && medium.audioStored) {
        try {
          await deleteAudioFromDB(mediumId);
        } catch (e) {
          console.warn('Medien-Löschung fehlgeschlagen:', e);
        }
      }
      if (medium && medium.localFileUrl && medium.localFileUrl.startsWith('blob:')) {
        revokeTrackedObjectURL(medium.localFileUrl);
      }
      
      // Zugehörige Cues löschen
      state.cues = state.cues.filter(c => !((c.typ === 'q' || c.typ === 'v') && c.mediumId === mediumId));
      
      pushUndo();
      state.medien = state.medien.filter(m => m.id !== mediumId);
      if (state.currentlyPlaying === mediumId) state.currentlyPlaying = null;
      saveProjektDaten();
      render();
      updateStorageInfo();
    }

    // ============================================
    // LOGIK:
    // 1. WORD: Erst Formatvorlagen prüfen → wenn nicht vorhanden → Analyse
    // 2. PDF: Direkt Analyse
    // 3. ANALYSE: Figurenliste ZUERST → dann mit bekannten Namen Dialoge finden!
    // ============================================
    
    // Muster für Figurenliste-Header
    const FIGURENLISTE_HEADER = [
      /^(Personen|Figuren|Rollen|Besetzung|Dramatis\s+Personae):?\s*$/im,
      /^PERSONNAGES:?\s*$/im,
      /^Characters?:?\s*$/im,
      /^Cast(\s+of\s+Characters)?:?\s*$/im,
      /^Mitwirkende:?\s*$/im,
      /^Die\s+Auswanderer:/im  // Gruppierte Figuren
    ];
    
    // Muster für Struktur-Erkennung
    const STRUKTUR_PATTERNS = {
      akt: [
        /^(\d+)\.\s*Akt\b/im,
        /^(Erster?|Zweiter?|Dritter?|Vierter?|Fünfter?)\s+Akt\b/im,
        /^Akt\s+(\d+|[IVX]+)\b/im,
        /^([IVX]+)\.\s*Akt\b/im,
        /^(Prolog|Epilog|Vorspiel|Nachspiel)\b/im,
        /^(Erster?|Zweiter?|Dritter?)\s+Aufzug\b/im,
        /^(\d+)\.\s*Aufzug\b/im,
        /^Act\s+(\d+|[IVX]+|One|Two|Three)\b/im,
        /^Acte\s+(\d+|[IVX]+|Premier|Deuxième)\b/im
      ],
      szene: [
        /^(\d+)\.\s*Szene\b/im,
        /^Szene\s+(\d+)\b/im,
        /^(Erste?|Zweite?|Dritte?)\s+Szene\b/im,
        /^(\d+)\.\s*Szene\s*[-–—/:]\s*(.+)/im,
        /^(Erster?|Zweiter?|Dritter?)\s+Auftritt\b/im,
        /^(\d+)\.\s*Auftritt\b/im,
        /^Scene\s+(\d+)\b/im,
        /^Scène\s+(\d+)\b/im
      ],
      bild: [
        /^(\d+)\.\s*$/m,           // Nur "1." auf eigener Zeile
        /^Bild\s+(\d+)\b/im,
        /^(\d+)\.\s*Bild\b/im,
        /^([A-Z])\.\s*$/m          // "A." "B." für Monologe
      ],
      nummeriert: [
        /^(\d+)\.(\d+)\.\s*$/m,    // "1.1." "2.3."
        /^(\d+)\.(\d+)\s+/m        // "1.1 Titel"
      ]
    };
    
    /**
     * SCHRITT 1: FIGURENLISTE aus Text extrahieren
     * Das ist der WICHTIGSTE Schritt - mit bekannten Figuren können Dialoge präziser erkannt werden!
     */
    function extractFigurenlisteFromText(text) {
      const lines = text.split('\n');
      const figuren = [];
      let inFigurenliste = false;
      let leerzeileNachHeader = false;
      
      for (let i = 0; i < Math.min(lines.length, 120); i++) {
        const line = lines[i].trim();
        
        // Figurenliste-Header gefunden?
        if (!inFigurenliste) {
          if (FIGURENLISTE_HEADER.some(p => p.test(line))) {
            inFigurenliste = true;
            // Prüfe ob gruppierte Figuren im Header selbst
            const gruppiert = line.match(/^(.+?):\s*([A-ZÄÖÜ][A-ZÄÖÜa-zäöüß\s,]+)$/);
            if (gruppiert && gruppiert[2].includes(',')) {
              const gruppe = gruppiert[1].trim();
              gruppiert[2].split(/,\s*/).forEach(name => {
                if (name.trim().length > 1) {
                  figuren.push({ name: name.trim(), beschreibung: gruppe });
                }
              });
            }
            continue;
          }
        }
        
        // In Figurenliste - Namen extrahieren
        if (inFigurenliste) {
          // Leere Zeile überspringen
          if (!line) {
            leerzeileNachHeader = true;
            continue;
          }
          
          // Ende der Figurenliste erkennen
          if (/^(Ort|Zeit|Handlung|Synopsis|Schauplatz)/i.test(line)) break;
          if (/^(1\.|Erster|ERSTER|Prolog|I\.\s*Akt)/i.test(line)) break;
          if (STRUKTUR_PATTERNS.akt.some(p => p.test(line))) break;
          if (STRUKTUR_PATTERNS.szene.some(p => p.test(line))) break;
          if (STRUKTUR_PATTERNS.bild.some(p => p.test(line))) break;
          
          // Figur mit Beschreibung: "NAME - Beschreibung" oder "NAME, Beschreibung"
          const mitBeschreibung = line.match(/^([A-ZÄÖÜ][A-ZÄÖÜa-zäöüß\s\.\-]{1,30}?)\s*[-–—,]\s*(.+)$/);
          if (mitBeschreibung) {
            figuren.push({
              name: mitBeschreibung[1].trim(),
              beschreibung: mitBeschreibung[2].trim()
            });
            continue;
          }
          
          // Gruppierte Figuren: "Die Bauern: Hans, Fritz, Karl"
          const gruppiert = line.match(/^(.+?):\s*([A-ZÄÖÜ][A-ZÄÖÜa-zäöüß\s,]+)$/);
          if (gruppiert && !gruppiert[1].match(/^(Personen|Figuren|Rollen|Ort|Zeit)/i)) {
            const gruppe = gruppiert[1].trim();
            gruppiert[2].split(/,\s*/).forEach(name => {
              if (name.trim().length > 1) {
                figuren.push({ name: name.trim(), beschreibung: gruppe });
              }
            });
            continue;
          }
          
          // Einfacher Name (GROSSBUCHSTABEN)
          if (/^[A-ZÄÖÜ][A-ZÄÖÜ\s]{1,25}$/.test(line)) {
            figuren.push({ name: line, beschreibung: '' });
            continue;
          }
          
          // Name mit gemischter Schreibweise (ohne Sonderzeichen am Ende)
          if (/^[A-ZÄÖÜa-zäöü][A-ZÄÖÜa-zäöüß\s\.\-]{2,30}$/.test(line) && 
              !line.includes(':') && !line.includes('©')) {
            figuren.push({ name: line, beschreibung: '' });
          }
        }
      }
      
      // Wenn Figurenliste gefunden wurde, gib sie zurück
      if (figuren.length > 0) {
        console.log('✓ Figurenliste gefunden:', figuren.length, 'Figuren:', figuren.map(f => f.name).join(', '));
        return figuren;
      }
      
      // FALLBACK: Figuren aus Dialogen extrahieren (weniger präzise)
      console.log('⚠ Keine Figurenliste gefunden, extrahiere aus Dialogen...');
      return extractFigurenFromDialoge(text);
    }
    
    /**
     * Fallback: Figuren aus Dialog-Mustern extrahieren
     */
    function extractFigurenFromDialoge(text) {
      const figurenSet = new Set();
      const lines = text.split('\n');
      
      const dialogPatterns = [
        /^([A-ZÄÖÜ][A-ZÄÖÜ\s]{1,20}):\s/m,      // NAME:
        /^([A-ZÄÖÜ][A-ZÄÖÜ\s]{1,20})\.\s+[A-Z]/m, // NAME. Text
        /^([A-ZÄÖÜ]{2,15})\s*$/m,                 // NAME (eigene Zeile)
        /^(CHOR|ALLE|MEHRERE|ERZÄHLER|NARRATOR)[:\.]/im
      ];
      
      for (const line of lines) {
        for (const pattern of dialogPatterns) {
          const match = line.match(pattern);
          if (match && match[1]) {
            const name = match[1].trim();
            if (name.length >= 2 && name.length <= 25) {
              figurenSet.add(name);
            }
            break;
          }
        }
      }
      
      console.log('  Aus Dialogen erkannt:', figurenSet.size, 'Figuren');
      return Array.from(figurenSet).map(name => ({ name, beschreibung: '' }));
    }
    
    /**
     * SCHRITT 2: Mit bekannten Figurennamen DIALOGE erkennen
     * Viel präziser als blind nach Mustern zu suchen!
     */
    function findDialogeWithKnownFiguren(text, figurenNamen) {
      const dialoge = [];
      const lines = text.split('\n');
      
      // Pattern aus bekannten Figuren bauen (präzise!)
      const figurenPattern = figurenNamen.length > 0 
        ? new RegExp(`^(${figurenNamen.map(n => escapeRegex(n)).join('|')})\\s*[:\\.)]`, 'im')
        : null;
      
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;
        
        // Mit bekannten Figuren prüfen (präziser!)
        if (figurenPattern) {
          const match = line.match(figurenPattern);
          if (match) {
            dialoge.push({ lineIndex: i, figur: match[1].trim(), line: line });
          }
        }
      }
      
      return dialoge;
    }
    
    // Hilfsfunktion für Regex-Escape
    function escapeRegex(string) {
      return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }
    
    /**
     * SCHRITT 3: Strukturtyp erkennen
     */
    function detectStrukturTyp(text) {
      const lines = text.split('\n').slice(0, 200);
      let scores = { akte: 0, bilder: 0, nummeriert: 0, keine: 0 };
      
      for (const line of lines) {
        const t = line.trim();
        if (STRUKTUR_PATTERNS.akt.some(p => p.test(t))) scores.akte += 3;
        if (STRUKTUR_PATTERNS.szene.some(p => p.test(t))) scores.akte += 2;
        if (STRUKTUR_PATTERNS.bild.some(p => p.test(t))) scores.bilder += 2;
        if (STRUKTUR_PATTERNS.nummeriert.some(p => p.test(t))) scores.nummeriert += 2;
      }
      
      const maxScore = Math.max(...Object.values(scores));
      if (maxScore < 2) return 'keine';
      
      for (const [typ, score] of Object.entries(scores)) {
        if (score === maxScore) return typ;
      }
      return 'akte';
    }
    
    /**
     * SCHRITT 4: Szenen-Grenzen finden
     */
    function findSzenenGrenzen(text, strukturTyp) {
      const lines = text.split('\n');
      const grenzen = [];
      let patterns = [...STRUKTUR_PATTERNS.akt, ...STRUKTUR_PATTERNS.szene];
      
      if (strukturTyp === 'bilder') patterns = [...STRUKTUR_PATTERNS.bild, ...STRUKTUR_PATTERNS.akt];
      if (strukturTyp === 'nummeriert') patterns = [...STRUKTUR_PATTERNS.nummeriert, ...STRUKTUR_PATTERNS.akt];
      
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        for (const pattern of patterns) {
          if (pattern.test(line)) {
            grenzen.push({
              lineIndex: i,
              text: line,
              isAkt: STRUKTUR_PATTERNS.akt.some(p => p.test(line))
            });
            break;
          }
        }
      }
      return grenzen;
    }
    
    /**
     * SCHRITT 5: Metadaten extrahieren (Titel, Autor, Gattung)
     */
    function extractMetadatenFromText(text) {
      const lines = text.split('\n').slice(0, 80);
      const meta = { titel: '', untertitel: '', autor: '', copyright: '', gattung: '' };
      
      const AUTOR_PATTERNS = [
        /^von\s+([A-ZÄÖÜa-zäöü][\wäöüÄÖÜß\s\.\-]+)$/im,
        /^Autor:?\s*(.+)$/im,
        /^Une\s+pièce\s+de\s+(.+)$/im,
        /^Deutsch\s+von\s+(.+)$/im,
        /^By:?\s+(.+)$/im
      ];
      
      const GATTUNG_PATTERNS = [
        /^(Ein|Eine)\s+(Komödie|Tragödie|Drama|Schauspiel|Lustspiel|Musical|Oper|Singspiel)/i,
        /^(Komische\s+)?Oper\s+in\s+.+\s+Akten/i,
        /^(Eine\s+)?(musikalische\s+)?(Chronik|Revue|Komödie|Farce)/i,
        /in\s+(\d+|zwei|drei|vier|fünf)\s+(Akten|Bildern|Szenen|Aufzügen)/i
      ];
      
      for (const line of lines) {
        const t = line.trim();
        if (!t) continue;
        
        // Autor
        for (const p of AUTOR_PATTERNS) {
          const m = t.match(p);
          if (m && !meta.autor) { meta.autor = m[1].trim(); break; }
        }
        
        // Gattung
        for (const p of GATTUNG_PATTERNS) {
          if (p.test(t) && !meta.gattung) { meta.gattung = t; meta.untertitel = t; break; }
        }
        
        // Copyright
        if (/©|Copyright|Alle Rechte/i.test(t) && !meta.copyright) {
          meta.copyright = t;
        }
        
        // Titel (erste substantielle Zeile die kein Autor/Copyright ist)
        if (!meta.titel && t.length >= 3 && t.length <= 80 &&
            !AUTOR_PATTERNS.some(p => p.test(t)) &&
            !GATTUNG_PATTERNS.some(p => p.test(t)) &&
            !/^(©|Alle Rechte|Copyright|\d+$)/i.test(t)) {
          meta.titel = t;
        }
      }
      
      return meta;
    }

    // UNIVERSAL-IMPORT: eine Fläche für alle Formate.
    // Erkennt anhand der Datei selbst, was zu tun ist, und leitet in den richtigen Ablauf.
    function handleUniversalImportFile(source) {
      const file = source && source.files ? source.files[0] : source;
      if (!file) return;
      const name = (file.name || '').toLowerCase();

      // 1) Sicherungskopie (ZIP) → Projekt öffnen inkl. Medien
      if (name.endsWith('.zip')) {
        if (!confirm('«' + file.name + '» als Projekt-Sicherungskopie öffnen?\n\nDas Projekt wird (in einem eigenen Projekt-Slot) geladen.')) return;
        importBackupZip(file).then(() => {
          closeModal('showImportModal');
        }).catch(err => alert('Fehler beim Öffnen des Backups: ' + err.message));
        return;
      }

      // 2) JSON: Projektdatei oder NINA-Exchange? → Inhalt anschauen
      if (name.endsWith('.json')) {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = JSON.parse(e.target.result);
            if (data.format === 'nina-exchange') {
              // Dramera/Propla-Austauschformat → bestehender Abgleich-Ablauf mit Vorschau
              showImportTab('nina');
              handleNinaImportFile({ files: [file] });
            } else if (data._app || data.data) {
              // Rebu-/Dramera-Projektdatei → als Projekt öffnen (eigener Slot)
              if (!confirm('«' + file.name + '» als Projekt öffnen?')) return;
              oeffneProjektAusDaten(data).then(() => {
                closeModal('showImportModal');
              }).catch(err => alert('Fehler beim Öffnen: ' + err.message));
            } else {
              alert('Diese JSON-Datei wird nicht erkannt (weder Projektdatei noch NINA-Exchange).');
            }
          } catch (err) {
            alert('Datei konnte nicht gelesen werden: ' + err.message);
          }
        };
        reader.readAsText(file);
        return;
      }

      // 3) Word/PDF → bestehender Import-Assistent
      if (name.endsWith('.docx') || name.endsWith('.pdf')) {
        showImportTab('word');
        handleDocumentFile({ files: [file] });
        return;
      }

      // 4) Text/Markdown → Text-Import
      if (name.endsWith('.txt') || name.endsWith('.md')) {
        showImportTab('text');
        handleTxtImportFile({ files: [file] });
        return;
      }

      alert('Dieses Dateiformat wird nicht unterstützt.\n\nMöglich sind: .zip, .json, .docx, .pdf, .txt, .md');
    }

        // v3.1: Formatvorlagen-Konverter (Werkbank fmt-* → Rebu format-*)

          if (!html.includes('fmt-')) return html;

        const cleanAndAutoFormatContent = (html) => {
          if (!html || typeof html !== 'string') return html;
          
          const container = document.createElement('div');
          container.innerHTML = html;
          
          // 1. Inline-Styles entfernen, die Formatvorlagen-CSS überschreiben
          container.querySelectorAll('*').forEach(el => {
            if (el.style && el.style.length > 0) {
              ['font-family', 'font-size', 'color', 'background', 'background-color', 
               'line-height', 'letter-spacing', 'text-indent', 'margin-left'].forEach(prop => {
                el.style.removeProperty(prop);
              });
              if (!el.getAttribute('style')?.trim()) el.removeAttribute('style');
            }
            // Leere <span> ohne Klasse auflösen (Word-Artefakte)
            if (el.tagName === 'SPAN' && !el.className && !el.getAttribute('style')) {
              el.replaceWith(...el.childNodes);
            }
            // <mark>-Tags auflösen (gelbe Hervorhebung aus Word)
            if (el.tagName === 'MARK') {
              el.replaceWith(...el.childNodes);
            }
