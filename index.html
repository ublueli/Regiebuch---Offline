          // 2. Auto-Erkennung für unformatierte Blöcke
          const processBlock = (block) => {
            const cls = block.className || '';
            if (/\b(fmt-|format-)/.test(cls)) return;
            
            const text = block.textContent.trim();
            if (!text) return;
            
            // Dialog: NAME: text (beginnt mit Grossbuchstabe, max 40 Zeichen vor Doppelpunkt)
            const dialogMatch = text.match(/^([A-ZÄÖÜ][A-ZÄÖÜa-zäöüß\s\d.\-]{0,39}?):\s*(.*)$/s);
            if (dialogMatch) {
              const figurName = dialogMatch[1].trim().toUpperCase();
              const dialogText = dialogMatch[2] || '';
              block.className = 'format-dialog';
              const newDiv = document.createElement('div');
              newDiv.className = 'format-dialog';
              newDiv.innerHTML = '<span class="figur-name">' + escapeHtml(figurName) + ':</span><span class="dialog-text">' + escapeHtml(dialogText) + '</span>';
              block.replaceWith(newDiv);
              return;
            }
            
            // Regieanweisung: beginnt mit (
            if (text.startsWith('(') && (text.endsWith(')') || text.length > 30)) {
              block.className = 'format-regieanweisung';
              return;
            }
          };
          
          Array.from(container.children).forEach(child => {
            if (child.nodeType === 1) processBlock(child);
          });
          
          return container.innerHTML;
        };
        // === SZENEN IMPORTIEREN (inkl. TEXT!) ===
        const newSzenen = [...existingSzenen];
        const newTextbuch = { ...existingTextbuch };
        const szenenIdMap = {};
        let updatedSzenen = 0;
        
        // Helper: Bestehende Szene finden (v3.1: _exchangeId zuerst, dann Nummer/Titel)
        function findExistingSzene(scene) {
          // 0. Zuerst nach _exchangeId matchen (erkennt Umbenennungen!)
          let match = existingSzenen.find(s => s._exchangeId && s._exchangeId === scene.id);
          if (match) return match;
          
          const importName = (scene.name || '').toLowerCase().trim();
          const importNummer = (scene.number || '').toString().trim();
          
          // 1. Exakter Titel-Match
          match = existingSzenen.find(s => 
            (s.titel || s.name || '').toLowerCase().trim() === importName
          );
          if (match) return match;
          
          // 2. Exakter Nummer-Match
          if (importNummer) {
            match = existingSzenen.find(s => 
              (s.nummer || '').toString().trim() === importNummer
            );
            if (match) return match;
          }
          
          // 3. Nummer am Anfang des Titels (z.B. "1.2" matches "1.2 Die Ankunft")
          if (importNummer) {
            match = existingSzenen.find(s => {
              const titel = (s.titel || s.name || '').trim();
              return titel.startsWith(importNummer + ' ') || titel.startsWith(importNummer + '.');
            });
            if (match) return match;
          }
          
          // 4. Titel enthält Import-Name oder umgekehrt (mindestens 5 Zeichen)
          if (importName.length >= 5) {
            match = existingSzenen.find(s => {
              const existingName = (s.titel || s.name || '').toLowerCase().trim();
              return existingName.length >= 5 && (
                existingName.includes(importName) || importName.includes(existingName)
              );
            });
            if (match) return match;
          }
          
          return null;
        }
        
        let renamedSzenenCount = 0;
        
        for (const scene of (data.scenes || [])) {
          const existing = findExistingSzene(scene);
          
          if (existing) {
            skippedSzenen++;
            szenenIdMap[scene.id] = existing.id;
            
            // Exchange-ID nachträglich setzen
            if (!existing._exchangeId) existing._exchangeId = scene.id;
            
            // Umbenennung erkennen
            const oldTitel = (existing.titel || existing.name || '');
            if (oldTitel.toLowerCase() !== (scene.name || '').toLowerCase()) {
              existing.titel = scene.name;
              existing.name = scene.name;
              renamedSzenenCount++;
            }
            
            // Metadaten ergänzen (nur leere Felder auffüllen, nichts überschreiben)
            let wasUpdated = false;
            
            // Figuren-IDs mappen und IMMER aktualisieren (Szene kann neue Figuren haben)
            if (scene.figures && scene.figures.length > 0) {
              const mappedFiguren = scene.figures.map(fId => {
                if (figurenIdMap[fId]) return figurenIdMap[fId];
                const found = newFiguren.find(f => f.name === fId || f.id === fId || f._exchangeId === fId);
                return found?.id || fId;
              }).filter(Boolean);
              
              if (!existing.figuren || existing.figuren.length === 0) {
                existing.figuren = mappedFiguren;
                wasUpdated = true;
              } else {
                // Neue Figuren ergänzen
                const added = mappedFiguren.filter(id => !existing.figuren.includes(id));
                if (added.length > 0) {
                  existing.figuren = [...existing.figuren, ...added];
                  wasUpdated = true;
                }
              }
            }
            
            if (!existing.zusammenfassung && (scene.summary || scene.description)) {
              existing.zusammenfassung = scene.summary || scene.description;
              wasUpdated = true;
            }
            if (!existing.ort && scene.location) { existing.ort = scene.location; wasUpdated = true; }
            if (!existing.zeit && scene.time) { existing.zeit = scene.time; wasUpdated = true; }
            if (!existing.gruppe && (scene.act || scene.group)) { existing.gruppe = scene.act || scene.group; wasUpdated = true; }
            if (!existing.dauer && scene.estimated_duration) { existing.dauer = scene.estimated_duration; wasUpdated = true; }
            
            if (wasUpdated) updatedSzenen++;
            
            // Text importieren wenn noch keiner vorhanden
            if (scene.content && !newTextbuch[existing.id]) {
              newTextbuch[existing.id] = cleanAndAutoFormatContent(convertContentToRebu(scene.content));
              importedTexte++;
            }
            continue;
          }
          
          const newId = genId();
          szenenIdMap[scene.id] = newId;
          
          // Figuren-IDs mappen
          let figurenIds = [];
          if (scene.figures && Array.isArray(scene.figures)) {
            figurenIds = scene.figures.map(fId => {
              if (figurenIdMap[fId]) return figurenIdMap[fId];
              const foundFig = newFiguren.find(f => f.name === fId || f.id === fId || f._exchangeId === fId);
              return foundFig?.id || fId;
            }).filter(Boolean);
          }
          
          newSzenen.push({
            id: newId,
            nummer: scene.number || String(newSzenen.length + 1),
            titel: scene.name,
            name: scene.name,
            ort: scene.location || '',
            zeit: scene.time || '',
            zusammenfassung: scene.summary || scene.description || '',
            gruppe: scene.act || scene.group || '',
            figuren: figurenIds,
            dauer: scene.estimated_duration || null,
            _exchangeId: scene.id
          });
          
          // ✅ KRITISCH: Szenentext ins Textbuch importieren!
          if (scene.content) {
            newTextbuch[newId] = cleanAndAutoFormatContent(convertContentToRebu(scene.content));
            importedTexte++;
          }
          
          importedSzenen++;
        }
        
        save(KEYS.szenen(projektId), newSzenen);
        save(KEYS.textbuch(projektId), newTextbuch);
        
        // === CUES IMPORTIEREN ===
        let importedCues = 0;
        if (data.cues && data.cues.length > 0) {
          const existingCues = load(KEYS.cues(projektId), []);
          const newCues = [...existingCues];
          
          for (const cue of data.cues) {
            const szeneId = szenenIdMap[cue.scene_id] || cue.scene_id;
            newCues.push({
              id: genId(),
              szeneId: szeneId,
              typ: cue.cue_type || cue.type || 'lx',
              nummer: cue.cue_number || cue.number || newCues.length + 1,
              beschreibung: cue.description || '',
              ankerText: cue.anchor_text || '',
              dauer: cue.duration || ''
            });
            importedCues++;
          }
          
          save(KEYS.cues(projektId), newCues);
          state.cues = newCues;
        }
        
        // === PERSONEN IMPORTIEREN (Ensemble + Künstlerisches Team) ===
        // Id-basiert zusammenführen statt ersetzen: bestehende Einträge bleiben
        // erhalten, leere Felder werden gefüllt, und echte Widersprüche (z.B. eine
        // geänderte Adresse) kommen zur Feld-für-Feld-Rückfrage.
        let importedEnsemble = 0;
        let importedTeam = 0;
        const konflikte = [];
        const parseAdresse = (addr) => {
          if (!addr) return { strasse: '', hausnummer: '', plz: '', ort: '' };
          if (typeof addr === 'string') return { strasse: addr, hausnummer: '', plz: '', ort: '' };
          return { strasse: addr.street || '', hausnummer: addr.number || '', plz: addr.zip || '', ort: addr.city || '' };
        };
        const mergeFeld = (kategorie, obj, feld, eingehendRaw, feldLabel, personLabel) => {
          const eingehend = (eingehendRaw == null) ? '' : String(eingehendRaw);
          const aktuell = (obj[feld] == null) ? '' : String(obj[feld]);
          if (!eingehend || eingehend === aktuell) return;
          if (!aktuell) { obj[feld] = eingehend; return; }
          konflikte.push({ kategorie, id: obj.id, feld, feldLabel, personLabel, aktuell, eingehend });
        };
        const mergeAdresse = (kategorie, obj, addr, personLabel) => {
          const inc = parseAdresse(addr);
          const incStr = [inc.strasse, inc.hausnummer, inc.plz, inc.ort].filter(Boolean).join(' ').trim();
          const curStr = ([obj.strasse, obj.hausnummer, obj.plz, obj.ort].filter(Boolean).join(' ').trim()) || (obj.adresse || '');
          if (!incStr || incStr === curStr) return;
          if (!curStr) { obj.strasse = inc.strasse; obj.hausnummer = inc.hausnummer; obj.plz = inc.plz; obj.ort = inc.ort; return; }
          konflikte.push({ kategorie, id: obj.id, feld: 'adresse', feldLabel: 'Adresse', personLabel, aktuell: curStr, eingehend: incStr, adresseParts: inc });
        };

        if (data.persons && data.persons.length > 0) {
          const ensembleList = (state.ensemble || []).slice();
          const teamList = (state.team || []).slice();

          for (const person of data.persons) {
            if (person.category === 'ensemble') {
              const personCastings = (data.castings || []).filter(c => c.person_id === person.id);
              const rolleIds = personCastings.map(c => figurenIdMap[c.figure_id] || c.figure_id).filter(Boolean);
              let ex = person.id ? ensembleList.find(e => (e._ninaId && e._ninaId === person.id) || e.id === person.id) : null;
              if (!ex) ex = ensembleList.find(e => !e._ninaId && (e.name || '').toLowerCase() === (person.name || '').toLowerCase());
              if (ex) {
                if (person.id && !ex._ninaId) ex._ninaId = person.id;
                const label = ex.name || person.name || '';
                mergeFeld('ensemble', ex, 'name', person.name, 'Name', label);
                mergeFeld('ensemble', ex, 'email', person.email, 'E-Mail', label);
                mergeFeld('ensemble', ex, 'telefon', person.phone, 'Telefon', label);
                mergeAdresse('ensemble', ex, person.address, label);
                if ((!ex.rolleIds || ex.rolleIds.length === 0) && rolleIds.length) ex.rolleIds = rolleIds;
              } else {
                const a = parseAdresse(person.address);
                ensembleList.push({
                  id: person.id || genId(), _ninaId: person.id || null,
                  name: person.name || 'Unbenannt', email: person.email || '', telefon: person.phone || '',
                  strasse: a.strasse, hausnummer: a.hausnummer, plz: a.plz, ort: a.ort,
                  notizen: person.notes || '', rolleIds: rolleIds
                });
                importedEnsemble++;
              }
            } else if (person.category === 'artistic_team') {
              let ex = person.id ? teamList.find(e => (e._ninaId && e._ninaId === person.id) || e.id === person.id) : null;
              if (!ex) ex = teamList.find(e => !e._ninaId && (e.name || '').toLowerCase() === (person.name || '').toLowerCase());
              if (ex) {
                if (person.id && !ex._ninaId) ex._ninaId = person.id;
                const label = ex.name || person.name || '';
                mergeFeld('team', ex, 'name', person.name, 'Name', label);
                mergeFeld('team', ex, 'funktion', person.function || person.role, 'Funktion', label);
                mergeFeld('team', ex, 'email', person.email, 'E-Mail', label);
                mergeFeld('team', ex, 'telefon', person.phone, 'Telefon', label);
                mergeAdresse('team', ex, person.address, label);
              } else {
                const a = parseAdresse(person.address);
                teamList.push({
                  id: person.id || genId(), _ninaId: person.id || null,
                  name: person.name || 'Unbenannt', funktion: person.function || person.role || '',
                  email: person.email || '', telefon: person.phone || '',
                  strasse: a.strasse, hausnummer: a.hausnummer, plz: a.plz, ort: a.ort,
                  notizen: person.notes || ''
                });
                importedTeam++;
              }
            }
          }

          state.ensemble = ensembleList;
          save(KEYS.ensemble(projektId), state.ensemble);
          state.team = teamList;
          save(KEYS.team(projektId), state.team);
        }
        
        // === PROBEPLAN IMPORTIEREN ===
        let importedProben = 0;
        
        if (data.rehearsals && data.rehearsals.length > 0) {
          const newProbeplan = [];
          
          for (const reh of data.rehearsals) {
            // Szenen-IDs mappen
            const szeneIds = (reh.scene_ids || []).map(sid => {
              return szenenIdMap[sid] || sid;
            }).filter(Boolean);
            
            const startTime = reh.start_time ? reh.start_time.substring(0, 5) : '';
            const endTime = reh.end_time ? reh.end_time.substring(0, 5) : '';
            const zeit = startTime && endTime ? `${startTime}–${endTime}` : startTime || '';
            
            newProbeplan.push({
              id: reh.id || genId(),
              datum: reh.date || '',
              zeit: zeit,
              ort: reh.location || '',
              typ: reh.rehearsal_type || '',
              notizen: reh.notes || '',
              szeneIds: szeneIds
            });
            importedProben++;
          }
          
          state.probeplan = newProbeplan;
          save(KEYS.probeplan(projektId), state.probeplan);
        }
        
        // State aktualisieren
        state.figuren = newFiguren;
        state.szenen = newSzenen;
        state.textbuch = newTextbuch;
        
        // Cloud-Sync wenn aktiv
        if (isCloudMode && currentCloudProjectId) {
          // Projekt-Meta in Cloud
          await db.from('projects').update({
            name: state.projektMeta.titel,
            author: state.projektMeta.autor,
            subtitle: state.projektMeta.untertitel,
            tagline: state.projektMeta.tagline,
            logline: state.projektMeta.logline,
            premiere_date: state.projektMeta.premiere || null,
            venue: state.projektMeta.spielort
          }).eq('id', currentCloudProjectId);
          
          // Neue Figuren in Cloud
          for (const fig of newFiguren) {
            if (!existingFiguren.find(ef => ef.id === fig.id)) {
              await db.from('figures').upsert({
                id: fig.id,
                project_id: currentCloudProjectId,
                name: fig.name,
                abbreviation: fig.kuerzel,
                description: fig.beschreibung,
                color: fig.farbe,
                figure_type: fig.typ,
                want: fig.want,
                need: fig.need
              });
            }
          }
          
          // Neue Szenen in Cloud (inkl. Text!)
          for (const sz of newSzenen) {
            if (!existingSzenen.find(es => es.id === sz.id)) {
              await db.from('scenes').upsert({
                id: sz.id,
                project_id: currentCloudProjectId,
                number: sz.nummer,
                name: sz.titel || sz.name,
                title: sz.titel,
                description: sz.zusammenfassung,
                location: sz.ort,
                time_of_day: sz.zeit,
                scene_group: sz.gruppe
              });
              
              // ✅ Szenentext in Cloud speichern!
              if (newTextbuch[sz.id]) {
                await db.from('scene_texts').upsert({
                  scene_id: sz.id,
                  project_id: currentCloudProjectId,
                  content: newTextbuch[sz.id]
                });
              }
            }
          }
        }
        
        closeModal('showImportModal');
        render();
        
        // Erfolgsmeldung
        let msg = '✅ NINA-Exchange v3.0 Import erfolgreich!\n\n';
        msg += '👤 Figuren: ' + importedFiguren + ' neu';
        if (skippedFiguren > 0) msg += ', ' + skippedFiguren + ' erkannt';
        if (renamedFigurenCount > 0) msg += ', ' + renamedFigurenCount + ' umbenannt';
        msg += '\n🎬 Szenen: ' + importedSzenen + ' neu';
        if (skippedSzenen > 0) msg += ', ' + skippedSzenen + ' erkannt';
        if (renamedSzenenCount > 0) msg += ', ' + renamedSzenenCount + ' umbenannt';
        if (updatedSzenen > 0) msg += ', ' + updatedSzenen + ' ergänzt';
        msg += '\n📝 Texte: ' + importedTexte + ' importiert';
        if (importedCues > 0) msg += '\n🎛️ Cues: ' + importedCues + ' importiert';
        if (importedEnsemble > 0) msg += '\n🎭 Ensemble: ' + importedEnsemble + ' Personen';
        if (importedTeam > 0) msg += '\n🎨 Künstl. Team: ' + importedTeam + ' Personen';
        if (importedProben > 0) msg += '\n📅 Probeplan: ' + importedProben + ' Termine';
        
        if (renamedFiguren.length > 0) {
          msg += '\n\n🔄 Umbenennungen:\n';
          renamedFiguren.forEach(r => { msg += '   ' + r.oldName + ' → ' + r.newName + '\n'; });
        }
        
        if (state.projektMeta.autor) {
          msg += '\n\n✍️ Autor: ' + state.projektMeta.autor;
        }
        
        if (isCloudMode) {
          msg += '\n\n☁️ Daten wurden in die Cloud synchronisiert.';
        }

        if (konflikte.length > 0) {
          msg += '\n\n⚠️ ' + konflikte.length + ' Unterschied(e) bei Personen gefunden – gleich kannst du Feld für Feld entscheiden, was übernommen wird.';
        }

        alert(msg);

        ninaImportData = null;

        if (konflikte.length > 0) {
          state.pendingKonflikte = konflikte;
          state.showKonfliktModal = true;
          render();
        }

      } catch (err) {
        console.error('NINA Import Fehler:', err);
        alert('❌ Import fehlgeschlagen: ' + err.message);
      }
    }

    // ============================================
    // WIDERSPRUCHS-RÜCKFRAGE beim Personen-Abgleich (feldweise)
    // ============================================
    function renderKonfliktModal() {
      const konflikte = state.pendingKonflikte || [];
      const catLabel = { ensemble: 'Ensemble', team: 'Team' };
      const groups = {};
      konflikte.forEach((c, i) => {
        const k = c.kategorie + '|' + c.id;
        if (!groups[k]) groups[k] = { label: c.personLabel, cat: c.kategorie, items: [] };
        groups[k].items.push({ c, i });
      });
      let rows = '';
      Object.values(groups).forEach(g => {
        rows += `<div class="border border-gray-200 rounded-lg p-3 mb-2"><div class="font-semibold text-sm mb-2">${catLabel[g.cat] || ''}: ${escapeHtml(g.label || '—')}</div>`;
        g.items.forEach(({ c, i }) => {
          rows += `<label class="flex items-start gap-2 py-1 text-sm" style="cursor:pointer;">
            <input type="checkbox" data-idx="${i}" style="margin-top:4px;">
            <span style="flex:1;"><span class="text-gray-500">${escapeHtml(c.feldLabel)}:</span>
            <span style="text-decoration:line-through;color:#9ca3af;">${escapeHtml(c.aktuell)}</span>
            <span class="text-gray-400">→</span>
            <span style="color:#1d4ed8;font-weight:500;">${escapeHtml(c.eingehend)}</span></span>
          </label>`;
        });
        rows += `</div>`;
      });
      return `
        <div class="modal-overlay" role="dialog" aria-modal="true" onclick="closeModal('showKonfliktModal')">
          <div class="modal-content" style="max-width:640px;max-height:85vh;overflow-y:auto;" onclick="event.stopPropagation()">
            <div class="modal-header">
              <h2 class="text-lg font-semibold">⚠️ Unterschiede beim Abgleich</h2>
              <button class="text-gray-400 hover:text-gray-600" onclick="closeModal('showKonfliktModal')">✕</button>
            </div>
            <div class="modal-body">
              <p class="text-sm text-gray-500 mb-3">Diese Angaben unterscheiden sich zwischen Rebu und dem Import aus Propla. Häkchen setzen bei allem, was du übernehmen willst – alles Übrige bleibt, wie es ist.</p>
              <div class="mb-3"><button class="btn btn-outline btn-sm" onclick="toggleAllKonflikte()">Alle auswählen / abwählen</button></div>
              ${rows}
              <div class="flex justify-end gap-3 mt-4">
                <button class="btn btn-outline" onclick="closeModal('showKonfliktModal')">Nichts ändern</button>
                <button class="btn btn-primary" onclick="applyKonflikte()">Ausgewählte übernehmen</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function toggleAllKonflikte() {
      const boxes = document.querySelectorAll('input[type="checkbox"][data-idx]');
      const anyUnchecked = Array.from(boxes).some(b => !b.checked);
      boxes.forEach(b => { b.checked = anyUnchecked; });
    }

    function applyKonflikte() {
      const konflikte = state.pendingKonflikte || [];
      const chosen = [];
      document.querySelectorAll('input[type="checkbox"][data-idx]').forEach(b => {
        if (b.checked) { const c = konflikte[parseInt(b.dataset.idx, 10)]; if (c) chosen.push(c); }
      });
      let touchedE = false, touchedT = false;
      chosen.forEach(c => {
        const list = c.kategorie === 'team' ? (state.team || []) : (state.ensemble || []);
        const obj = list.find(o => o.id === c.id);
        if (!obj) return;
        if (c.feld === 'adresse' && c.adresseParts) {
          obj.strasse = c.adresseParts.strasse; obj.hausnummer = c.adresseParts.hausnummer;
          obj.plz = c.adresseParts.plz; obj.ort = c.adresseParts.ort;
        } else {
          obj[c.feld] = c.eingehend;
        }
        if (c.kategorie === 'team') touchedT = true; else touchedE = true;
      });
      if (touchedE) save(KEYS.ensemble(state.projektId), state.ensemble);
      if (touchedT) save(KEYS.team(state.projektId), state.team);
      const n = chosen.length;
      state.showKonfliktModal = false;
      state.pendingKonflikte = [];
      render();
      alert(n > 0 ? n + ' Änderung(en) übernommen.' : 'Nichts geändert.');
    }
    
    // Neue universelle Dokumenten-Handler-Funktion
    async function handleDocumentFile(input) {
      const file = input.files[0];
      if (!file) return;
      
      const fileName = file.name.toLowerCase();
      const isPDF = fileName.endsWith('.pdf');
      const isWord = fileName.endsWith('.docx');
      
      document.getElementById('import-word-name').textContent = '⏳ ' + file.name + ' wird gelesen...';
      document.getElementById('import-format-info').style.display = 'none';
      
      try {
        let result;
        
        if (isPDF) {
          result = await extractPDFContent(file);
        } else if (isWord) {
          result = await extractWordContent(file);
        } else {
          throw new Error('Nicht unterstütztes Format. Bitte .docx oder .pdf verwenden.');
        }
        
        importedWordData = {
          html: result.html,
          text: result.text,
          richText: result.richText, // Text mit Formatierungsmarkern
          formatInfo: result.formatInfo,
          fileName: file.name,
          fileType: isPDF ? 'pdf' : 'word'
        };
        
        // UI aktualisieren
        document.getElementById('import-word-name').textContent = '✅ ' + file.name;
        
        // Format-Info anzeigen
        if (result.formatInfo && Object.keys(result.formatInfo).length > 0) {
          const formatDetails = document.getElementById('import-format-details');
          let infoHtml = [];
          
          // Echte Formatvorlagen (höchste Priorität)
          if (result.hasRealStyles) {
            infoHtml.push('<strong style="color: #059669;">✓ Echte Formatvorlagen erkannt!</strong>');
            if (result.formatInfo.stuecktitelCount > 0) infoHtml.push(`📖 ${result.formatInfo.stuecktitelCount}x Stücktitel`);

    // PDF-Datei mit pdf.js laden
    async function extractPDFContent(file) {
      const arrayBuffer = await file.arrayBuffer();
      // isEvalSupported:false neutralisiert CVE-2024-4367 (Code-Ausfuehrung ueber
      // praeparierte Schriften in einem importierten PDF). Offizielle Mitigation
      // fuer Versionen vor 4.2.67.
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer, isEvalSupported: false }).promise;
      
      let fullText = '';
      let richText = '';
      let formatInfo = {
        italicCount: 0,
        boldCount: 0,
        dialogCount: 0,
        headingCount: 0
      };
      
      // Alle Seiten durchgehen
      for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        const page = await pdf.getPage(pageNum);
        const textContent = await page.getTextContent();
        
        let pageText = '';
        let lastY = null;
        let lastFontSize = null;
        
        for (const item of textContent.items) {
          const text = item.str;
          const y = item.transform[5];
          const fontName = item.fontName || '';
          const fontSize = item.height || 12;
          
          // Neue Zeile erkennen (Y-Position ändert sich)
          if (lastY !== null && Math.abs(y - lastY) > 5) {
            pageText += '\n';
            richText += '\n';
          }
          
          // Formatierung aus Schriftname erkennen
          const isItalic = fontName.toLowerCase().includes('italic') || fontName.toLowerCase().includes('oblique');
          const isBold = fontName.toLowerCase().includes('bold');
          const isHeading = fontSize > 14;
          
          if (isItalic) {
            formatInfo.italicCount++;
            richText += `[[ITALIC:${text}]]`;
          } else if (isBold) {
            formatInfo.boldCount++;
            richText += `[[BOLD:${text}]]`;
          } else if (isHeading && text.length > 2) {
            formatInfo.headingCount++;
            richText += `[[HEADING:${text}]]`;
          } else {
            richText += text;
          }
          
          pageText += text;
          lastY = y;
          lastFontSize = fontSize;
        }
        
        fullText += pageText + '\n\n';
      }
      
      // Dialog-Muster zählen
      formatInfo.dialogCount = (fullText.match(/^[A-ZÄÖÜ][A-ZÄÖÜ\s]{1,20}[:\.]/gm) || []).length;
      
      return {
        html: fullText.replace(/\n/g, '<br>'),
        text: fullText.trim(),
        richText: richText.trim(),
        formatInfo: formatInfo
      };
    }

    function importWithPatternAnalysis(data, figuren) {
      const text = data.text;
      const richText = data.richText || text;
      const lines = text.split('\n');
      
      // Figurennamen für Dialog-Erkennung
      const figurenNamen = figuren.map(f => f.name);
      console.log('Bekannte Figuren:', figurenNamen.join(', '));
      
      // Strukturtyp erkennen
      const strukturTyp = detectStrukturTyp(text);
      console.log('Erkannter Strukturtyp:', strukturTyp);
      
      // Metadaten extrahieren
      const meta = extractMetadatenFromText(text);
      console.log('Metadaten:', meta);
      
      // Szenen-Grenzen finden
      const grenzen = findSzenenGrenzen(text, strukturTyp);
      console.log('Szenen-Grenzen gefunden:', grenzen.length);
      
      // Szenen erstellen
      const newSzenen = [];
      const newTextbuch = {};
      let currentAkt = '1';
      
      if (grenzen.length === 0) {
        // Keine Struktur erkannt - als eine Szene importieren
        console.log('Keine Szenen-Grenzen, importiere als eine Szene');
        const szene = {
          id: genId(),
          nummer: '1.1',
          titel: meta.titel || data.fileName.replace(/\.(docx|pdf)$/i, ''),
          gruppe: state.projektMeta.eigeneGruppen?.[0] || 'Erster Akt',
          zusammenfassung: meta.gattung || '',
          figuren: []
        };
        newSzenen.push(szene);
        newTextbuch[szene.id] = formatImportedText(richText);
      } else {
        // Szenen aus erkannten Grenzen erstellen
        for (let i = 0; i < grenzen.length; i++) {
          const grenze = grenzen[i];
          const nextGrenze = grenzen[i + 1];
          
          // Akt-Wechsel erkennen
          if (grenze.isAkt) {
            const aktMatch = grenze.text.match(/(\d+)/);
            if (aktMatch) {
              currentAkt = aktMatch[1];
            } else if (/prolog|vorspiel/i.test(grenze.text)) {
              currentAkt = '0';
            } else {
              currentAkt = (parseInt(currentAkt) + 1).toString();
            }
          }
          
          // Szenen-Nummer berechnen
          const szenenInAkt = newSzenen.filter(s => s.gruppe === currentAkt && !s.nummer.endsWith('.0')).length;
          const istAktHeader = grenze.isAkt && !STRUKTUR_PATTERNS.szene.some(p => p.test(grenze.text));
          const nummer = istAktHeader ? currentAkt + '.0' : currentAkt + '.' + (szenenInAkt + 1);
          
          // Text für diese Szene extrahieren
          const startLine = grenze.lineIndex;
          const endLine = nextGrenze ? nextGrenze.lineIndex : lines.length;
          const szeneText = lines.slice(startLine, endLine).join('\n');
          
          // Titel bereinigen
          let titel = grenze.text
            .replace(/^\d+\.\s*(Szene|Akt|Bild|Auftritt|Aufzug)\s*[-–—/:]*\s*/i, '')
            .replace(/^(Erster?|Zweiter?|Dritter?)\s+(Szene|Akt|Auftritt|Aufzug)\s*[-–—/:]*\s*/i, '')
            .substring(0, 60);
          if (!titel || titel === grenze.text) titel = grenze.text.substring(0, 50);
          
          const szene = {
            id: genId(),
            nummer: nummer,
            titel: titel,
            gruppe: currentAkt,
            zusammenfassung: '',
            figuren: []
          };
          newSzenen.push(szene);
          newTextbuch[szene.id] = formatImportedText(szeneText);
        }
      }
      
      // Figuren-Objekte erstellen
      const newFiguren = figuren.map(f => ({
        id: genId(),
        name: f.name || 'Unbenannt',
        kuerzel: (f.name || '').substring(0, FIGUR_ABBREV_LENGTH).toUpperCase(),
        beschreibung: f.beschreibung || ''
      }));
      
      // Figuren den Szenen zuordnen (basierend auf Vorkommen im Text)
      newSzenen.forEach(szene => {
        const szeneText = newTextbuch[szene.id] || '';
        szene.figuren = newFiguren
          .filter(f => {
            // Prüfe ob Figur in dieser Szene spricht/vorkommt
            const namePattern = new RegExp(escapeRegex(f.name) + '\\s*[:\\.\\)]', 'i');
            return namePattern.test(szeneText);
          })
          .map(f => f.id);
      });
      
      // State aktualisieren
      state.szenen = newSzenen;
      state.textbuch = newTextbuch;
      state.figuren = newFiguren;
      state.aktiveSzene = newSzenen[0]?.id;
      
      // Projekt-Meta aktualisieren
      if (meta.titel) state.projektMeta.titel = meta.titel;
      if (meta.gattung) state.projektMeta.untertitel = meta.gattung;
      if (meta.autor) state.projektMeta.autor = meta.autor;
      if (meta.copyright) state.projektMeta.copyright = meta.copyright;
      
      state.projektMeta.strukturTyp = strukturTyp === 'bilder' ? 'bilder' : 
                                       strukturTyp === 'nummeriert' ? 'sequenzen' : 'akte';
      
      if (!state.projektMeta.titel) {
        state.projektMeta.titel = data.fileName.replace(/\.(docx|pdf)$/i, '');

      const projekte = load(KEYS.projekte, []);

      if (idx !== -1 && state.projektMeta.titel) {
        projekte[idx].name = state.projektMeta.titel;
        save(KEYS.projekte, projekte);
      }

      importedWordData = null;
      render();
      
      console.log('=== IMPORT FERTIG ===');
      
      alert(`✅ Import erfolgreich!

📄 ${state.projektMeta.titel || 'Stück'}
👤 ${newFiguren.length} Figuren erkannt
🎬 ${newSzenen.length} Szenen erstellt
🏛️ Struktur: ${strukturTyp === 'bilder' ? 'Bilder' : strukturTyp === 'nummeriert' ? 'Nummeriert' : 'Akte/Szenen'}

Die Figuren wurden aus der Figurenliste erkannt und den Szenen zugeordnet.`);

    // v2.4.1: Import mit Formatvorlagen – nur Formatierung übernehmen, keine Struktur-Erkennung
    function importWithStylesSimple(richText, plainText, fileName, meta, mergeMode) {
      // Den gesamten Text als EINE Szene importieren
      // aber mit korrekter Formatierung (Dialog, Regie, Lied etc.)
      
      const lines = richText.split('\n');
      let stuecktitel = '';
      let untertitel = '';
      let formattedHtml = [];
      
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed) {
          formattedHtml.push('<p class="format-standard"><br></p>');
          continue;
        }
        
        // Stücktitel extrahieren (für Projekt-Meta)
        if (trimmed.includes('[[STUECKTITEL:')) {
          const match = trimmed.match(/\[\[STUECKTITEL:([^\]]+)\]\]/);
          if (match) stuecktitel = match[1].trim();
          formattedHtml.push('<p class="format-standard"><strong>' + escapeHtml(match ? match[1].trim() : trimmed) + '</strong></p>');
          continue;
        }
        
        // Untertitel
        if (trimmed.includes('[[UNTERTITEL:')) {
          const match = trimmed.match(/\[\[UNTERTITEL:([^\]]+)\]\]/);
          if (match) untertitel += (untertitel ? ' ' : '') + match[1].trim();
          formattedHtml.push('<p class="format-standard"><em>' + escapeHtml(match ? match[1].trim() : trimmed) + '</em></p>');
          continue;
        }
        
        // Akt-Titel → als Akt-Format
        if (trimmed.includes('[[AKT:')) {
          const match = trimmed.match(/\[\[AKT:([^\]]+)\]\]/);
          const text = match ? match[1].trim() : trimmed;
          formattedHtml.push('<p class="format-akt-titel">' + escapeHtml(text) + '</p>');
          continue;
        }

        // Szene-Titel → als Szenen-Format
        if (trimmed.includes('[[SZENE:')) {
          const match = trimmed.match(/\[\[SZENE:([^\]]+)\]\]/);
          const text = match ? match[1].trim() : trimmed;
          formattedHtml.push('<p class="format-szene-titel">' + escapeHtml(text) + '</p>');
          continue;
        }
        
        // Dialog → als Dialog-Format
        if (trimmed.includes('[[DIALOG:')) {
          const match = trimmed.match(/\[\[DIALOG:([^\]]+)\]\]/);
          const text = match ? match[1].trim() : trimmed;
          const dialogMatch = text.match(/^([A-ZÄÖÜa-zäöüß\s.\-]+?)\s*[:.](.*)/);
          if (dialogMatch) {
            formattedHtml.push('<div class="format-dialog"><div class="dialog-grid"><span class="figur-name">' + escapeHtml(dialogMatch[1].trim()) + '</span><span class="dialog-text">' + escapeHtml(dialogMatch[2].trim()) + '</span></div></div>');
          } else {
            formattedHtml.push('<p class="format-dialog">' + escapeHtml(text) + '</p>');
          }
          continue;
        }
        
        // Regieanweisung → als Regie-Format
        if (trimmed.includes('[[REGIE:')) {
          const match = trimmed.match(/\[\[REGIE:([^\]]+)\]\]/);
          let text = match ? match[1].trim() : trimmed;
          if (!text.startsWith('(')) text = '(' + text;
          if (!text.endsWith(')')) text = text + ')';
          formattedHtml.push('<p class="format-regieanweisung">' + escapeHtml(text) + '</p>');
          continue;
        }

        // Lied → als Lied-Format
        if (trimmed.includes('[[LIED:')) {
          const match = trimmed.match(/\[\[LIED:([^\]]+)\]\]/);
          const text = match ? match[1].trim() : trimmed;
          formattedHtml.push('<p class="format-lied">' + escapeHtml(text) + '</p>');
          continue;
        }
        
        // Heading Fallback
        if (trimmed.includes('[[HEADING1:') || trimmed.includes('[[HEADING2:') || trimmed.includes('[[HEADING3:') || trimmed.includes('[[HEADING:')) {

    const CHUNK_MAX_SIZE = 25000;

    function splitTextIntoChunks(text, maxSize = CHUNK_MAX_SIZE) {
      if (text.length <= maxSize) return [text];
      const chunks = [];
      const splitPatterns = [
        /^(?:ERSTER|ZWEITER|DRITTER|VIERTER|FÜNFTER|\d+\.)\s*(?:AKT|AUFZUG|TEIL)\b/im,
        /^(?:Act|Acte)\s+(?:\d+|[IVX]+)/im,
        /^(?:\d+\.)\s*(?:Szene|SZENE|Auftritt|AUFTRITT)\b/im,
        /^(?:Szene|Scene|Scène)\s+\d+/im,
        /\n\n\n+/,
        /\n\n/
      ];
      let remaining = text;
      while (remaining.length > maxSize) {
        let bestSplit = -1;
        const searchFrom = Math.floor(maxSize * 0.6);
        const chunk = remaining.substring(0, maxSize);
        for (const pat of splitPatterns) {
          const searchArea = chunk.substring(searchFrom);
          const m = searchArea.match(pat);
          if (m) {
            bestSplit = searchFrom + m.index;
            break;
          }
        }
        if (bestSplit <= 0) bestSplit = chunk.lastIndexOf('\n', maxSize - 1);
        if (bestSplit <= 0) bestSplit = maxSize;
        chunks.push(remaining.substring(0, bestSplit));
        remaining = remaining.substring(bestSplit).trimStart();
      }
      if (remaining.length > 0) chunks.push(remaining);
      return chunks;
    }

      const response = await rebuFetchWithTimeout('https://api.anthropic.com/v1/messages', {
        method: 'POST',

          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',

          messages: [{ role: 'user', content: prompt }]
        })
      }, 180000);

      if (!response.ok) {
        const errText = await response.text();
        throw new Error('API-Fehler ' + response.status + ': ' + errText.substring(0, 200));
      }

      const data = await response.json();
      // Abgeschnittene Antwort (Token-Limit) frueh und verstaendlich melden,
      // statt sie erst am kaputten JSON scheitern zu lassen.
      if (data.stop_reason === 'max_tokens') {
        throw new Error('Die KI-Antwort für Abschnitt ' + (chunkIndex + 1) + ' wurde wegen des Token-Limits abgeschnitten. Bitte den Text in kürzere Abschnitte aufteilen.');
      }
      if (!data.content || !data.content[0] || typeof data.content[0].text !== 'string') {
        throw new Error('Unerwartete KI-Antwort für Abschnitt ' + (chunkIndex + 1) + '.');
      }
      const aiText = data.content[0].text;

      // Robustes JSON-Parsen
      let json;
      try {
        const codeBlock = aiText.match(/```(?:json)?\s*([\s\S]*?)```/);
        const raw = codeBlock ? codeBlock[1] : aiText.match(/\{[\s\S]*\}/)?.[0] || aiText;
        const cleaned = raw.replace(/[\x00-\x08\x0b\x0c\x0e-\x1f]/g, '')
          .replace(/,\s*([}\]])/g, '$1');
        json = JSON.parse(cleaned);
      } catch (e) {
        console.error('JSON Parse Error für Chunk ' + chunkIndex + ':', aiText.substring(0, 500));
        throw new Error('KI-Antwort für Abschnitt ' + (chunkIndex + 1) + ' konnte nicht verarbeitet werden.');
      }
      return json;

    function mergeChunkResults(results) {
      const merged = {
        titel: '', untertitel: '', autor: '', uebersetzer: '', copyright: '',
        tagline: '', logline: '', strukturTyp: '', istMusical: false,
        figuren: [], beziehungen: [], themen: [], szenen: []
      };

      const figurenMap = new Map();
      const themenSet = new Set();
      const bezSet = new Set();

      results.forEach((r, i) => {
        if (i === 0) {
          merged.titel = r.titel || '';
          merged.untertitel = r.untertitel || '';
          merged.autor = r.autor || '';
          merged.uebersetzer = r.uebersetzer || '';
          merged.copyright = r.copyright || '';
          merged.tagline = r.tagline || '';
          merged.logline = r.logline || '';
          merged.strukturTyp = r.strukturTyp || '';
          merged.istMusical = r.istMusical || false;
        }

        (r.figuren || []).forEach(f => {
          const key = (f.name || '').toLowerCase();
          if (!figurenMap.has(key)) {
            figurenMap.set(key, { ...f, _selected: true });
          } else {
            const existing = figurenMap.get(key);
            Object.keys(f).forEach(k => {
              if (f[k] && !existing[k]) existing[k] = f[k];
            });
          }
        });

        (r.beziehungen || []).forEach(b => {
          const key = [b.figur1, b.figur2].sort().join('↔').toLowerCase();
          if (!bezSet.has(key)) {
            bezSet.add(key);
            merged.beziehungen.push(b);
          }
        });

        (r.themen || []).forEach(t => themenSet.add(t));
        merged.szenen.push(...(r.szenen || []));
      });

      merged.figuren = Array.from(figurenMap.values());
      merged.themen = Array.from(themenSet);
      return merged;
    }

    // Haupt-Orchestrator: KI-Import mit Wizard
    async function doImportWithAI(text, apiKey) {
      const analysisText = importedWordData?.richText || text;
      const formatInfo = importedWordData?.formatInfo || {};
      importFullText = text;

      // Wizard auf "analyzing" setzen
      importWizardStep = 'analyzing';
      importAnalysis = null;
      importProgress = { current: 0, total: 1, phase: 'Text wird vorbereitet...' };
      render();

      try {
        const chunks = splitTextIntoChunks(analysisText);
        importProgress.total = chunks.length;
        const chunkResults = [];
        const knownFiguren = [];

        for (let i = 0; i < chunks.length; i++) {
          importProgress.current = i + 1;
          importProgress.phase = chunks.length > 1
            ? `Abschnitt ${i + 1} von ${chunks.length}...`
            : 'Figuren erkennen → Szenen extrahieren → Themen identifizieren...';
          render();

          const result = await analyzeChunk(chunks[i], i, chunks.length, knownFiguren, apiKey, formatInfo);
          chunkResults.push(result);

          // Bekannte Figuren für nächsten Chunk sammeln
          (result.figuren || []).forEach(f => {
            if (f.name && !knownFiguren.includes(f.name)) knownFiguren.push(f.name);
          });
        }

        importAnalysis = chunks.length > 1 ? mergeChunkResults(chunkResults) : chunkResults[0];
        // Alle Figuren standardmässig ausgewählt
        (importAnalysis.figuren || []).forEach(f => { if (f._selected === undefined) f._selected = true; });

        importWizardStep = 'preview';
        render();

      } catch (error) {
        console.error('KI-Import Fehler:', error);
        importWizardStep = 'upload';
        render();
        if (confirm('KI-Analyse fehlgeschlagen: ' + error.message + '\n\nOhne KI importieren?')) {
          doSimpleWordImport(importedWordData, false);
        }
      }
    }

      // Szenen
      state.szenen = [];

        const szene = {

          gruppe: state.projektMeta.eigeneGruppen?.[0] || 'Erster Akt',

        };

      } else {
        szenenDefs.forEach((sDef, i) => {
          const szene = {
            id: genId(),
            nummer: sDef.nummer || `${Math.floor(i / 5) + 1}.${(i % 5) + 1}`,

            figuren: (sDef.figuren || []).map(fName => {
              const fig = state.figuren.find(f => f.name.toUpperCase() === fName.toUpperCase());
              return fig?.id;
            }).filter(Boolean)
          };
          state.szenen.push(szene);

          // Text-Zuordnung
          let szeneText = '';
          if (sDef.textAnfang && fullText.includes(sDef.textAnfang.substring(0, 20))) {
            const startIdx = fullText.indexOf(sDef.textAnfang.substring(0, 20));
            const nextDef = szenenDefs[i + 1];

            if (nextDef?.textAnfang) {
              const nextStart = fullText.indexOf(nextDef.textAnfang.substring(0, 20), startIdx + 50);
              if (nextStart > startIdx) endIdx = nextStart;
            }
            szeneText = fullText.substring(startIdx, endIdx);
          }
          state.textbuch[szene.id] = formatImportedText(szeneText || `[Szene ${szene.nummer}]`);

      // Eigene Gruppen aus Szenen-Gruppen ableiten
      const gruppenSet = new Set(state.szenen.map(s => s.gruppe).filter(Boolean));
      if (gruppenSet.size > 0) {
        state.projektMeta.eigeneGruppen = Array.from(gruppenSet).sort();

      state.aktiveSzene = state.szenen[0]?.id;
      saveProjektDaten();

      // Wizard zurücksetzen

    // Text für Editor formatieren (mit Marker-Unterstützung)
    function formatImportedText(text) {
      if (!text) return '<p class="format-standard"><br></p>';
      
      // Marker entfernen aber Information nutzen
      let processedText = text;
      
      // Erst Marker in temporäre Tags umwandeln
      processedText = processedText
        // Neue echte Formatvorlagen-Marker
        .replace(/\[\[STUECKTITEL:([^\]]+)\]\]/g, '<STUECKTITEL>$1</STUECKTITEL>')
        .replace(/\[\[UNTERTITEL:([^\]]+)\]\]/g, '<UNTERTITEL>$1</UNTERTITEL>')
        .replace(/\[\[LIED:([^\]]+)\]\]/g, '<LIED>$1</LIED>')
        .replace(/\[\[FIGUR:([^\]]+)\]\]/g, '<FIGUR>$1</FIGUR>')
        .replace(/\[\[HEADING1:([^\]]+)\]\]/g, '<HEADING1>$1</HEADING1>')
        .replace(/\[\[HEADING2:([^\]]+)\]\]/g, '<HEADING2>$1</HEADING2>')
        .replace(/\[\[HEADING3:([^\]]+)\]\]/g, '<HEADING3>$1</HEADING3>')
        // Bestehende Marker
        .replace(/\[\[REGIE:([^\]]+)\]\]/g, '<REGIE>$1</REGIE>')
        .replace(/\[\[DIALOG:([^\]]+)\]\]/g, '<DIALOG>$1</DIALOG>')
        .replace(/\[\[SZENE:([^\]]+)\]\]/g, '<SZENE>$1</SZENE>')
        .replace(/\[\[AKT:([^\]]+)\]\]/g, '<AKT>$1</AKT>')
        .replace(/\[\[HEADING:([^\]]+)\]\]/g, '<HEADING>$1</HEADING>')
        .replace(/\[\[ITALIC:([^\]]+)\]\]/g, '<ITALIC>$1</ITALIC>')
        .replace(/\[\[BOLD:([^\]]+)\]\]/g, '<BOLD>$1</BOLD>');
      
      return processedText
        .split(/\n+/)
        .map(line => {
          line = line.trim();
          if (!line) return '';
          
          // === ECHTE FORMATVORLAGEN (höchste Priorität) ===
          
          // Stücktitel (ignorieren wir im Editor, wird in Projekt-Meta gespeichert)
          if (line.includes('<STUECKTITEL>')) {
            const content = line.replace(/<\/?STUECKTITEL>/g, '').trim();
            return `<p class="format-akt-titel" style="font-size: 18pt; text-align: center;">${content}</p>`;
          }
          
          // Untertitel
          if (line.includes('<UNTERTITEL>')) {
            const content = line.replace(/<\/?UNTERTITEL>/g, '').trim();
            return `<p class="format-standard" style="text-align: center; font-style: italic;">${content}</p>`;
          }
          
          // Akt
          if (line.includes('<AKT>')) {
            const content = line.replace(/<\/?AKT>/g, '').trim();
            return `<p class="format-akt-titel">${content}</p>`;
          }
          
          // Szene
          if (line.includes('<SZENE>')) {
            const content = line.replace(/<\/?SZENE>/g, '').trim();
            return `<p class="format-szene-titel">${content}</p>`;
          }
          
          // Regieanweisung
          if (line.includes('<REGIE>')) {
            let content = line.replace(/<\/?REGIE>/g, '').trim();
            // Klammern hinzufügen falls nicht vorhanden
            if (!content.startsWith('(')) content = '(' + content;
            if (!content.endsWith(')')) content = content + ')';
            return `<p class="format-regieanweisung">${content}</p>`;
          }
          
          // Dialog - MIT Figurenname:Text Erkennung
          if (line.includes('<DIALOG>')) {
            const content = line.replace(/<\/?DIALOG>/g, '').replace(/<\/?[A-Z]+>/g, '').trim();
            // Dialog-Format: NAME: Text oder NAME.Text
            const dialogMatch = content.match(/^([A-ZÄÖÜa-zäöü][A-ZÄÖÜa-zäöüß\s\.\-]*?)\s*[:\.]\s*(.*)$/);
            if (dialogMatch) {
              const figurName = dialogMatch[1].trim();
              const dialogText = dialogMatch[2] || '';
              return `<div class="format-dialog"><span class="figur-name">${figurName}:</span><span class="dialog-text">${dialogText}</span></div>`;
            }
            // Fallback: Ganzer Text als Dialog ohne erkannten Namen
            return `<p class="format-standard">${content}</p>`;
          }
          
          // Lied
          if (line.includes('<LIED>')) {
            const content = line.replace(/<\/?LIED>/g, '').replace(/<\/?[A-Z]+>/g, '').trim();
            return `<p class="format-lied">${content}</p>`;
          }
          
          // Headings als Fallback
          if (line.includes('<HEADING1>') || line.includes('<HEADING2>')) {
            const content = line.replace(/<\/?HEADING[12]>/g, '').trim();
            // Prüfe ob es ein Akt ist
            if (/^(ERSTER|ZWEITER|DRITTER|I+V?|V?I*|\d+\.?)\s*(AKT|AUFZUG|TEIL)/i.test(content) || /^\d+\.\s*Akt/i.test(content)) {
              return `<p class="format-akt-titel">${content}</p>`;
            }
            return `<p class="format-szene-titel">${content}</p>`;
          }
          
          if (line.includes('<HEADING3>') || line.includes('<HEADING>')) {
            const content = line.replace(/<\/?HEADING3?>/g, '').trim();
            return `<p class="format-szene-titel">${content}</p>`;
          }
          
          // Kursiv = Regieanweisung (wenn keine anderen Marker)
          if (line.includes('<ITALIC>') && !line.match(/^[A-ZÄÖÜ]{2,}[:\.]?\s/)) {
            let content = line.replace(/<\/?ITALIC>/g, '').replace(/<\/?[A-Z]+>/g, '').trim();
            if (!content.startsWith('(')) content = '(' + content;
            if (!content.endsWith(')')) content = content + ')';
            return `<p class="format-regieanweisung">${content}</p>`;
          }
          
          // Restliche Marker entfernen
          line = line.replace(/<\/?[A-Z]+[0-9]*>/g, '').trim();
          if (!line) return '';
          
          // === MUSTER-BASIERTE ERKENNUNG (Fallback) ===
          
          // Dialog (NAME: text)
          const dialogMatch = line.match(/^([A-ZÄÖÜ][A-ZÄÖÜa-zäöüß\s\.\-]*?)\s*[:\.]{1}\s*(.+)$/);
          if (dialogMatch && dialogMatch[1].length < 30 && dialogMatch[1].length > 1) {
            return `<div class="format-dialog"><span class="figur-name">${dialogMatch[1].trim()}:</span><span class="dialog-text">${dialogMatch[2]}</span></div>`;
          }
          
          // Regieanweisung (in Klammern)
          if (line.startsWith('(') && line.endsWith(')')) {
            return `<p class="format-regieanweisung">${line}</p>`;
          }
          
          // Akt-Titel
          if (/^(ERSTER|ZWEITER|DRITTER|VIERTER|FÜNFTER|I+V?|V?I*|\d+\.?)\s*(AKT|AUFZUG|TEIL)/i.test(line)) {
            return `<p class="format-akt-titel">${line}</p>`;
          }
          
          // Szenen-Titel (nummeriert)
          if (/^\d+\.\s*(Szene|SZENE)/i.test(line) || /^(SZENE|Szene)\s*\d/i.test(line)) {
            return `<p class="format-szene-titel">${line}</p>`;
          }
          
          // Lied-Erkennung
          if (line.startsWith('🎵') || /^\s*(singt|singend|Lied)/i.test(line)) {
            return `<p class="format-lied">${line}</p>`;
          }
          
          return `<p class="format-standard">${line}</p>`;
        })
        .filter(Boolean)
        .join('\n');
    }
    
    function doImportText() {
      const content = document.getElementById('import-text-content').value.trim();
      if (!content) {
        alert('Bitte Text einfügen.');
        return;
      }
      
      const titel = document.getElementById('import-text-title').value.trim() || 'Importierter Text';
      const nummer = document.getElementById('import-text-nummer').value.trim() || '1.1';
      const ersetzen = document.getElementById('import-text-replace').checked;
      
      // Text zu HTML konvertieren (einfache Absätze)
      let html = content
        .split(/\n\n+/)  // Absätze bei Leerzeilen
        .map(para => para.trim())
        .filter(para => para)
        .map(para => {
          // Einfache Heuristik für Dialog-Erkennung
          const dialogMatch = para.match(/^([A-ZÄÖÜ][A-ZÄÖÜa-zäöüß]*(?:\s+[A-ZÄÖÜ][A-ZÄÖÜa-zäöüß]*)?)[\s]*[:\.]\s*(.+)$/s);
          if (dialogMatch) {
            const figurName = dialogMatch[1].toUpperCase();
            const text = dialogMatch[2].replace(/\n/g, ' ');
            return `<div class="format-dialog"><span class="figur-name">${figurName}:</span><span class="dialog-text">${text}</span></div>`;
          }
          
          // Regieanweisung in Klammern
          if (para.startsWith('(') && para.endsWith(')')) {
            return `<p class="format-regieanweisung">${para}</p>`;
          }
          
          // Akt-Titel erkennen
          if (/^(ERSTER|ZWEITER|DRITTER|VIERTER|FÜNFTER|I+V?|V?I*)\s*(AKT|AUFZUG|TEIL)/i.test(para)) {
            return `<p class="format-akt-titel">${para}</p>`;
          }
          
          // Szenen-Titel erkennen
          if (/^(SZENE|SCENE|BILD|\d+[\.:])/.test(para)) {
            return `<p class="format-szene-titel">${para}</p>`;
          }
          
          // Sonst Standard
          return `<p>${para.replace(/\n/g, '<br>')}</p>`;
        })
        .join('\n');
      
      if (ersetzen) {
        // Alle Szenen löschen
        state.szenen = [];
        state.textbuch = {};
        state.cues = [];
      }
      
      // Neue Szene erstellen
      const neueSzene = {
        id: genId(),
        nummer: nummer,
        titel: titel,
        ort: '',
        zeit: '',
        gruppe: state.projektMeta.eigeneGruppen?.[0] || 'Erster Akt',
        zusammenfassung: 'Importierter Text - bitte bearbeiten',
        figuren: []
      };
      
      state.szenen.push(neueSzene);
      state.textbuch[neueSzene.id] = html;
      state.aktiveSzene = neueSzene.id;
      
      saveProjektDaten();
      closeModal('showImportModal');
      render();
      
      alert(`✅ Text importiert!\n\n${content.split(/\n\n+/).length} Absätze wurden als Szene "${titel}" importiert.\n\nNutze "✂️ Teilen" in der Toolbar um den Text in mehrere Szenen aufzuteilen.`);
    }

      reader.readAsText(file);

    // Dialoge für Word/PDF-Export kompatibel machen - als Tabelle für korrekte Ausrichtung
    function makeDialogsWordCompatible(html) {
      // format-dialog divs in einfache Paragraphen umwandeln
      // Von: <div class="format-dialog"><span class="figur-name">NAME:</span><span class="dialog-text">Text</span></div>
      // Zu:  <p class="dialog-export"><b>NAME:</b> Text</p>
      
      let result = html.replace(
        /<div[^>]*class\s*=\s*["']format-dialog["'][^>]*>([\s\S]*?)<\/div>/gi,
        function(match, innerContent) {
          // Figur-Name extrahieren
          const nameMatch = innerContent.match(/<span[^>]*class\s*=\s*["']figur-name["'][^>]*>([\s\S]*?)<\/span>/i);
          const textMatch = innerContent.match(/<span[^>]*class\s*=\s*["']dialog-text["'][^>]*>([\s\S]*?)<\/span>/i);
          
          if (nameMatch && textMatch) {
            return '<p class="dialog-export"><b>' + nameMatch[1] + '</b> ' + textMatch[1] + '</p>';
          }
          return match; // Fallback: Original behalten
        }
      );
      
      return result;
    }

    async function exportDocx(includeCues) {
      // Aktuelle Szene aus Editor synchronisieren
      saveCurrentText();
      const meta = { ...state.projektMeta };
      // Titelbild aus IndexedDB auflösen für Export
      if (meta.titelbild && meta.titelbild.startsWith('idb:')) {
        meta.titelbild = await resolveTitelbildForExport(meta.titelbild);
      }
      const exportSzenen = getExportSzenen();
      const istVollstaendig = exportSzenen.length === state.szenen.length;
      
      const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, 
              WidthType, AlignmentType, HeadingLevel, BorderStyle, 
              PageBreak, Header, Footer, ImageRun } = docx;
      
      const children = [];
      
      // === TITELSEITE (nur bei vollstaendigem Export) ===
      if (istVollstaendig) {
        children.push(new Paragraph({ spacing: { before: 2000 }, children: [] }));
        
        // Titelbild einfügen wenn vorhanden
        if (meta.titelbild) {
          try {
            const base64Match = meta.titelbild.match(/^data:image\/(png|jpe?g|gif|webp|bmp);base64,(.+)$/i);
            if (base64Match) {
              const mimeSubtype = base64Match[1].toLowerCase();
              const base64Data = base64Match[2];
              const binaryStr = atob(base64Data);
              const bytes = new Uint8Array(binaryStr.length);
              for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
              
              // Bildgrösse ermitteln via temporäres Image
              const imgDims = await new Promise((resolve) => {
                const img = new Image();
                img.onload = () => resolve({ w: img.naturalWidth, h: img.naturalHeight });
                img.onerror = () => resolve(null);
                img.src = meta.titelbild;
              });
              
              if (imgDims) {
                // Max 14cm breit, 10cm hoch (in EMU: 1cm = 360000)
                const maxW = 14 * 360000;
                const maxH = 10 * 360000;
                let w = imgDims.w * 9525; // px to EMU
                let h = imgDims.h * 9525;
                const scale = Math.min(1, maxW / w, maxH / h);
                w = Math.round(w * scale);
                h = Math.round(h * scale);
                
                children.push(new Paragraph({
                  children: [new ImageRun({
                    data: bytes,
                    transformation: { width: Math.round(w / 9525), height: Math.round(h / 9525) },
                    type: mimeSubtype === 'png' ? 'png' : 'jpg'
                  })],
                  alignment: AlignmentType.CENTER,
                  spacing: { after: 400 }
                }));
              }
            }
          } catch (e) {
            console.warn('Titelbild konnte nicht in Word eingefügt werden:', e);
          }
        }
        
        children.push(new Paragraph({
          children: [new TextRun({ text: meta.titel || 'Ohne Titel', bold: true, size: 52, font: 'Georgia', color: '212121' })],
          alignment: AlignmentType.CENTER,
          spacing: { after: 40 }
        }));
        
        if (meta.untertitel) {
          children.push(new Paragraph({
            children: [new TextRun({ text: meta.untertitel, italics: true, size: 26, font: 'Georgia', color: '212121' })],
            alignment: AlignmentType.CENTER,
            spacing: { after: 360 }
          }));
        }
        
        if (meta.autor) {
          children.push(new Paragraph({
            children: [new TextRun({ text: 'von', size: 22, font: 'Georgia', color: '212121' })],
            alignment: AlignmentType.CENTER,
            spacing: { after: 60 }
          }));
          children.push(new Paragraph({
            children: [new TextRun({ text: meta.autor, size: 28, font: 'Georgia', color: '212121' })],
            alignment: AlignmentType.CENTER,
            spacing: { after: 600 }
          }));
        }
        
        if (meta.tagline) {
          children.push(new Paragraph({
            children: [new TextRun({ text: '\u00AB' + meta.tagline + '\u00BB', italics: true, size: 22, font: 'Georgia', color: '555555' })],

    // === Szene zum Dokument hinzufuegen ===
    function addSzeneToDocNew(children, szene, includeCues, { Paragraph, TextRun, PageBreak, AlignmentType, BorderStyle, Table, TableRow, TableCell, WidthType }) {

    // === ROBUSTER HTML-zu-DOCX PARSER ===
    function parseContentToDocxNew(html, children, szeneCues, includeCues, { Paragraph, TextRun, AlignmentType, Table, TableRow, TableCell, WidthType, BorderStyle }) {
      const temp = document.createElement('div');
      temp.innerHTML = html;
      
      // Cue-Marker immer entfernen (wir fuegen eigene ein bei Technikfassung)
      temp.querySelectorAll('.cue-inline-marker, .cue-marker, .cue-badge').forEach(m => m.remove());

      // Striche und Ergaenzungen als Inline-Marker sichern, damit sie im Word-Export
      // nicht verloren gehen. Die Change-Spans werden zu reinen Textknoten mit
      // Steuerzeichen aus dem Private-Use-Bereich; splitDialogRuns baut daraus
      // durchgestrichene bzw. unterstrichene Runs. Als Textknoten stoeren sie die
      // vorhandene Absatz-Logik nicht mehr (kein eigener [class*="format-"]-Zweig).
      // .. = gestrichen, .. = Ergaenzung.
      temp.querySelectorAll('.format-gestrichen').forEach(function (s) {
        s.replaceWith(document.createTextNode('' + s.textContent + ''));
      });
      temp.querySelectorAll('.format-ergaenzung').forEach(function (s) {
        s.replaceWith(document.createTextNode('' + s.textContent + ''));
      });

      // === Paragraph hinzufuegen ===
      function addParagraph(text, style, figurName) {
        if (!text || !text.trim()) return;
        text = text.trim();
        
        // Schrift-Zuordnung basierend auf Style
        const fontMap = {
          'Dialog': 'Trebuchet MS', 'Vers': 'Trebuchet MS', 'Lied': 'Trebuchet MS', 'LiedTitel': 'Trebuchet MS',
          'Standard': 'Trebuchet MS', 'Regieanweisung': 'Georgia', 'Szenenbeschreibung': 'Georgia',
          'AktTitel': 'Trebuchet MS', 'SzenenTitel': 'Georgia', 'Pause': 'Trebuchet MS',
          'TechnikCue': 'Trebuchet MS'
        };
        const font = fontMap[style] || 'Trebuchet MS';
        const sizeMap = {
          'Dialog': 22, 'Standard': 22, 'Vers': 22, 'Lied': 22, 'LiedTitel': 20,
          'Regieanweisung': 20, 'Szenenbeschreibung': 19, 'FigurName': 20,
          'AktTitel': 36, 'SzenenTitel': 24, 'Pause': 24, 'TechnikCue': 16
        };
        const dialogSize = sizeMap[style] || 24;
        const colorMap = {
          'Regieanweisung': '414141', 'Szenenbeschreibung': '434343'
        };
        const textColor = colorMap[style] || '212121';
        
        const runs = [];
        
        // Helper: normalen Textabschnitt in Runs aufteilen — Klammertexte in
        // Dialog/Standard als Georgia/kursiv, sonst ein einzelner Run.
        function normalRuns(text, style, font, size, color) {
          if ((style !== 'Dialog' && style !== 'Standard') || !/\([^)]{2,}\)/.test(text)) {
            return [new TextRun({ text: text, size: size, font: font, color: color })];
          }
          return text.split(/(\([^)]{2,}\))/g).filter(Boolean).map(part => {
            if (/^\([^)]{2,}\)$/.test(part)) {
              return new TextRun({ text: part, size: 20, font: 'Georgia', italics: true, color: '414141' });
            }
            return new TextRun({ text: part, size: size, font: font, color: color });
          });
        }

        // Helper: Text in Runs aufteilen. Erkennt zusaetzlich die Change-Marker
        // (Streichung E000/E001, Ergaenzung E002/E003) und baut daraus
        // durchgestrichene bzw. unterstrichene Runs — so ueberleben Striche und
        // Ergaenzungen den Word-Export.
        function splitDialogRuns(text, style, font, size, color) {
          var STRK_O = String.fromCharCode(0xE000), STRK_C = String.fromCharCode(0xE001);
          var ERG_O = String.fromCharCode(0xE002), ERG_C = String.fromCharCode(0xE003);
          // Schnellpfad: keine Marker vorhanden
          if (text.indexOf(STRK_O) === -1 && text.indexOf(ERG_O) === -1) {
            return normalRuns(text, style, font, size, color);
          }
          var out = [];
          var mode = 'normal';
          var buf = '';
          function flush() {
            if (!buf) return;
            if (mode === 'strike') {
              out.push(new TextRun({ text: buf, size: size, font: font, color: '9ca3af', strike: true }));
            } else if (mode === 'erg') {
              out.push(new TextRun({ text: buf, size: size, font: font, color: color, underline: {} }));
            } else {
              out.push.apply(out, normalRuns(buf, style, font, size, color));
            }
            buf = '';
          }
          for (var i = 0; i < text.length; i++) {
            var ch = text[i];
            if (ch === STRK_O) { flush(); mode = 'strike'; }
            else if (ch === STRK_C) { flush(); mode = 'normal'; }
            else if (ch === ERG_O) { flush(); mode = 'erg'; }
            else if (ch === ERG_C) { flush(); mode = 'normal'; }
            else { buf += ch; }
          }
          flush();
          if (out.length === 0) out.push(new TextRun({ text: '', size: size, font: font, color: color }));
          return out;
        }
        
        // Figurenname als eigener Absatz (Variante A)
        if (figurName) {
          children.push(new Paragraph({
            children: [new TextRun({ text: figurName.replace(/\s*$/, ''), bold: true, size: 20, font: 'Trebuchet MS', allCaps: true, characterSpacing: 6, color: '212121' })],
            style: 'FigurName',
            spacing: { before: 100, after: 20 }
          }));
        }
        
        // Cue-Marker als Randnotiz (Technikfassung)
        if (includeCues && szeneCues.length > 0) {
          const matchedCues = [];
          // Change-Marker fuer den Anker-Vergleich entfernen (der Anker-Text
          // enthaelt keine Marker, der Absatztext evtl. schon).
          const ankerText = text.replace(/[-]/g, '');
          for (const cue of szeneCues) {
            if (!cue.ankerText) continue;
            const anker = cue.ankerText.trim();
            if (ankerText.indexOf(anker) !== -1) {
              const prefix = CUE_TYPEN[cue.typ] ? CUE_TYPEN[cue.typ].prefix : (cue.typ ? cue.typ.toUpperCase() : 'CUE');
              matchedCues.push(prefix + cue.nummer + (cue.beschreibung ? ': ' + cue.beschreibung : ''));
            }
          }
          
          if (matchedCues.length > 0) {
            // Tabelle: Text links, Cue rechts als Randnotiz.
            // PAGES-KOMPATIBILITÄT: Apple Pages zeichnet bei fehlenden
            // Tabellen-Rändern einen Standardrahmen («langgezogener Rahmen»)
            // und setzt Prozentbreiten unzuverlässig um. Darum:
            // - Ränder explizit auch auf TABELLEN-Ebene auf NONE
            // - feste Spaltenbreiten in DXA statt Prozent
            // - festes Tabellenlayout
            // - kleine, explizite Zellinnenabstände
            const noBorder = { style: BorderStyle.NONE, size: 0, color: 'FFFFFF' };
            const noBorders = { top: noBorder, bottom: noBorder, left: noBorder, right: noBorder };
            // A4 (11906) minus Ränder (1418 + 1134) = 9354 DXA Inhaltsbreite
            const TEXT_COL_DXA = 7015;  // ~75 %
            const CUE_COL_DXA = 2339;   // ~25 %
            const cellMargins = { top: 20, bottom: 20, left: 60, right: 60 };

            children.push(new Table({
              layout: (typeof docx !== 'undefined' && docx.TableLayoutType) ? docx.TableLayoutType.FIXED : undefined,
              columnWidths: [TEXT_COL_DXA, CUE_COL_DXA],
              borders: {
                top: noBorder, bottom: noBorder, left: noBorder, right: noBorder,
                insideHorizontal: noBorder, insideVertical: noBorder
              },
              rows: [new TableRow({
                children: [
                  new TableCell({
                    children: [new Paragraph({
                      children: splitDialogRuns(text, style, font, dialogSize, textColor),
                      style: style || 'Standard'
                    })],
                    width: { size: TEXT_COL_DXA, type: WidthType.DXA },
                    borders: noBorders,
                    margins: cellMargins,
                  }),
                  new TableCell({
                    children: [new Paragraph({
                      children: matchedCues.map(function(cueText, ci) {
                        var cueRuns = [new TextRun({ text: cueText, bold: true, size: 14, color: '7c3aed', font: 'Trebuchet MS' })];
                        if (ci < matchedCues.length - 1) cueRuns.push(new TextRun({ break: 1 }));
                        return cueRuns;
                      }).flat(),
                      spacing: { before: 20, after: 20 },
                      indent: { left: 80 }
                    })],
                    width: { size: CUE_COL_DXA, type: WidthType.DXA },
                    borders: { top: noBorder, bottom: noBorder, right: noBorder, left: { style: BorderStyle.SINGLE, size: 4, color: 'D8B4FE', space: 4 } },
                    margins: cellMargins,
                  })
                ]
              })],
              width: { size: TEXT_COL_DXA + CUE_COL_DXA, type: WidthType.DXA }
            }));
            return;
          }
        }
        
        runs.push(...splitDialogRuns(text, style, font, dialogSize, textColor));
        
        children.push(new Paragraph({
          children: runs,
          style: style || 'Standard'
        }));
      }
      
      // === Format-Erkennung ===
      function getFormat(el) {
        if (!el || !el.classList) return null;
        if (el.classList.contains('format-dialog')) return 'Dialog';
        if (el.classList.contains('format-regieanweisung')) return 'Regieanweisung';
        if (el.classList.contains('format-szene-titel')) return 'SzenenTitel';
        if (el.classList.contains('format-akt-titel')) return 'AktTitel';
        if (el.classList.contains('format-lied')) return 'Lied';
        if (el.classList.contains('format-vers')) return 'Vers';
        if (el.classList.contains('format-pause')) return 'Pause';
        return null;
      }
      
      // === Dialog-Block verarbeiten ===
      function processDialog(el) {
        const nameEl = el.querySelector('.figur-name');
        const name = nameEl ? nameEl.textContent.trim() : '';
        
        let firstParagraph = true;
        
        // Helper: Text-Zeile verarbeiten — erkennt eigenständige Regieanweisungen
        function addDialogLine(text) {
          text = text.trim();
          if (!text) return;
          
          // Prüfen ob die ganze Zeile eine Regieanweisung ist: "(Text)"
          if (/^\([^)]+\)\.?$/.test(text)) {
            addParagraph(text, 'Regieanweisung');
            return;
          }
          
          if (firstParagraph && name) {
            addParagraph(text, 'Dialog', name);
            firstParagraph = false;
          } else {
            addParagraph(text, 'Dialog');
          }
        }
        
        // Helper: Inhalt eines Elements aufsplitten (BR = Absatztrenner)
        function processDialogContent(container) {
          const childNodes = Array.from(container.childNodes);
          
          let currentText = '';
          
          childNodes.forEach(function(child) {
            // figur-name überspringen
            if (child.nodeType === Node.ELEMENT_NODE && child.classList && child.classList.contains('figur-name')) return;
            // inline-regie spans — Text extrahieren
            if (child.nodeType === Node.ELEMENT_NODE && child.classList && child.classList.contains('inline-regie')) {
              currentText += child.textContent;
              return;
            }
            
            // BR = Absatztrenner
            if (child.nodeType === Node.ELEMENT_NODE && child.tagName === 'BR') {
              addDialogLine(currentText);
              currentText = '';
              return;
            }
            
            if (child.nodeType === Node.ELEMENT_NODE) {
              var childFormat = getFormat(child);
              
              // Verschachtelter format-dialog: Rekursiv als neuen Dialog verarbeiten
              if (childFormat === 'Dialog') {
                addDialogLine(currentText);
                currentText = '';
                // Prüfen ob dieses Element einen eigenen figur-name hat
                var nestedName = child.querySelector(':scope > .figur-name');
                if (nestedName) {
                  processDialog(child); // Komplett neuer Dialog mit eigenem Namen
                } else {
                  processDialogContent(child); // Nur Inhalt rekursiv verarbeiten
                }
                return;
              }
              
              // Anderes Format (Regieanweisung etc.)
              if (childFormat) {
                addDialogLine(currentText);
                currentText = '';
                addParagraph(child.textContent, childFormat);
                return;
              }
              
              // Prüfen ob Kinder mit eigenem Format existieren
              if (child.querySelector && child.querySelector('[class*="format-"]')) {
                addDialogLine(currentText);
                currentText = '';
                Array.from(child.childNodes).forEach(function(grandchild) {
                  if (grandchild.nodeType === Node.ELEMENT_NODE) {
                    var gcFormat = getFormat(grandchild);
                    if (gcFormat === 'Dialog') {
                      var gcName = grandchild.querySelector(':scope > .figur-name');
                      if (gcName) {
                        processDialog(grandchild);
                      } else {
                        processDialogContent(grandchild);
                      }
                    } else if (gcFormat) {
                      addParagraph(grandchild.textContent, gcFormat);
                    } else {
                      addDialogLine(grandchild.textContent);
                    }
                  } else if (grandchild.nodeType === Node.TEXT_NODE) {
                    var gcText = grandchild.textContent.trim();
                    if (gcText) addDialogLine(gcText);
                  }
                });
                return;
              }
              
              // dialog-text Span: rekursiv verarbeiten (kann verschachtelte Dialoge enthalten)
              if (child.classList && child.classList.contains('dialog-text')) {
                addDialogLine(currentText);
                currentText = '';
                processDialogContent(child);
                return;
              }
            }
            
            // Text akkumulieren
            if (child.nodeType === Node.TEXT_NODE) {
              currentText += child.textContent;
            } else if (child.nodeType === Node.ELEMENT_NODE) {
              currentText += child.textContent;
            }
          });
          
          // Rest ausgeben
          addDialogLine(currentText);
        }
        
        processDialogContent(el);
      }
      
      // === Top-Level Knoten verarbeiten ===
      function processTopLevel(node) {
        if (node.nodeType === Node.TEXT_NODE) {
          var text = node.textContent.trim();
          if (text) addParagraph(text, 'Standard');
          return;
        }
        
        if (node.nodeType !== Node.ELEMENT_NODE) return;
        if (node.tagName === 'BR') return;
        if (!node.textContent.trim()) return;
        
        var format = getFormat(node);
        
        if (format === 'Dialog') {
          processDialog(node);
          return;
        }
        
        // Szenen-Titel ueberspringen (wird separat hinzugefuegt)
        if (format === 'SzenenTitel') return;
        
        if (format) {
          addParagraph(node.textContent, format);
          return;
        }
        
        // Kein Format: Pruefen ob Kinder mit Format existieren
        if (node.querySelector && node.querySelector('[class*="format-"]')) {
          Array.from(node.childNodes).forEach(function(child) { processTopLevel(child); });
          return;
        }
        
        // Reines Text-Element ohne Format -> Standard
        addParagraph(node.textContent, 'Standard');
      }
      
      // === Alle Top-Level Knoten durchgehen ===
      Array.from(temp.childNodes).forEach(function(node) { processTopLevel(node); });
    }
    
    async function exportTextfassungPDF() {
      // Aktuelle Szene aus Editor synchronisieren
      saveCurrentText();
      
      // Fenster ZUERST öffnen (synchron, damit Popup-Blocker es als User-Aktion erkennt)
      const printWindow = window.open('', '_blank');
      if (printWindow) {
        printWindow.document.write('<html><body style="font-family:sans-serif;text-align:center;padding-top:40vh;color:#888;"><p>⏳ Druckvorschau wird erstellt...</p></body></html>');
      }
      
      // Dann HTML generieren (async)
      const html = await generateTextfassungHTML();
      
      if (!printWindow) {
        // Popup blockiert → Fallback: als Blob-URL öffnen
        alert('Popup wurde blockiert. Bitte erlaube Popups für diese Seite und versuche es erneut.');
        const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.target = '_blank';
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 10000);
        closeModal('showExportModal');
        return;
      }
      
      printWindow.document.open();
      printWindow.document.write(html);
      printWindow.document.close();
      
      // Kurz warten dann drucken
      setTimeout(() => {
        printWindow.print();
      }, 500);
      
      closeModal('showExportModal');
    }
