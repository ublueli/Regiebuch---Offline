    // Lauf-Token gegen Races bei schnellen Projektwechseln
    let _projektLoadToken = 0;

    function loadProjektDaten() {
      if (!state.projektId) return;
      
      // Cloud-ID setzen wenn das Projekt mit Cloud verknüpft ist
      const projekte = load(KEYS.projekte, []);
      const projekt = projekte.find(p => p.id === state.projektId);
      if (projekt?.cloudId) {
        currentCloudProjectId = projekt.cloudId;
      } else if (state.projektId && state.projektId.startsWith && state.projektId.startsWith('cloud_')) {
        currentCloudProjectId = state.projektId.replace('cloud_', '');
      } else {
        currentCloudProjectId = null;
      }
      
      // Default-Werte für neues Projekt
      const defaultMeta = {
        titel: 'Neues Projekt',
        untertitel: '',
        autor: '',
        tagline: '',
        logline: '',
        copyright: '',
        titelbild: '',
        fassung: 'Arbeitsfassung',
        fassungsDatum: new Date().toISOString(),
        eigeneGruppen: ['Erster Akt'],
        premiere: '',
        spielort: ''
      };
      
      state.projektMeta = load(KEYS.projektMeta(state.projektId), defaultMeta);
      state.figuren = load(KEYS.figuren(state.projektId), []);
      state.szenen = load(KEYS.szenen(state.projektId), []);
      state.textbuch = load(KEYS.textbuch(state.projektId), {});
      state.cues = load(KEYS.cues(state.projektId), []);
      // Fassungen liegen neu in IndexedDB (localStorage-Quota-Problem).
      // Zuerst evtl. vorhandene Legacy-Daten aus localStorage anzeigen,
      // dann asynchron aus IndexedDB laden bzw. dorthin migrieren.
      state.fassungen = load(KEYS.fassungen(state.projektId), []);
      (function(pid) {
        loadFassungenFromDB(pid).then(async (idbFassungen) => {
          if (state.projektId !== pid) return; // Projekt inzwischen gewechselt
          const legacy = load(KEYS.fassungen(pid), []);
          if (idbFassungen && idbFassungen.length > 0) {
            // IndexedDB ist führend; evtl. übrige Legacy-Fassungen (per id) ergänzen
            const bekannt = new Set(idbFassungen.map(f => f.id));
            const zusatz = (legacy || []).filter(f => f && f.id && !bekannt.has(f.id));
            let merged = idbFassungen.concat(zusatz);
            if (zusatz.length > 0) {
              merged.sort((a, b) => new Date(a.datum || 0) - new Date(b.datum || 0));
              await saveFassungenToDB(pid, merged);
            }
            state.fassungen = merged;
            if (localStorage.getItem(KEYS.fassungen(pid)) !== null) localStorage.removeItem(KEYS.fassungen(pid));
            window._fassungenMigrated = true;
            if (state.currentView === 'fassungen') render();
          } else {
            const migrated = await migrateFassungenToDB(pid);
            if (migrated && state.projektId === pid) {
              state.fassungen = migrated;
              window._fassungenMigrated = true;
              if (state.currentView === 'fassungen') render();
            }
          }
        }).catch((e) => { console.warn('Fassungen konnten nicht aus IndexedDB geladen werden:', e); });
      })(state.projektId);
      state.requisiten = load(KEYS.requisiten(state.projektId), []);
      state.kostueme = load(KEYS.kostueme(state.projektId), []);
      state.medien = load(KEYS.medien(state.projektId), []);
      state.buehne = load(KEYS.buehne(state.projektId), []);
      // v3.0
      state.konzept = load(KEYS.konzept(state.projektId), {
        treatment: [], fundament: { kern: '', logline: '', unaussprechliches: '', emotionalerBogen: '', konflikt: '' },
        werte: [], motive: []
      });
      state.beziehungen = load(KEYS.beziehungen(state.projektId), []);
      state.rechercheMaterial = load(KEYS.rechercheMaterial(state.projektId), []);
      state.musikkonzept = load(KEYS.musikkonzept(state.projektId), { text: '', stuecke: [] });
      state.ensemble = load(KEYS.ensemble(state.projektId), []);
      state.team = load(KEYS.team(state.projektId), []);
      state.probeplan = load(KEYS.probeplan(state.projektId), []);
      
      if (state.szenen.length > 0 && !state.aktiveSzene) {
        state.aktiveSzene = state.szenen[0].id;
      }
      
      // v2.0: Migration von altem strukturTyp zu neuem System
      if (state.projektMeta.strukturTyp && !state.projektMeta.eigeneGruppen) {
        // Migration: Gruppen aus bestehenden Szenen extrahieren
        const existierendeGruppen = [...new Set(state.szenen.map(s => s.gruppe).filter(Boolean))];
        state.projektMeta.eigeneGruppen = existierendeGruppen.length > 0 ? existierendeGruppen : ['Teil 1'];
        delete state.projektMeta.strukturTyp;
        delete state.projektMeta.strukturVorlage;
        saveProjektDaten();
      }
      
      // Sicherstellen dass eigeneGruppen existiert
      if (!state.projektMeta.eigeneGruppen) {
        state.projektMeta.eigeneGruppen = ['Erster Akt'];
      }
      
      // Migration: Szenen-Gruppen synchronisieren
      // Wenn Szenen Gruppen haben die nicht in eigeneGruppen sind, diese hinzufügen
      let gruppenChanged = false;
      state.szenen.forEach(s => {
        if (s.gruppe && !state.projektMeta.eigeneGruppen.includes(s.gruppe)) {
          // Szene hat eine Gruppe die nicht in eigeneGruppen ist
          // Option: Szene auf erste eigene Gruppe setzen (wenn Gruppe nur '1', '2' etc.)
          if (/^\d+$/.test(s.gruppe)) {
            s.gruppe = state.projektMeta.eigeneGruppen[0] || 'Erster Akt';
            gruppenChanged = true;
          } else {
            // Benannte Gruppe → zu eigeneGruppen hinzufügen
            state.projektMeta.eigeneGruppen.push(s.gruppe);
            gruppenChanged = true;
          }
        }
      });
      if (gruppenChanged) saveProjektDaten();
      
      state.dirty = false; // Frisch geladen, keine ungespeicherten Änderungen
      updateHeaderStatus();

      // INDEXEDDB IST FÜHREND: Die soeben synchron geladenen localStorage-Daten
      // sind nur der (evtl. veraltete/unvollständige) Spiegel. Sobald der
      // IndexedDB-Datensatz da ist, ersetzt er den Spiegel-Stand.
      // Existiert noch kein Datensatz (erste Nutzung der neuen Version),
      // werden die localStorage-Daten einmalig nach IndexedDB migriert.
      const myToken = ++_projektLoadToken;
      (function(pid) {
        loadProjectDataFromDB(pid).then(record => {
          if (state.projektId !== pid || _projektLoadToken !== myToken) return; // inzwischen gewechselt
          if (record && record.daten) {
            const bereiche = ['projektMeta', 'figuren', 'szenen', 'textbuch', 'cues',
              'requisiten', 'kostueme', 'medien', 'buehne', 'konzept', 'beziehungen',
              'rechercheMaterial', 'musikkonzept', 'ensemble', 'team', 'probeplan'];
            let geaendert = false;
            bereiche.forEach(b => {
              if (record.daten[b] === undefined) return;
              try {
                if (JSON.stringify(state[b]) !== JSON.stringify(record.daten[b])) {
                  state[b] = record.daten[b];
                  geaendert = true;
                }
              } catch (e) { /* Vergleich fehlgeschlagen: Spiegel-Stand behalten */ }
            });
            if (geaendert) {
              if (!state.projektMeta.eigeneGruppen) state.projektMeta.eigeneGruppen = ['Erster Akt'];
              if (state.szenen.length > 0 && !state.szenen.find(s => s.id === state.aktiveSzene)) {
                state.aktiveSzene = state.szenen[0].id;
              }
              restoreAudioUrls().catch(() => {});
              render();
              console.log('✅ Projektdaten aus IndexedDB übernommen (führende Quelle)');
            }
          } else {
            // Migration: localStorage-Stand einmalig nach IndexedDB schreiben
            saveProjectDataToDB(pid, collectProjektDaten()).then(ok => {
              if (ok) console.log('✅ Migration: Projektdaten nach IndexedDB übernommen');
            });
          }
        }).catch(e => console.warn('Projektdaten aus IndexedDB nicht ladbar:', e));
      })(state.projektId);

      // Migration: Base64-Recherche-Bilder nach IndexedDB (async, nicht blockierend)
      migrateRechercheBilder().catch(e => console.warn('Recherche-Bild-Migration:', e));
    }

    // v2.0: Aktuelle Gruppen des Projekts holen (eigene + aus Szenen extrahierte)
    function getAktuelleGruppen() {
      const eigene = state.projektMeta.eigeneGruppen || [];
      // Auch Gruppen aus Szenen extrahieren die evtl. noch nicht in eigeneGruppen sind
      const ausszenen = [...new Set(state.szenen.map(s => s.gruppe).filter(Boolean))];
      const alle = [...new Set([...eigene, ...ausszenen])];
      return alle.length > 0 ? alle : ['Teil 1'];
    }
    
    // v2.0: Neue Gruppe hinzufügen
    function addGruppe(name) {
      if (!name || name.trim() === '') return;
      if (!state.projektMeta.eigeneGruppen) state.projektMeta.eigeneGruppen = [];
      if (!state.projektMeta.eigeneGruppen.includes(name.trim())) {
        state.projektMeta.eigeneGruppen.push(name.trim());
        saveProjektDaten();
        render();
      }
    }
    
    // v2.0: Gruppe umbenennen
    function renameGruppe(altName, neuName) {
      if (!neuName || neuName.trim() === '') return;
      const idx = state.projektMeta.eigeneGruppen?.indexOf(altName);
      if (idx !== -1) {
        state.projektMeta.eigeneGruppen[idx] = neuName.trim();
        // Auch alle Szenen mit dieser Gruppe aktualisieren
        state.szenen.forEach(s => {
          if (s.gruppe === altName) s.gruppe = neuName.trim();
        });
        saveProjektDaten();
        render();
      }
    }
    
    // v2.0: Gruppe löschen (Szenen bleiben, bekommen 'Ohne Zuordnung')
    function deleteGruppe(name) {
      const idx = state.projektMeta.eigeneGruppen?.indexOf(name);
      if (idx !== -1) {
        state.projektMeta.eigeneGruppen.splice(idx, 1);
        saveProjektDaten();
        render();
      }
    }
    
    
    // v2.0: Gruppe nach oben/unten verschieben
    function moveGruppe(name, direction) {
      const gruppen = state.projektMeta.eigeneGruppen || [];
      const idx = gruppen.indexOf(name);
      if (idx === -1) return;
      
      const newIdx = idx + direction;
      if (newIdx < 0 || newIdx >= gruppen.length) return;
      
      // Tauschen
      const temp = gruppen[idx];
      gruppen[idx] = gruppen[newIdx];
      gruppen[newIdx] = temp;
      
      saveProjektDaten();
      render();
    }
    
    // Szenen nach Gruppe und Nummer sortieren
    // Szenen-Nummern korrekt vergleichen: "2.10" kommt nach "2.9", nicht nach "2.1"
    function compareSzenenNummer(nummerA, nummerB) {
      const partsA = String(nummerA || '0').split('.');
      const partsB = String(nummerB || '0').split('.');
      const maxLen = Math.max(partsA.length, partsB.length);
      for (let i = 0; i < maxLen; i++) {
        const a = parseInt(partsA[i]) || 0;
        const b = parseInt(partsB[i]) || 0;
        if (a !== b) return a - b;
      }
      return 0;
    }
    
    function sortSzenen() {
      state.szenen.sort((a, b) => {
        // Erst nach Gruppe sortieren
        const gruppeA = parseInt(a.gruppe) || 1;
        const gruppeB = parseInt(b.gruppe) || 1;
        if (gruppeA !== gruppeB) return gruppeA - gruppeB;
        
        // Dann nach Nummer sortieren (korrekt: 2.10 nach 2.9)
        return compareSzenenNummer(a.nummer, b.nummer);
      });
    }

    // Merker: localStorage-Spiegel deaktiviert (Projekt zu gross fürs 5-MB-Limit)
    let _lsMirrorDisabled = false;

    function saveProjektDaten() {
      if (!state.projektId) return false;

      state.dirty = true; // Änderungen seit letztem Export

      // 1) INDEXEDDB – die führende Quelle (kein 5-MB-Limit, blockiert nie)
      const daten = collectProjektDaten();
      saveProjectDataToDB(state.projektId, daten).then(ok => {
        if (!ok) {
          showAutosaveIndicator(false);
          console.error('⚠️ Projektdaten konnten nicht in IndexedDB gespeichert werden!');
          if (!state._lastStorageWarning || Date.now() - state._lastStorageWarning > STORAGE_WARNING_DEBOUNCE_MS) {
            state._lastStorageWarning = Date.now();
            alert('⚠️ Speichern fehlgeschlagen!\n\n' +
                  'Die Projektdaten konnten nicht in der Browser-Datenbank gesichert werden.\n\n' +
                  'Bitte SOFORT eine Sicherungskopie speichern (Menü → Sicherungskopie speichern, ⌘S)!');
          }
        }
      });

      // 2) LOCALSTORAGE – synchroner Best-Effort-Spiegel (Crash-Sicherheit).
      // Scheitert er (Quota), ist das kein Problem mehr: IndexedDB hat die Daten.
      if (!_lsMirrorDisabled) {
        const results = [
          save(KEYS.projektMeta(state.projektId), state.projektMeta),
          save(KEYS.figuren(state.projektId), state.figuren),
          save(KEYS.szenen(state.projektId), state.szenen),
          save(KEYS.textbuch(state.projektId), state.textbuch),
          save(KEYS.cues(state.projektId), state.cues),
          save(KEYS.requisiten(state.projektId), state.requisiten),
          save(KEYS.kostueme(state.projektId), state.kostueme),
          save(KEYS.medien(state.projektId), state.medien),
          save(KEYS.buehne(state.projektId), state.buehne),
          // v3.0
          save(KEYS.konzept(state.projektId), state.konzept),
          save(KEYS.beziehungen(state.projektId), state.beziehungen),
          save(KEYS.rechercheMaterial(state.projektId), state.rechercheMaterial),
          save(KEYS.musikkonzept(state.projektId), state.musikkonzept),
          save(KEYS.ensemble(state.projektId), state.ensemble),
          save(KEYS.team(state.projektId), state.team),
          save(KEYS.probeplan(state.projektId), state.probeplan),
        ];
        if (results.some(r => !r)) {
          // Spiegel passt nicht mehr ins localStorage → für diese Sitzung deaktivieren
          // (verhindert wiederholte teure Fehlversuche bei jedem Autosave)
          _lsMirrorDisabled = true;
          console.info('ℹ️ Projekt zu gross für den localStorage-Spiegel – IndexedDB übernimmt allein. Kein Datenverlust.');
        }
      }

      // Fassungen liegen in IndexedDB (kein localStorage-Quota-Risiko).
      // Nur schreiben, wenn sie sich geändert haben – die Kopie ist gross!
      if (state._fassungenDirty) {
        state._fassungenDirty = false;
        saveFassungenToDB(state.projektId, state.fassungen).then(ok => {
          if (!ok) {
            state._fassungenDirty = true; // erneut versuchen beim nächsten Save
            console.error('⚠️ Fassungen konnten nicht in IndexedDB gespeichert werden!');
          }
        });
      }

      // Zeitstempel für Crash Recovery
      try { localStorage.setItem(KEYS.lastSaved, new Date().toISOString()); } catch(e) {}

      // Mehr-Tab-Schutz: eigene Tab-Kennung als «letzter Schreiber» hinterlegen.
      // Andere Tabs mit demselben Projekt erkennen daran, dass hier gespeichert
      // wurde, und warnen, bevor sie einen älteren Stand darüberschreiben.
      try {
        localStorage.setItem(REBU_SAVE_OWNER_KEY, JSON.stringify({ tab: REBU_TAB_ID, projekt: state.projektId, ts: Date.now() }));
      } catch (e) {}

      // Autosave-Indikator (bei IndexedDB-Fehler wird er oben async korrigiert)
      showAutosaveIndicator(true);

      // v2.2: Auto-Sync zur Cloud (wenn Cloud-Projekt)
      scheduleSyncToCloud();

      // Auto-file-save & save reminder
      scheduleAutoFileSave();
      startSaveReminder();

      return true;
    }
    
    // Debounced Version für Editor-Input (verhindert 17× localStorage pro Sekunde)
    let _saveToStorageTimer = null;
    function debouncedSaveProjektDaten() {
      if (_saveToStorageTimer) clearTimeout(_saveToStorageTimer);
      _saveToStorageTimer = setTimeout(() => {
        saveProjektDaten();
        _saveToStorageTimer = null;
      }, 800);
    }
    
    // Sofortiges Speichern erzwingen (z.B. vor Export, vor Szenenwechsel)
    function flushPendingSave() {
      if (_saveToStorageTimer) {
        clearTimeout(_saveToStorageTimer);
        _saveToStorageTimer = null;
        saveProjektDaten();
      }
    }
    
    // ============================================
    // CRASH RECOVERY
    // ============================================
    function checkCrashRecovery() {
      try {
        var lastSaved = localStorage.getItem(KEYS.lastSaved);
        if (!lastSaved) return;
        var savedTime = new Date(lastSaved);
        var now = new Date();
        var diffMs = now - savedTime;
        // Nur anzeigen wenn letzte Speicherung weniger als 7 Tage alt
        if (diffMs > 7 * 24 * 60 * 60 * 1000) return;
        // Prüfen ob es ungesicherte Änderungen gibt (dirty flag oder kein File-Save)
        if (!state.dirty && state.filePath) return;
        // Wenn kein filePath gesetzt, aber Daten vorhanden — möglicher Crash
        if (!state.filePath && state.szenen && state.szenen.length > 0) {
          // Daten vorhanden, aber nie in Datei gesichert
          showRecoveryDialog(savedTime);
        }
      } catch(e) {
        console.warn('Crash Recovery Check fehlgeschlagen:', e);
      }
    }

    // ============================================
    // ZIP EXPORT
    // ============================================
    function _safeFilename(name) {
      return String(name || 'datei').replace(/[^a-zA-Z0-9äöüÄÖÜéèêàáâ._\s-]/g, '').replace(/\s+/g, '_').substring(0, 120);
    }

    function _extFromMime(mime) {
      var map = { 'image/jpeg': '.jpg', 'image/png': '.png', 'image/gif': '.gif', 'image/webp': '.webp', 'image/svg+xml': '.svg' };
      return map[mime] || '';
    }

    // Alle Bild-IDs sammeln, die das aktuelle Projekt in IndexedDB referenziert
    function collectProjectImageIds() {
      var ids = new Set();
      var tb = state.projektMeta && state.projektMeta.titelbild;
      if (tb && tb.startsWith('idb:')) ids.add(tb.substring(4));
      (state.rechercheMaterial || []).forEach(function(r) {
        if (r.bildData && typeof r.bildData === 'string' && r.bildData.startsWith('idb:')) ids.add(r.bildData.substring(4));
      });
      (state.kostueme || []).forEach(function(k) {
        (k.kostuemBilder || []).forEach(function(id) { ids.add(id); });
        (k.maskeBilder || []).forEach(function(id) { ids.add(id); });
      });
      (state.buehne || []).forEach(function(b) { (b.bilder || []).forEach(function(id) { ids.add(id); }); });
      (state.requisiten || []).forEach(function(r) { (r.bilder || []).forEach(function(id) { ids.add(id); }); });
      return Array.from(ids);
    }

    // Erzeugt das komplette Backup-ZIP als Blob (Projekt + Fassungen + alle Medien)
    async function generateBackupZipBlob() {
      var zip = new JSZip();
      var projectName = (state.projektMeta.titel || 'Projekt').replace(/[^a-zA-Z0-9äöüÄÖÜßéèêàáâ\s-]/g, '').replace(/\s+/g, '_');

      // 1. Aktuelles Projekt als .rebu.json
      saveCurrentText(true);
      flushPendingSave();
      var exportData = exportToDramera();
      zip.file(projectName + '.rebu.json', JSON.stringify(exportData, null, 2));

      // 2. Versionsverlauf
      if (state.fassungen && state.fassungen.length > 0) {
        var versionsFolder = zip.folder('Versionsverlauf');
        state.fassungen.forEach(function(v, i) {
          var ts = new Date(v.datum || v.timestamp || Date.now()).toISOString().replace(/[:.]/g, '-').slice(0, 19);
          versionsFolder.file('Version_' + (i + 1) + '_' + ts + '.json', JSON.stringify(v, null, 2));
        });
      }

      // 3. NINA Exchange
      var exchangeData = createNinaExchangeV4();
      zip.file(projectName + '.nina-exchange.json', JSON.stringify(exchangeData, null, 2));

      // 4. Audio-/Video-Dateien aus IndexedDB (Voll-Backup!)
      // Ohne diese Binärdaten wäre ein Backup auf einem anderen Gerät unvollständig.
      var manifest = { version: 1, audio: [], images: [] };
      var medienFolder = null;
      for (const medium of (state.medien || [])) {
        try {
          const result = await loadAudioFromDB(medium.id);
          if (result && result.data && result.data.data) {
            if (!medienFolder) medienFolder = zip.folder('Medien');
            const fname = _safeFilename(medium.id + '_' + (result.data.name || medium.filename || medium.name || 'medium'));
            medienFolder.file(fname, result.data.data);
            manifest.audio.push({ id: medium.id, file: 'Medien/' + fname, type: result.data.type || '', name: result.data.name || '' });
          }
        } catch (e) { console.warn('Backup: Medium übersprungen:', medium.name, e); }
      }

      // 5. Bilder aus IndexedDB (Titelbild, Kostüme, Bühne, Requisiten, Recherche)
      var bilderFolder = null;
      for (const imgId of collectProjectImageIds()) {
        try {
          const result = await loadImageFromDB(imgId);
          if (result && result.data && result.data.data) {
            if (!bilderFolder) bilderFolder = zip.folder('Bilder');
            const fname = _safeFilename(imgId) + _extFromMime(result.data.type);
            bilderFolder.file(fname, result.data.data);
            manifest.images.push({ id: imgId, file: 'Bilder/' + fname, type: result.data.type || '', name: result.data.name || '' });
          }
        } catch (e) { console.warn('Backup: Bild übersprungen:', imgId, e); }
      }

      if (manifest.audio.length > 0 || manifest.images.length > 0) {
        zip.file('medien-manifest.json', JSON.stringify(manifest, null, 2));
      }

      return zip.generateAsync({ type: 'blob' });
    }

    // Backup-ZIP als Download (Fallback, wenn kein Datei-Dialog verfügbar ist)
    async function exportAsZip() {
      if (typeof JSZip === 'undefined') { alert('JSZip nicht geladen. Bitte Seite neu laden.'); return; }
      var projectName = (state.projektMeta.titel || 'Projekt').replace(/[^a-zA-Z0-9äöüÄÖÜßéèêàáâ\s-]/g, '').replace(/\s+/g, '_');
      const content = await generateBackupZipBlob();
      var url = URL.createObjectURL(content);
      var a = document.createElement('a');
      a.href = url;
      a.download = projectName + '_Rebu_' + new Date().toISOString().slice(0, 10) + '.zip';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // ZIP-Backup importieren: Medien nach IndexedDB zurückschreiben, dann Projekt laden
    async function importBackupZip(file) {
      if (typeof JSZip === 'undefined') { alert('JSZip nicht geladen. Bitte Seite neu laden.'); return; }
      const zip = await JSZip.loadAsync(file);

      // Projekt-JSON finden (Root, nicht im Versionsverlauf)
      let rebuEntry = null;
      zip.forEach(function(path, entry) {
        if (entry.dir) return;
        if (path.indexOf('Versionsverlauf/') === 0) return;
        if (/\.rebu\.json$/i.test(path) && !rebuEntry) rebuEntry = entry;
      });
      if (!rebuEntry) {
        // Fallback: nina-exchange
        zip.forEach(function(path, entry) {
          if (!entry.dir && /\.nina-exchange\.json$/i.test(path) && !rebuEntry) rebuEntry = entry;
        });
      }
      if (!rebuEntry) throw new Error('Im ZIP wurde keine Projektdatei (.rebu.json) gefunden.');

      // Zuerst Medien/Bilder nach IndexedDB zurückschreiben,
      // damit restoreAudioUrls sie nach dem Import findet
      const manifestEntry = zip.file('medien-manifest.json');
      let restored = 0;
      if (manifestEntry) {
        try {
          const manifest = JSON.parse(await manifestEntry.async('string'));
          for (const m of (manifest.audio || [])) {
            const fe = zip.file(m.file);
            if (!fe) continue;
            const buf = await fe.async('arraybuffer');
            const f = new File([buf], m.name || m.file.split('/').pop(), { type: m.type || 'application/octet-stream' });
            await saveAudioToDB(m.id, f);
            restored++;
          }
          for (const m of (manifest.images || [])) {
            const fe = zip.file(m.file);
            if (!fe) continue;
            const buf = await fe.async('arraybuffer');
            const f = new File([buf], m.name || m.file.split('/').pop(), { type: m.type || 'image/jpeg' });
            await saveImageToDB(m.id, f);
            restored++;
          }
          if (restored > 0) console.log('✅ ' + restored + ' Mediendateien aus Backup wiederhergestellt');
        } catch (e) {
          console.warn('Medien-Manifest konnte nicht verarbeitet werden:', e);
        }
      }

      const text = await rebuEntry.async('string');
      await oeffneProjektAusDaten(JSON.parse(text));
    }

    let autosaveTimeout = null;
    function showAutosaveIndicator(success = true) {
      if (!success) {
        // On error, show error directly in the indicator
        const el = document.getElementById('autosave-indicator');
        if (!el) return;
        const now = new Date();
        const time = now.toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit' });
        el.innerHTML = '<span style="color:#dc2626;font-weight:bold;">⚠ FEHLER ' + time + '</span>';
        if (autosaveTimeout) clearTimeout(autosaveTimeout);
        autosaveTimeout = setTimeout(() => {
          if (el) el.style.fontWeight = 'normal';
        }, 3000);
        return;
      }
      // On success, use the unified header status display
      updateHeaderStatus();
    }

    function updateHeaderStatus() {
      const indicator = document.getElementById('autosave-indicator');
      if (!indicator) return;

      const parts = [];
      if (state.filePath) {
        parts.push('\u{1F4C4} ' + state.filePath);
        if (state.dirty) {
          parts.push('<span style="color:#e8a838"> \u25CF Bearbeitet</span>');
        } else if (state.lastFileSaveTime) {
          const t = state.lastFileSaveTime.toLocaleTimeString('de-CH', {hour:'2-digit', minute:'2-digit'});
          parts.push('<span style="color:#4a9"> \u2713 ' + t + '</span>');
        }
      } else {
        parts.push('Nur im Browser');
        if (state.dirty) {
          parts.push('<span style="color:#e8a838"> \u25CF Nicht gesichert</span>');
        } else {
          const now = new Date();
          const time = now.toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit' });
          parts.push('<span style="color:#9ca3af"> \u2713 ' + time + '</span>');
        }
      }
      // Speicherplatz-Warnung bei >4MB (Safari-Limit ~5MB)
      var usageMB = parseFloat(getStorageUsageMB());
      if (usageMB > 4.0) {
        parts.push(' <span style="color:#dc2626;font-size:10px;" title="localStorage fast voll! Bitte Backup exportieren.">💾 ' + usageMB + '/5 MB</span>');
      } else if (usageMB > 3.0) {
        parts.push(' <span style="color:#e8a838;font-size:10px;" title="localStorage-Verbrauch">💾 ' + usageMB + ' MB</span>');
      }
      indicator.innerHTML = parts.join('');
    }
    
    // --- Auto-File-Save (throttled, 30s after last localStorage save) ---
    var _autoFileSaveTimer = null;
    function scheduleAutoFileSave() {
      if (!savedFileHandle || !state.dirty) return;
      if (_autoFileSaveTimer) return; // already scheduled
      // 3 Minuten: Die Sicherungskopie ist neu ein komplettes ZIP inkl. Medien –
      // das soll nicht alle 30 Sekunden neu gepackt werden.
      _autoFileSaveTimer = setTimeout(function() {
        _autoFileSaveTimer = null;
        if (savedFileHandle && state.dirty) {
          sichernProjekt(); // stilles Aktualisieren der Sicherungskopie
        }
      }, 180000);
    }

    // --- Save Reminder for new documents without a file handle ---
    var _saveReminderTimer = null;
    function startSaveReminder() {
      if (_saveReminderTimer) clearTimeout(_saveReminderTimer);
      if (savedFileHandle) return; // already has a file
      _saveReminderTimer = setTimeout(function() {
        if (!savedFileHandle && state.dirty) {
          showFormatToast('Tipp: Drücke \u2318S um dein Projekt als Datei zu sichern');
        }
      }, 300000); // 5 minutes
    }

    // Titelbild-Handling
    let pendingTitelbild = null;
    let pendingTitelbildFile = null; // Original File für IndexedDB
    
    function handleTitelbildUpload(input) {
      const file = input.files[0];
      if (!file) return;
      
      // Bild komprimieren und als Object-URL für Preview verwenden
      pendingTitelbildFile = file;
      
      // Preview erzeugen
      const previewUrl = URL.createObjectURL(file);
      pendingTitelbild = previewUrl; // Temporär für Preview
      
      let preview = document.getElementById('titelbild-preview');
      if (!preview) {
        const container = document.getElementById('titelbild-preview-container');
        if (container) {
          container.innerHTML = '<img id="titelbild-preview" class="w-16 h-16 object-cover rounded border">';
          preview = document.getElementById('titelbild-preview');
        }
      }
      if (preview) preview.src = previewUrl;
    }
    
    function removeTitelbild(fromTitelblatt) {
      pendingTitelbild = '';
      pendingTitelbildFile = null;
      if (fromTitelblatt) {
        state.projektMeta.titelbild = '';
        saveProjektDaten();
        render();
      } else {
        if (editingProjekt) editingProjekt.titelbild = '';
        render();
      }
    }
    
    // Titelbild direkt in IndexedDB speichern (für Titelblatt-Upload)
    async function savePendingTitelbild() {
      if (!pendingTitelbildFile) return;
      const imgId = 'titelbild_' + state.projektId;
      try {
        await saveImageToDB(imgId, pendingTitelbildFile);
        state.projektMeta.titelbild = 'idb:' + imgId;
        pendingTitelbildFile = null;
        pendingTitelbild = null;
        saveProjektDaten();
        render();
      } catch(e) {
        console.error('Titelbild-Speicherung fehlgeschlagen:', e);
      }
    }
    
    async function saveProjekt() {
      const name = document.getElementById('projekt-name').value.trim();
      if (!name) {
        alert('Bitte einen Projektnamen eingeben.');
        return;
      }
      
      // API-Key wird jetzt direkt im onchange gespeichert
      const apiKeyInput = document.getElementById('projekt-apikey');
      if (apiKeyInput) {
        const apiKey = apiKeyInput.value.trim();
        if (apiKey) {
          saveApiKey(apiKey);
        }
      }
      
      // Titelbild: In IndexedDB speichern, nur Referenz in localStorage
      let titelbildRef = editingProjekt?.titelbild || '';
      const projektId = editingProjekt?.id || genId();
      
      if (pendingTitelbildFile) {
        // Neues Bild hochgeladen → in IndexedDB speichern
        const imgId = 'titelbild_' + projektId;
        try {
          await saveImageToDB(imgId, pendingTitelbildFile);
          titelbildRef = 'idb:' + imgId; // Referenz statt Base64
          console.log('✅ Titelbild in IndexedDB gespeichert:', imgId);
        } catch(e) {
          console.error('Titelbild-Speicherung fehlgeschlagen:', e);
          titelbildRef = ''; // Fallback: kein Bild
        }
      } else if (pendingTitelbild === '') {
        // Bild wurde entfernt
        titelbildRef = '';
      }
      // Falls pendingTitelbild null → bestehendes Bild beibehalten (titelbildRef bleibt)
      
      // Bestehende base64-Titelbilder migrieren
      if (titelbildRef && titelbildRef.startsWith('data:image/') && titelbildRef.length > 1000) {
        try {
          const imgId = 'titelbild_' + projektId;
          const resp = await fetch(titelbildRef);
          const blob = await resp.blob();
          const file = new File([blob], 'titelbild.jpg', { type: blob.type });
          await saveImageToDB(imgId, file);
          titelbildRef = 'idb:' + imgId;
          console.log('✅ Titelbild migriert: base64 → IndexedDB');
        } catch(e) {
          console.warn('Migration fehlgeschlagen, behalte base64:', e);
        }
      }
      
      const projektDaten = {
        titel: document.getElementById('projekt-titel').value.trim() || name,
        untertitel: document.getElementById('projekt-untertitel').value.trim(),
        autor: document.getElementById('projekt-autor').value.trim(),
        copyright: document.getElementById('projekt-copyright')?.value.trim() || '',
        tagline: document.getElementById('projekt-tagline')?.value.trim() || '',
        logline: document.getElementById('projekt-logline')?.value.trim() || '',
        titelbild: titelbildRef,
        fassung: document.getElementById('projekt-fassung').value.trim() || 'Arbeitsfassung',
        premiere: document.getElementById('projekt-premiere').value,
        spielort: document.getElementById('projekt-spielort').value.trim(),
        fassungsDatum: new Date().toISOString()
      };
      
      const projekte = load(KEYS.projekte, []);
      
      if (editingProjekt?.id) {
        // Bestehendes Projekt aktualisieren
        const idx = projekte.findIndex(p => p.id === editingProjekt.id);
        if (idx !== -1) {
          projekte[idx].name = name;
        }
        save(KEYS.projekte, projekte);
        
        // Meta-Daten aktualisieren
        state.projektMeta = { ...state.projektMeta, ...projektDaten };
        saveProjektDaten();
      } else {
        // Neues Projekt erstellen
        const neueId = projektId;
        projekte.push({
          id: neueId,
          name: name,
          erstellt: new Date().toISOString()
        });
        save(KEYS.projekte, projekte);
        
        // Standard-Szene für neues Projekt erstellen
        const startSzeneId = genId();
        const ersteGruppe = state.projektMeta.eigeneGruppen?.[0] || 'Erster Akt';
        const startSzene = {
          id: startSzeneId,
          nummer: '1.1',
          titel: 'Start',
          gruppe: ersteGruppe,
          ort: '',
          zeit: '',
          zusammenfassung: '',
          figuren: []
        };
        
        if (!projektDaten.eigeneGruppen) {
          projektDaten.eigeneGruppen = ['Erster Akt'];
        }
        
        // Daten für neues Projekt speichern
        save(KEYS.projektMeta(neueId), projektDaten);
        save(KEYS.figuren(neueId), []);
        save(KEYS.szenen(neueId), [startSzene]);
        save(KEYS.textbuch(neueId), { [startSzeneId]: '<p class="format-standard"><br></p>' });
        save(KEYS.cues(neueId), []);
        save(KEYS.fassungen(neueId), []);
        save(KEYS.requisiten(neueId), []);
        save(KEYS.kostueme(neueId), []);
        save(KEYS.medien(neueId), []);
        save(KEYS.buehne(neueId), []);
        
        // Zum neuen Projekt wechseln
        wechsleProjekt(neueId);
      }
      
      closeModal('showProjektModal');
      editingProjekt = null;
      pendingTitelbild = null;
      pendingTitelbildFile = null;
    }
    
    function deleteProjekt(projektId) {
      const projekte = load(KEYS.projekte, []);
      
      if (projekte.length <= 1) {
        alert('Das letzte Projekt kann nicht gelöscht werden.');
        return;
      }
      
      const projekt = projekte.find(p => p.id === projektId);
      if (!confirm(`Projekt "${projekt?.name}" wirklich löschen?\n\nAlle Daten (Szenen, Figuren, Cues, etc.) werden unwiderruflich gelöscht!`)) {
        return;
      }
      
      // Projekt aus Liste entfernen
      const neueProjekte = projekte.filter(p => p.id !== projektId);
      save(KEYS.projekte, neueProjekte);
      
      // Projekt-Daten VOLLSTÄNDIG löschen (alle KEYS-Funktionen)
      const projektKeyFns = [
        'projektMeta', 'figuren', 'szenen', 'textbuch', 'cues', 'fassungen',
        'requisiten', 'kostueme', 'medien', 'buehne',
        'konzept', 'beziehungen', 'rechercheMaterial', 'musikkonzept',
        'ensemble', 'team', 'probeplan'
      ];
      projektKeyFns.forEach(fn => localStorage.removeItem(KEYS[fn](projektId)));

      // Fassungen und Projektdaten des Projekts aus IndexedDB löschen
      deleteFassungenFromDB(projektId).catch(() => {});
      deleteProjectDataFromDB(projektId).catch(() => {});

      // IndexedDB-Medien zum Projekt aufräumen
      try {
        if (mediaBD) {
          const stores = [AUDIO_STORE_NAME, IMAGE_STORE_NAME];
          stores.forEach(storeName => {
            try {
              const tx = mediaBD.transaction(storeName, 'readwrite');
              const store = tx.objectStore(storeName);
              const req = store.openCursor();
              req.onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                  // Keys die mit der ProjektId zusammenhängen löschen
                  if (cursor.key && String(cursor.key).includes(projektId)) {
                    cursor.delete();
                  }
                  cursor.continue();
                }
              };
            } catch(e) { console.warn('IndexedDB Store Cleanup Fehler:', e); }
          });
        }
      } catch(e) { console.warn('IndexedDB Cleanup Fehler:', e); }
      
      // Zu anderem Projekt wechseln (defensiv: nur wenn neueProjekte nicht leer)
      if (state.projektId === projektId && neueProjekte.length) {
        wechsleProjekt(neueProjekte[0].id);
      }
      
      closeModal('showProjektModal');
    }

    // ============================================
    // DRAMERA IMPORT/EXPORT
    // ============================================
    async function importFromDramera(jsonData) {
      try {
        const dramera = typeof jsonData === 'string' ? JSON.parse(jsonData) : jsonData;

        if (dramera.data) {
          const d = dramera.data;

          // Laufende asynchrone Projektdaten-Ladungen entwerten –
          // sonst könnte ein alter IndexedDB-Stand den Import überschreiben
          _projektLoadToken++;

          // BUGFIX DATENVERMISCHUNG: Vor dem Import ALLE Bereiche leeren.
          // Vorher blieben Daten des zuvor geladenen Projekts erhalten, wenn
          // die Datei den Bereich nicht enthielt (z.B. Requisiten von Projekt A
          // tauchten nach dem Öffnen von Projekt B dort auf und wurden mitgespeichert).
          state.projektMeta = {
            titel: 'Importiertes Projekt', untertitel: '', autor: '', tagline: '',
            logline: '', copyright: '', titelbild: '', fassung: 'Arbeitsfassung',
            fassungsDatum: new Date().toISOString(), eigeneGruppen: ['Erster Akt'],
            premiere: '', spielort: ''
          };
          state.figuren = [];
          state.szenen = [];
          state.textbuch = {};
          state.cues = [];
          state.requisiten = [];
          state.kostueme = [];
          state.medien = [];
          state.buehne = [];
          state.fassungen = [];
          state._fassungenDirty = true;
          state.konzept = { treatment: [], fundament: { kern: '', logline: '', unaussprechliches: '', emotionalerBogen: '', konflikt: '' }, werte: [], motive: [] };
          state.beziehungen = [];
          state.rechercheMaterial = [];
          state.musikkonzept = { text: '', stuecke: [] };
          state.ensemble = [];
          state.team = [];
          state.probeplan = [];
          state.aktiveSzene = null;
          state.referenzFassungId = null;
          state.projektMeta.titel = d.projektName || state.projektMeta.titel;
          
          // ProjektMeta wiederherstellen (wenn vorhanden)
          if (d.projektMeta) {
            state.projektMeta = { ...state.projektMeta, ...d.projektMeta };
          }
          
          // Titelbild: base64 → IndexedDB migrieren
          if (state.projektMeta.titelbild && state.projektMeta.titelbild.startsWith('data:image/') && state.projektMeta.titelbild.length > 1000) {
            try {
              const projektId = state.aktiveProjektId || 'import_' + Date.now();
              const imgId = 'titelbild_' + projektId;
              const resp = await fetch(state.projektMeta.titelbild);
              const blob = await resp.blob();
              const file = new File([blob], 'titelbild.jpg', { type: blob.type });
              await saveImageToDB(imgId, file);
              state.projektMeta.titelbild = 'idb:' + imgId;
              console.log('✅ Import: Titelbild in IndexedDB migriert');
            } catch(e) {
              console.warn('Import: Titelbild-Migration fehlgeschlagen:', e);
              state.projektMeta.titelbild = ''; // Lieber leer als localStorage sprengen
            }
          }
          
          if (d.autor) {
            state.projektMeta.autor = d.autor.name || state.projektMeta.autor || '';
          }
          
          if (d.fundament?.titel) {
            const t = d.fundament.titel;
            if (typeof t === 'object') {
              state.projektMeta.titel = t.titel || state.projektMeta.titel;
              state.projektMeta.untertitel = t.untertitel || state.projektMeta.untertitel || '';
              state.projektMeta.tagline = t.tagline || state.projektMeta.tagline || '';
            }
          }
          
          if (d.fundament?.logline) {
            state.projektMeta.logline = typeof d.fundament.logline === 'object' 
              ? d.fundament.logline.text 
              : d.fundament.logline;
          }
          
          // Figuren
          if (d.figuren && d.figuren.length > 0) {
            state.figuren = d.figuren.map(f => ({
              id: f.id || genId(),
              name: (f.name || 'Unbenannt').toUpperCase(),
              kuerzel: f.kuerzel || f.name?.substring(0, FIGUR_ABBREV_LENGTH).toUpperCase() || 'XX',
              beschreibung: f.beschreibung || f.wesen || '',
              want: f.want || f.wantExternal || '',
              need: f.need || f.needInternal || '',
              wunde: f.wunde || '',
              geheimnis: f.geheimnisse || '',
            }));
          }
          
          // Szenen
          if (d.felder && d.felder.length > 0) {
            state.szenen = d.felder.map((f, idx) => ({
              id: f.id || genId(),
              nummer: f.nummer || `${Math.floor(idx / 5) + 1}.${(idx % 5) + 1}`,
              titel: f.titel || `Szene ${idx + 1}`,
              gruppe: f.gruppe || '',
              ort: f.ort || '',
              zeit: f.zeit || '',
              figuren: f.figuren || [],
              zusammenfassung: f.zusammenfassung || '',
            }));
            
            d.felder.forEach(f => {
              if (f.inhalt) {
                state.textbuch[f.id] = sanitizeHtml(f.inhalt);
              }
            });
            
            if (state.szenen.length > 0) {
              state.aktiveSzene = state.szenen[0].id;
            }
          }
          
          // Cues
          if (d.cues && d.cues.length > 0) {
            state.cues = d.cues;
          }
          
          // Requisiten
          if (d.requisiten && d.requisiten.length > 0) {
            state.requisiten = d.requisiten;
          }
          
          // Kostüme
          if (d.kostueme && d.kostueme.length > 0) {
            state.kostueme = d.kostueme;
          }
          
          // Bühnenpläne
          if (d.buehne && d.buehne.length > 0) {
            state.buehne = d.buehne;
          }
          
          // Fassungen
          if (d.fassungen && d.fassungen.length > 0) {
            state.fassungen = d.fassungen.map(f => {
              // Textbuch in Fassungen sanitizen
              if (f.textbuch) {
                const sanitized = {};
                Object.keys(f.textbuch).forEach(key => {
                  sanitized[key] = sanitizeHtml(f.textbuch[key]);
                });
                f.textbuch = sanitized;
              }
              return f;
            });
            // Referenz auf letzte Fassung setzen (für Änderungsverfolgung)
            if (!state.referenzFassungId && state.fassungen.length > 0) {
              state.referenzFassungId = state.fassungen[state.fassungen.length - 1].id;
            }
            state._fassungenDirty = true; // importierte Fassungen in IndexedDB schreiben
          }
          
          // Medien: bevorzugt das vollständige Feld (v3.1) verwenden.
          // Nur mit allen Feldern (type/source/name) findet restoreAudioUrls
          // die Audio-/Video-Binärdaten in IndexedDB wieder.
          if (d.medien && d.medien.length > 0) {
            state.medien = d.medien.map(m => {
              const kopie = Object.assign({}, m);
              kopie.id = kopie.id || genId();
              delete kopie.localFileUrl; // wird via restoreAudioUrls neu erzeugt
              if (!kopie.szenen) kopie.szenen = [];
              return kopie;
            });
          } else if (d.recherche && d.recherche.length > 0) {
            // WICHTIG: Nur echte Medien (Audio/Video) aus dem Legacy-Feld
            // übernehmen. Das «recherche»-Feld der NINA-Austauschdatei enthält
            // dagegen Recherche-/Textmaterial – daraus dürfen KEINE leeren
            // «Material»-Medien entstehen (sonst verschwinden die echten Medien).
            const legacyMedien = d.recherche.filter(r => r.typ === 'audio' || r.typ === 'video');
            if (legacyMedien.length > 0) {
              state.medien = legacyMedien.map(r => ({
                id: r.id || genId(),
                typ: r.typ,
                titel: r.titel || r.name || '',
                name: r.titel || r.name || 'Medium',
                inhalt: r.inhalt || r.text || '',
                url: r.url || '',
                source: 'local',
                szenen: [],
              }));
            }
            // Recherche-/Textmaterial ggf. dorthin übernehmen, wo es hingehört
            if (!d.rechercheMaterial) {
              const echteRecherche = d.recherche.filter(r => r.typ && r.typ !== 'audio' && r.typ !== 'video');
              if (echteRecherche.length > 0) {
                state.rechercheMaterial = echteRecherche.map(r => ({
                  id: r.id || genId(),
                  type: r.type || r.typ || 'text',
                  title: r.title || r.titel || '',
                  content: r.content || r.inhalt || '',
                  url: r.url || '',
                  szeneIds: r.szeneIds || []
                }));
              }
            }
          }
          
          // v3.0 Felder
          if (d.konzept) state.konzept = d.konzept;
          if (d.beziehungen) state.beziehungen = d.beziehungen;
          if (d.rechercheMaterial) state.rechercheMaterial = d.rechercheMaterial;
          if (d.musikkonzept) state.musikkonzept = d.musikkonzept;
          if (d.ensemble) state.ensemble = d.ensemble;
          if (d.team) state.team = d.team;
          if (d.probeplan) state.probeplan = d.probeplan;
        }
        
        saveProjektDaten();

        // Audio-/Video-Verknüpfungen wiederherstellen (inkl. Auto-Reparatur
        // verwaister IndexedDB-Einträge aus alten Backups)
        try { await restoreAudioUrls(); } catch (e) { console.warn('Medien-Wiederherstellung:', e); }

        render();
        alert('✅ Import aus Backup erfolgreich!\n\n' +
              `${state.figuren.length} Figuren\n` +
              `${state.szenen.length} Szenen\n` +
              `${state.cues.length} Cues\n` +
              `${state.requisiten.length} Requisiten\n` +
              `${state.medien.length} Medien`);
        
      } catch (e) {
        console.error('Import-Fehler:', e);
        alert('❌ Import fehlgeschlagen: ' + e.message);
      }
    }

    // Projektdatei in einem EIGENEN Projekt-Slot öffnen (Bugfix Datenvermischung):
    // Vorher landeten alle per Datei geöffneten Projekte im selben Browser-Projekt –
    // «Tschingge» und «Brandbode» überschrieben sich gegenseitig bzw. vermischten sich.
    // Neu: Pro Projektname ein eigener Slot; existiert er, wird dorthin gewechselt.
    async function oeffneProjektAusDaten(data) {
      const dramera = typeof data === 'string' ? JSON.parse(data) : data;
      const name = dramera?.data?.projektName || dramera?.data?.projektMeta?.titel || 'Importiertes Projekt';

      const projekte = load(KEYS.projekte, []);
      let projekt = projekte.find(p => (p.name || p.titel) === name);
      if (!projekt) {
        projekt = { id: genId(), name: name, erstellt: new Date().toISOString() };
        projekte.push(projekt);
        save(KEYS.projekte, projekte);
      }
      if (projekt.id !== state.projektId) {
        wechsleProjekt(projekt.id); // sichert das bisherige Projekt und wechselt
      }

      await importFromDramera(dramera);

      // Projektlisten-Eintrag aktualisieren (Name/Zeitstempel)
      const liste = load(KEYS.projekte, []);
      const eintrag = liste.find(p => p.id === state.projektId);
      if (eintrag) {
        eintrag.name = state.projektMeta.titel || eintrag.name;
        eintrag.geaendert = new Date().toISOString();
        save(KEYS.projekte, liste);
      }
    }

    function exportToDramera() {
      // Sicherheitsnetz: Editor-Inhalt in state übernehmen (falls Aufrufer es vergessen hat)
      if (state.textbuchModus === 'fliesstext') {
        const editors = document.querySelectorAll('.fliesstext-editor[data-szene-id]');
        editors.forEach(ed => {
          const szeneId = ed.dataset.szeneId;
          if (szeneId) {
            let content = stripCueMarkers(ed.innerHTML);
            content = stripInlineRegie(content);
            state.textbuch[szeneId] = content;
          }
        });
      } else {
        const editor = document.getElementById('text-editor');
        if (editor && state.aktiveSzene) {
          let content = stripCueMarkers(editor.innerHTML);
          content = stripInlineRegie(content);
          state.textbuch[state.aktiveSzene] = content;
        }
      }
      
      return {
        _app: 'rebu',
        version: '3.0',
        exportDate: new Date().toISOString(),
        source: 'NINA-Rebu v3.0',
        data: {
          projektName: state.projektMeta.titel,
          projektMeta: JSON.parse(JSON.stringify(state.projektMeta)),
          autor: {
            name: state.projektMeta.autor,
            email: '',
            adresse: '',
            copyright: `© ${new Date().getFullYear()} ${state.projektMeta.autor}`
          },
          fundament: {
            titel: {
              titel: state.projektMeta.titel,
              untertitel: state.projektMeta.untertitel,
              tagline: state.projektMeta.tagline
            },
            logline: state.projektMeta.logline
          },
          figuren: state.figuren.map(f => ({
            id: f.id,
            name: f.name,
            kuerzel: f.kuerzel,
            beschreibung: f.beschreibung,
            want: f.want,
            need: f.need,
            wunde: f.wunde,
            geheimnisse: f.geheimnis
          })),
          felder: state.szenen.map(s => ({
            id: s.id,
            titel: s.titel,
            nummer: s.nummer,
            gruppe: s.gruppe,
            ort: s.ort,
            zeit: s.zeit,
            position: state.szenen.indexOf(s),
            figuren: s.figuren,
            zusammenfassung: s.zusammenfassung,
            inhalt: state.textbuch[s.id] || ''
          })),
          cues: JSON.parse(JSON.stringify(state.cues || [])),
          requisiten: JSON.parse(JSON.stringify(state.requisiten || [])),
          kostueme: JSON.parse(JSON.stringify(state.kostueme || [])),
          buehne: JSON.parse(JSON.stringify(state.buehne || [])),
          fassungen: JSON.parse(JSON.stringify(state.fassungen || [])),
          // Medien VOLLSTÄNDIG exportieren (alle Felder, ohne flüchtige Blob-URL).
          // Ohne type/source/name konnten Audios nach einem Backup-Import
          // nicht mehr mit IndexedDB verknüpft werden (MP3-Verlust-Bug).
          medien: state.medien.map(m => {
            const kopie = Object.assign({}, m);
            delete kopie.localFileUrl; // blob:-URLs sind nach Reload ungültig
            return kopie;
          }),
          // Legacy-Feld für ältere Versionen/Dramera
          recherche: state.medien.map(m => ({
            id: m.id,
            typ: m.typ,
            titel: m.titel,
            inhalt: m.inhalt,
            url: m.url
          })),
          // v3.0
          konzept: JSON.parse(JSON.stringify(state.konzept || {})),
          beziehungen: JSON.parse(JSON.stringify(state.beziehungen || [])),
          rechercheMaterial: JSON.parse(JSON.stringify(state.rechercheMaterial || [])),
          musikkonzept: JSON.parse(JSON.stringify(state.musikkonzept || {})),
          ensemble: JSON.parse(JSON.stringify(state.ensemble || [])),
          team: JSON.parse(JSON.stringify(state.team || [])),
          probeplan: JSON.parse(JSON.stringify(state.probeplan || []))
        }
      };
    }

    // ============================================
    // FASSUNGS-VERWALTUNG (v1.2: mit Uhrzeit)
    // ============================================
    function neueFassungSpeichern(name, source) {
      saveCurrentText(true); // WICHTIG: Aktuellen Editor-Inhalt sichern
      var fassungSource = source || 'manuell';
      const now = new Date();
      const fassung = {
        id: genId(),
        name: name || `Fassung vom ${formatDateTime(now)}`,
        datum: now.toISOString(),
        source: fassungSource,
        textbuch: JSON.parse(JSON.stringify(state.textbuch)),
        szenen: JSON.parse(JSON.stringify(state.szenen)),
        cues: JSON.parse(JSON.stringify(state.cues)),
      };

      state.fassungen.push(fassung);
      // Getrennte Limits: Automatische Fassungen werden gekürzt,
      // manuelle Fassungen/Backups bleiben erhalten (Warnung statt stillem Löschen).
      const MAX_AUTO_FASSUNGEN = 20;
      const MAX_MANUELLE_FASSUNGEN = 50;
      const autoFassungen = state.fassungen.filter(f => f.source && f.source !== 'manuell');
      if (autoFassungen.length > MAX_AUTO_FASSUNGEN) {
        const zuLoeschen = new Set(autoFassungen.slice(0, autoFassungen.length - MAX_AUTO_FASSUNGEN).map(f => f.id));
        state.fassungen = state.fassungen.filter(f => !zuLoeschen.has(f.id));
        console.log('🧹 ' + zuLoeschen.size + ' alte automatische Fassungen entfernt');
      }
      const manuelle = state.fassungen.filter(f => !f.source || f.source === 'manuell');
      if (manuelle.length > MAX_MANUELLE_FASSUNGEN) {
        const aelteste = manuelle[0];
        state.fassungen = state.fassungen.filter(f => f.id !== aelteste.id);
        alert('Hinweis: Das Limit von ' + MAX_MANUELLE_FASSUNGEN + ' manuellen Fassungen ist erreicht.\n\n' +
              'Die älteste Fassung «' + aelteste.name + '» wurde entfernt.\n' +
              'Tipp: Speichere regelmässig eine Sicherungskopie (⌘S).');
      }
      state.projektMeta.fassung = fassung.name;
      state.projektMeta.fassungsDatum = fassung.datum;
      state.referenzFassungId = fassung.id; // Automatisch als Referenz für Änderungsverfolgung
      state._fassungenDirty = true; // Fassungen in IndexedDB neu schreiben
      saveProjektDaten();
      render();
    }

    function fassungLaden(fassungId) {
      const fassung = state.fassungen.find(f => f.id === fassungId);
      if (fassung) {
        // Aktuellen Stand sichern bevor wir überschreiben
        saveCurrentText(true);
        flushPendingSave();
        
        if (!confirm(`Aktuelle Änderungen werden überschrieben.\n\nFassung "${fassung.name}" laden?`)) return;
        
        state.textbuch = JSON.parse(JSON.stringify(fassung.textbuch));
        state.szenen = JSON.parse(JSON.stringify(fassung.szenen));
        if (fassung.cues) state.cues = JSON.parse(JSON.stringify(fassung.cues));
        state.projektMeta.fassung = fassung.name;
        saveProjektDaten();
        render();
      }
    }

    // ============================================
    // UNDO/REDO SYSTEM (v1.2)
    // ============================================
    // Hilfsfunktion: Cue-Marker aus HTML entfernen
    function stripCueMarkers(html) {
      return html.replace(/<span class="cue-inline-marker[^"]*"[^>]*>[^<]*<\/span>/g, '');
    }
    
    function pushUndo() {
      const editor = document.getElementById('text-editor');
      if (!editor || !state.aktiveSzene) return;
      
      // Ohne Cue-Marker speichern
      const cleanContent = stripCueMarkers(editor.innerHTML);
      
      // Duplikate vermeiden: nicht pushen wenn identisch mit letztem Eintrag
      if (state.undoStack.length > 0) {
        const last = state.undoStack[state.undoStack.length - 1];
        if (last.content === cleanContent) return;
      }
      
      state.undoStack.push({
        szeneId: state.aktiveSzene,
        content: cleanContent
      });
      
      // Max Einträge begrenzen
      if (state.undoStack.length > MAX_UNDO_STACK) {
        state.undoStack.shift();
      }
      
      // Redo löschen bei neuer Aktion
      state.redoStack = [];
      updateUndoButtons();
    }
    
    // Debounced Undo: Snapshot nach Tipp-Pause (500ms)
    let undoTimer = null;
    let lastUndoContent = '';
    function debouncedPushUndo() {
      if (undoTimer) clearTimeout(undoTimer);
      undoTimer = setTimeout(() => {
        const editor = document.getElementById('text-editor');
        if (!editor || !state.aktiveSzene) return;
        const current = stripCueMarkers(editor.innerHTML);
        if (current !== lastUndoContent) {
          pushUndo();
          lastUndoContent = current;
        }
      }, 500);
    }
    
    // Sofort-Snapshot vor grösseren Aktionen (Enter, Paste, Format etc.)
    function pushUndoImmediate() {
      if (undoTimer) clearTimeout(undoTimer);
      const editor = document.getElementById('text-editor');
      if (!editor || !state.aktiveSzene) return;
      const current = stripCueMarkers(editor.innerHTML);
      if (current !== lastUndoContent) {
        pushUndo();
        lastUndoContent = current;
      }
    }
    
    // Initialzustand sichern wenn eine Szene betreten wird
    function initUndoForScene() {
      const editor = document.getElementById('text-editor');
      if (!editor || !state.aktiveSzene) return;
      const content = stripCueMarkers(editor.innerHTML);
      // Nur pushen wenn Stack leer oder letzter Eintrag anders
      if (state.undoStack.length === 0 || state.undoStack[state.undoStack.length - 1].content !== content) {
        state.undoStack.push({
          szeneId: state.aktiveSzene,
          content: content
        });
      }
      lastUndoContent = content;
    }
    
    function undo() {
      const editor = document.getElementById('text-editor');
      if (!editor || !state.aktiveSzene) return;
      
      // Pending Debounce abbrechen
      if (undoTimer) clearTimeout(undoTimer);
      
      const currentContent = stripCueMarkers(editor.innerHTML);
      
      // Finde den letzten Eintrag der sich vom aktuellen Inhalt unterscheidet
      let targetState = null;
      while (state.undoStack.length > 0) {
        const candidate = state.undoStack[state.undoStack.length - 1];
        if (candidate.content !== currentContent) {
          targetState = state.undoStack.pop();
          break;
        }
        // Identisch → entfernen und weitersuchen
        state.undoStack.pop();
      }
      
      if (!targetState) return;
      
      // Aktuellen Zustand in Redo sichern
      state.redoStack.push({
        szeneId: state.aktiveSzene,
        content: currentContent
      });
      
      // Zielzustand wiederherstellen
      state.textbuch[state.aktiveSzene] = targetState.content;
      lastUndoContent = targetState.content;
      
      const szeneCues = state.cues.filter(c => c.szeneId === state.aktiveSzene);
      const displayContent = state.textAnsicht === 'technik' 
        ? enrichTextWithCueMarkers(targetState.content, szeneCues) 
        : targetState.content;
      
      editor.innerHTML = wrapInlineRegie(displayContent);
      debouncedSaveProjektDaten();
      updateUndoButtons();
    }
    
    function redo() {
      const editor = document.getElementById('text-editor');
      if (!editor || !state.aktiveSzene) return;
      
      const currentContent = stripCueMarkers(editor.innerHTML);
      
      // Finde den letzten Redo-Eintrag der sich unterscheidet
      let targetState = null;
      while (state.redoStack.length > 0) {
        const candidate = state.redoStack[state.redoStack.length - 1];
        if (candidate.content !== currentContent) {
          targetState = state.redoStack.pop();
          break;
        }
        state.redoStack.pop();
      }
      
      if (!targetState) return;
      
      // Aktuellen Zustand in Undo sichern
      state.undoStack.push({
        szeneId: state.aktiveSzene,
        content: currentContent
      });
      
      // Redo-Zustand wiederherstellen
      state.textbuch[state.aktiveSzene] = targetState.content;
      lastUndoContent = targetState.content;
      
      const szeneCues = state.cues.filter(c => c.szeneId === state.aktiveSzene);
      const displayContent = state.textAnsicht === 'technik' 
        ? enrichTextWithCueMarkers(targetState.content, szeneCues) 
        : targetState.content;
      
      editor.innerHTML = wrapInlineRegie(displayContent);
      debouncedSaveProjektDaten();
      updateUndoButtons();
    }
    
    function updateUndoButtons() {
      const undoBtn = document.getElementById('undo-btn');
      const redoBtn = document.getElementById('redo-btn');
      if (undoBtn) undoBtn.disabled = state.undoStack.length === 0;
      if (redoBtn) redoBtn.disabled = state.redoStack.length === 0;
    }

    // ============================================
    // EDITOR FUNKTIONEN (v1.2: verbessert)
    // ============================================
    // ctxNode: optionaler, gesicherter Absatz-Knoten (Leader-Key: Chrome verwirft
    // die Selektion bei Esc – dann kommt der Kontext von dort statt aus der Live-Selektion)
    function applyFormat(format, ctxNode) {
      const editor = document.getElementById('text-editor');
      if (!editor) return;

      const selection = window.getSelection();
      let range = null;
      if (selection.rangeCount > 0) {
        const r = selection.getRangeAt(0);
        if (editor.contains(r.commonAncestorContainer)) range = r;
      }
      const selectedText = (range && !range.collapsed) ? range.toString().trim() : '';

      // WICHTIG: Wenn keine Auswahl, formatiere die ganze Zeile/Absatz
      if (!selectedText) {
        // Ausgangspunkt: Live-Selektion oder gesicherter Kontext (Leader-Key)
        let start = (range && editor.contains(range.startContainer)) ? range.startContainer : null;
        if (!start && ctxNode && editor.contains(ctxNode)) start = ctxNode;
        if (!start) {
          showFormatToast('⚠ Kein Absatz gewählt – bitte in den Text klicken');
          return;
        }

        // Bis zum obersten Element DIREKT unter dem Editor hochlaufen.
        // (Die frühere Suche nach dem ersten P/DIV blieb bei verschachtelten
        // Dialog-Strukturen am falschen Element hängen bzw. fand gar nichts –
        // dann musste man von Hand erst «Standard» zuweisen.)
        let node = start;
        while (node && node.parentNode !== editor && node !== editor) {
          node = node.parentNode;
        }
        if (!node || node === editor) {
          showFormatToast('⚠ Absatz nicht gefunden');
          return;
        }

        // Nackter Text-/Inline-Knoten direkt im Editor (z.B. nach Einfügen):
        // zuerst in einen sauberen Absatz normalisieren – automatisch statt von Hand.
        if (node.nodeType !== 1 || (node.tagName !== 'P' && node.tagName !== 'DIV')) {
          pushUndo();
          const wrapP = document.createElement('p');
          wrapP.className = 'format-standard';
          node.parentNode.replaceChild(wrapP, node);
          wrapP.appendChild(node);
          node = wrapP;
        }

        if (node && node !== editor && node.nodeType === 1) {
          // Undo speichern
          pushUndo();

          // Text des Absatzes holen (alle Whitespace normalisieren)
          const text = node.textContent.replace(/\s+/g, ' ').trim();
          if (!text) {
            // Leerer Absatz: nur die Format-Klasse wechseln
            const vorlageLeer = FORMATVORLAGEN[format];
            node.className = (vorlageLeer && vorlageLeer.class) || (format === 'figurenname' ? 'format-figurenname' : 'format-standard');
            saveCurrentText();
            showFormatToast('Format: ' + (FORMAT_NAMEN[format] || format));
            return;
          }

          // Neues formatiertes Element erstellen.
          // BUGFIX: Für 'figurenname' existierte KEIN Eintrag in FORMATVORLAGEN –
          // applyFormat('figurenname') (Esc+F) endete darum immer im TypeError.
          const vorlage = FORMATVORLAGEN[format] || { class: format === 'figurenname' ? 'format-figurenname' : 'format-standard' };
          let newElement;

          switch (format) {
            case 'figurenname': {
              // Absatztext wird zum Figurennamen einer neuen Dialog-Struktur
              newElement = document.createElement('div');
              newElement.className = 'format-dialog';
              const fmName = text.replace(/:\s*$/, '').toUpperCase();
              newElement.innerHTML = `<span class="figur-name">${escapeHtml(fmName)}:</span><span class="dialog-text"></span>`;
              break;
            }

            case 'dialog':
              newElement = document.createElement('div');
              newElement.className = vorlage.class;
              // Regex: Name (mit Umlauten, Leerzeichen, Zahlen, Punkten) gefolgt von Doppelpunkt
              const dMatch = text.match(/^([A-ZÄÖÜa-zäöü][A-ZÄÖÜa-zäöüß\s\d\.]*?):\s*(.*)$/);
              if (dMatch) {
                const figurName = dMatch[1].trim().toUpperCase();
                const dialogText = dMatch[2] || '';
                newElement.innerHTML = `<span class="figur-name">${escapeHtml(figurName)}:</span><span class="dialog-text">${escapeHtml(dialogText)}</span>`;
              } else {
                // Kein Doppelpunkt gefunden - ganzer Text wird Dialog
                newElement.innerHTML = `<span class="figur-name">FIGUR:</span><span class="dialog-text">${escapeHtml(text)}</span>`;
              }
              break;
              
            case 'regieanweisung':
              newElement = document.createElement('p');
              newElement.className = vorlage.class;
              let regiText = text;
              if (!regiText.startsWith('(')) regiText = '(' + regiText;
              if (!regiText.endsWith(')')) regiText = regiText + ')';
              newElement.textContent = regiText;
              break;
            
            case 'szeneTitel':
              newElement = document.createElement('p');
              newElement.className = vorlage.class;
              newElement.textContent = text;
              // Neue Szene erstellen
              setTimeout(() => createSceneFromTitle(text, node), 100);
              break;
            
            case 'aktTitel':
              newElement = document.createElement('p');
              newElement.className = vorlage.class;
              newElement.textContent = text;
              // Neuen Akt erstellen
              setTimeout(() => createActFromTitle(text, node), 100);
              break;
              
            default:
              newElement = document.createElement('p');
              newElement.className = vorlage.class;
              newElement.textContent = text;
          }
          
          // Element ersetzen
          node.parentNode.replaceChild(newElement, node);
          
          // Cursor ans Ende des neuen Elements setzen
          const newRange = document.createRange();
          newRange.selectNodeContents(newElement);
          newRange.collapse(false);
          selection.removeAllRanges();
          selection.addRange(newRange);
          
          saveCurrentText();
        }
        return;
      }
      
      // Mit Auswahl: Original-Verhalten
      // Undo speichern
      pushUndo();

      const vorlage = FORMATVORLAGEN[format] || { class: format === 'figurenname' ? 'format-figurenname' : 'format-standard' };
      let newHtml = '';

      switch (format) {
        case 'figurenname':
          newHtml = `<div class="format-dialog"><span class="figur-name">${escapeHtml(selectedText.replace(/:\s*$/, '').toUpperCase())}:</span><span class="dialog-text"></span></div>`;
          break;

        case 'dialog':
          // v1.4: Dialog-Format - erkennt NAME: Text
          const selMatch = selectedText.replace(/\s+/g, ' ').match(/^([A-ZÄÖÜa-zäöü][A-ZÄÖÜa-zäöüß\s\d\.]*?):\s*(.*)$/);
          if (selMatch) {
            const fName = selMatch[1].trim().toUpperCase();
            newHtml = `<div class="${vorlage.class}"><span class="figur-name">${escapeHtml(fName)}:</span><span class="dialog-text">${escapeHtml(selMatch[2])}</span></div>`;
          } else {
            newHtml = `<div class="${vorlage.class}"><span class="figur-name">FIGUR:</span><span class="dialog-text">${escapeHtml(selectedText)}</span></div>`;
          }
          break;

        case 'regieanweisung':
          let text = selectedText;
          if (!text.startsWith('(')) text = '(' + text;
          if (!text.endsWith(')')) text = text + ')';
          newHtml = `<p class="${vorlage.class}">${escapeHtml(text)}</p>`;
          break;

        case 'szeneTitel':
          newHtml = `<p class="${vorlage.class}">${escapeHtml(selectedText)}</p>`;
          // Neue Szene erstellen wenn gewünscht
          setTimeout(() => createSceneFromTitle(selectedText, null), 100);
          break;

        case 'aktTitel':
          newHtml = `<p class="${vorlage.class}">${escapeHtml(selectedText)}</p>`;
          // Neuen Akt erstellen
          setTimeout(() => createActFromTitle(selectedText, null), 100);
          break;

        case 'lied':
          newHtml = `<p class="${vorlage.class}">${escapeHtml(selectedText)}</p>`;
          break;

        case 'vers':
          newHtml = `<p class="${vorlage.class}">${escapeHtml(selectedText)}</p>`;
          break;

        default:
          newHtml = `<p class="${vorlage.class}">${escapeHtml(selectedText)}</p>`;
      }
      
      range.deleteContents();
      const temp = document.createElement('div');
      temp.innerHTML = newHtml;
      const frag = document.createDocumentFragment();
      while (temp.firstChild) {
        frag.appendChild(temp.firstChild);
      }
      range.insertNode(frag);
      
      selection.removeAllRanges();
      saveCurrentText();
    }
