    // ============================================
    // AUTOMATISCHE ÄNDERUNGSVERFOLGUNG (Diff)
    // ============================================
    
    // HTML zu Plain-Text-Zeilen konvertieren (Struktur erhalten)
    function htmlToTextLines(html) {
      if (!html) return [];
      // Block-Elemente durch Zeilenumbruch ersetzen
      let text = html
        .replace(/<br\s*\/?>/gi, '\n')
        .replace(/<\/(div|p|h[1-6])>/gi, '\n')
        .replace(/<[^>]+>/g, '')
        .replace(/&nbsp;/g, ' ')
        .replace(/&amp;/g, '&')
        .replace(/&lt;/g, '<')
        .replace(/&gt;/g, '>')
        .replace(/&quot;/g, '"')
        .replace(/&#39;/g, "'")
        .replace(/\n{3,}/g, '\n\n');
      return text.split('\n').map(l => l.trim());
    }
    
    // Wort-Level Diff (LCS-basiert)
    function diffWords(oldWords, newWords) {
      const m = oldWords.length;
      const n = newWords.length;
      
      // Optimierung: leere Arrays
      if (m === 0 && n === 0) return [];
      if (m === 0) return newWords.map(w => ({ type: 'ins', word: w }));
      if (n === 0) return oldWords.map(w => ({ type: 'del', word: w }));
      
      // LCS-Tabelle (optimiert: nur 2 Zeilen)
      let prev = new Array(n + 1).fill(0);
      let curr = new Array(n + 1).fill(0);
      
      // Vollständige Tabelle für Backtracking
      const dp = [prev.slice()];
      for (let i = 1; i <= m; i++) {
        curr = new Array(n + 1).fill(0);
        for (let j = 1; j <= n; j++) {
          if (oldWords[i - 1] === newWords[j - 1]) {
            curr[j] = prev[j - 1] + 1;
          } else {
            curr[j] = Math.max(prev[j], curr[j - 1]);
          }
        }
        dp.push(curr.slice());
        prev = curr;
      }
      
      // Backtrack
      const result = [];
      let i = m, j = n;
      while (i > 0 || j > 0) {
        if (i > 0 && j > 0 && oldWords[i - 1] === newWords[j - 1]) {
          result.unshift({ type: 'same', word: oldWords[i - 1] });
          i--; j--;
        } else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) {
          result.unshift({ type: 'ins', word: newWords[j - 1] });
          j--;
        } else {
          result.unshift({ type: 'del', word: oldWords[i - 1] });
          i--;
        }
      }
      return result;
    }
    
    // Zeilen-Level Diff
    function diffLines(oldLines, newLines) {
      const m = oldLines.length;
      const n = newLines.length;
      
      if (m === 0 && n === 0) return [];
      if (m === 0) return newLines.map(l => ({ type: 'ins', line: l }));
      if (n === 0) return oldLines.map(l => ({ type: 'del', line: l }));
      
      const dp = Array(m + 1).fill(null).map(() => Array(n + 1).fill(0));
      for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
          if (oldLines[i - 1] === newLines[j - 1]) {
            dp[i][j] = dp[i - 1][j - 1] + 1;
          } else {
            dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
          }
        }
      }
      
      // Backtrack (reine LCS-Diff: same/del/ins)
      const raw = [];
      let i = m, j = n;
      while (i > 0 || j > 0) {
        if (i > 0 && j > 0 && oldLines[i - 1] === newLines[j - 1]) {
          raw.unshift({ type: 'same', oldLine: oldLines[i - 1], newLine: newLines[j - 1] });
          i--; j--;
        } else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) {
          raw.unshift({ type: 'ins', line: newLines[j - 1] });
          j--;
        } else {
          raw.unshift({ type: 'del', line: oldLines[i - 1] });
          i--;
        }
      }
      
      // Post-processing: aufeinanderfolgende del+ins Paare als 'changed' zusammenfassen
      const result = [];
      let idx = 0;
      while (idx < raw.length) {
        if (idx + 1 < raw.length && raw[idx].type === 'del' && raw[idx + 1].type === 'ins'
            && raw[idx].line.length > 0 && raw[idx + 1].line.length > 0) {
          result.push({ type: 'changed', oldLine: raw[idx].line, newLine: raw[idx + 1].line });
          idx += 2;
        } else {
          result.push(raw[idx]);
          idx++;
        }
      }
      return result;
    }
    
    // Escaping für HTML-Anzeige
    function escHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    
    // Diff für eine Szene berechnen und als HTML rendern
    function computeDiffHtml(szeneId) {
      // Referenz-Fassung holen
      const refFassung = getReferenzFassung();
      if (!refFassung) return null;
      
      const oldHtml = refFassung.textbuch?.[szeneId] || '';
      const newHtml = state.textbuch[szeneId] || '';
      
      // Zu Textzeilen konvertieren
      const oldLines = htmlToTextLines(oldHtml);
      const newLines = htmlToTextLines(newHtml);
      
      // Zeilen-Diff
      const lineDiff = diffLines(oldLines, newLines);
      
      let html = '';
      let delCount = 0;
      let insCount = 0;
      
      lineDiff.forEach(entry => {
        if (entry.type === 'same') {
          // Unveränderte Zeile
          if (entry.oldLine.length > 0) {
            html += `<p style="margin:4px 0;">${escHtml(entry.oldLine)}</p>`;
          } else {
            html += `<p style="margin:4px 0;">&nbsp;</p>`;
          }
        } else if (entry.type === 'del') {
          // Komplett gelöschte Zeile
          if (entry.line.length > 0) {
            html += `<p style="margin:4px 0;"><span class="diff-deleted">${escHtml(entry.line)}</span></p>`;
            delCount++;
          }
        } else if (entry.type === 'ins') {
          // Komplett neue Zeile
          if (entry.line.length > 0) {
            html += `<p style="margin:4px 0;"><span class="diff-inserted">${escHtml(entry.line)}</span></p>`;
            insCount++;
          }
        } else if (entry.type === 'changed') {
          // Geänderte Zeile: Wort-Level Diff
          const oldW = entry.oldLine.split(/(\s+)/).filter(w => w.trim().length > 0);
          const newW = entry.newLine.split(/(\s+)/).filter(w => w.trim().length > 0);
          const wordDiff = diffWords(oldW, newW);
          
          let lineHtml = '';
          wordDiff.forEach(wd => {
            if (wd.type === 'same') {
              lineHtml += escHtml(wd.word) + ' ';
            } else if (wd.type === 'del') {
              lineHtml += `<span class="diff-deleted">${escHtml(wd.word)}</span> `;
              delCount++;
            } else if (wd.type === 'ins') {
              lineHtml += `<span class="diff-inserted">${escHtml(wd.word)}</span> `;
              insCount++;
            }
          });
          html += `<p style="margin:4px 0;">${lineHtml.trim()}</p>`;
        }
      });
      
      return { html, delCount, insCount };
    }
    
    // Referenz-Fassung holen
    function getReferenzFassung() {
      if (!state.fassungen || state.fassungen.length === 0) return null;
      
      // Wenn eine bestimmte Referenz gesetzt ist
      if (state.referenzFassungId) {
        const ref = state.fassungen.find(f => f.id === state.referenzFassungId);
        if (ref) return ref;
      }
      
      // Standard: letzte gespeicherte Fassung
      return state.fassungen[state.fassungen.length - 1];
    }
    
    // Referenz-Fassung setzen
    function setReferenzFassung(fassungId) {
      state.referenzFassungId = fassungId || null;
      render();
    }
    
    // ============================================
    // SUCHEN & ERSETZEN
    // ============================================
    
    let searchReplaceVisible = false;
    
    function toggleSearchReplace() {
      searchReplaceVisible = !searchReplaceVisible;
      const existing = document.getElementById('search-replace-bar');
      if (existing) {
        existing.remove();
        searchReplaceVisible = false;
        clearSearchHighlights();
        return;
      }
      buildSearchBar();
      setTimeout(() => document.getElementById('search-input')?.focus(), 50);
    }

    // Suchleiste aufbauen (auch nach einem render()-Neuaufbau wiederverwendbar)
    function buildSearchBar(prefillQuery, prefillReplace) {
      const toolbar = document.querySelector('.toolbar');
      if (!toolbar) return false;
      const existing = document.getElementById('search-replace-bar');
      if (existing) existing.remove();
      const bar = document.createElement('div');
      bar.id = 'search-replace-bar';
      bar.style.cssText = 'display:flex; align-items:center; gap:8px; padding:6px 12px; background:#f8fafc; border-top:1px solid #e2e8f0; flex-wrap:wrap;';
      bar.innerHTML = `
        <input type="text" id="search-input" placeholder="Suchen..." 
               style="padding:4px 8px; border:1px solid #d1d5db; border-radius:4px; font-size:13px; width:180px;"
               oninput="doSearch()" onkeydown="if(event.key==='Enter'){event.preventDefault(); doSearchNext();}">
        <span id="search-count" style="font-size:11px; color:#6b7280; min-width:60px;"></span>
        <button onclick="doSearchNext()" style="padding:3px 8px; font-size:12px; border:1px solid #d1d5db; border-radius:4px; background:white; cursor:pointer;" title="Nächster Treffer">▼</button>
        <button onclick="doSearchPrev()" style="padding:3px 8px; font-size:12px; border:1px solid #d1d5db; border-radius:4px; background:white; cursor:pointer;" title="Vorheriger Treffer">▲</button>
        <div style="width:1px; height:20px; background:#d1d5db;"></div>
        <input type="text" id="replace-input" placeholder="Ersetzen durch..." 
               style="padding:4px 8px; border:1px solid #d1d5db; border-radius:4px; font-size:13px; width:180px;">
        <button onclick="doReplace()" style="padding:3px 8px; font-size:12px; border:1px solid #d1d5db; border-radius:4px; background:white; cursor:pointer;">Ersetzen</button>
        <button onclick="doReplaceAll()" style="padding:3px 8px; font-size:12px; border:1px solid #d1d5db; border-radius:4px; background:white; cursor:pointer;">Alle</button>
        <button onclick="toggleSearchReplace()" style="padding:3px 8px; font-size:12px; border:none; background:none; cursor:pointer; color:#6b7280;" title="Schliessen">✕</button>
      `;
      toolbar.after(bar);
      if (prefillQuery) {
        const si = document.getElementById('search-input');
        if (si) si.value = prefillQuery;
      }
      if (prefillReplace) {
        const ri = document.getElementById('replace-input');
        if (ri) ri.value = prefillReplace;
      }
      searchReplaceVisible = true;
      return true;
    }

    let searchMatches = [];
    let currentMatchIndex = -1;
    // Dokumentweite Suche: Treffer-Zählung über ALLE Szenen (nicht nur die aktive)
    let globalSearch = { query: '', szenen: [], totalCount: 0 };
    let _preserveSearch = null; // Kontext beim Szenenwechsel während der Suche

    // Wurzel-Elemente für die DOM-Suche: Szenen-Editor ODER alle Fliesstext-Editoren
    function _searchRoots() {
      const single = document.getElementById('text-editor');
      if (single) return [single];
      return Array.from(document.querySelectorAll('.fliesstext-editor[data-szene-id]'));
    }

    // Treffer pro Szene im DATENMODELL zählen (für die dokumentweite Anzeige/Navigation)
    function computeGlobalSearch(query) {
      const queryLower = query.toLowerCase();
      const list = [];
      let total = 0;
      (state.szenen || []).forEach(s => {
        const html = state.textbuch[s.id] || '';
        if (!html) return;
        const tmp = document.createElement('div');
        tmp.innerHTML = html;
        const text = (tmp.textContent || '').toLowerCase();
        let c = 0, pos = 0;
        while ((pos = text.indexOf(queryLower, pos)) !== -1) { c++; pos += Math.max(1, queryLower.length); }
        if (c > 0) { list.push({ szeneId: s.id, count: c }); total += c; }
      });
      globalSearch = { query, szenen: list, totalCount: total };
    }

    function doSearch() {
      clearSearchHighlights();
      const query = document.getElementById('search-input')?.value;
      const countEl = document.getElementById('search-count');
      if (!query || query.length < 2) {
        if (countEl) countEl.textContent = '';
        searchMatches = [];
        currentMatchIndex = -1;
        globalSearch = { query: '', szenen: [], totalCount: 0 };
        return;
      }

      // Aktuellen Editor-Stand ins Datenmodell übernehmen, dann DOKUMENTWEIT zählen
      saveCurrentText();
      computeGlobalSearch(query);

      const roots = _searchRoots();
      searchMatches = [];
      const queryLower = query.toLowerCase();

      roots.forEach(root => {
        const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null, false);
        const textNodes = [];
        while (walker.nextNode()) textNodes.push(walker.currentNode);
        const localMatches = [];
        textNodes.forEach(node => {
          const text = node.textContent.toLowerCase();
          let pos = 0;
          while ((pos = text.indexOf(queryLower, pos)) !== -1) {
            localMatches.push({ node, start: pos, length: query.length });
            pos += query.length;
          }
        });
        // Rückwärts highlighten, damit Positionen stabil bleiben
        for (let i = localMatches.length - 1; i >= 0; i--) {
          const m = localMatches[i];
          try {
            const range = document.createRange();
            range.setStart(m.node, m.start);
            range.setEnd(m.node, m.start + m.length);
            const mark = document.createElement('mark');
            mark.className = 'search-highlight';
            mark.style.cssText = 'background:#fde68a; padding:0 1px; border-radius:2px;';
            range.surroundContents(mark);
          } catch(e) { /* Skip if range crosses elements */ }
        }
      });

      // Matches-Liste = alle Marks (über alle Roots, in Dokumentreihenfolge)
      searchMatches = [];
      roots.forEach(root => {
        searchMatches.push(...root.querySelectorAll('mark.search-highlight'));
      });
      currentMatchIndex = searchMatches.length > 0 ? 0 : -1;

      _updateSearchCount();
      if (currentMatchIndex >= 0) highlightCurrentMatch();
    }

    function _updateSearchCount() {
      const countEl = document.getElementById('search-count');
      if (!countEl) return;
      const gesamt = globalSearch.totalCount;
      const szenenMitTreffern = globalSearch.szenen.length;
      if (gesamt === 0) { countEl.textContent = 'Keine Treffer'; return; }
      if (document.getElementById('text-editor') && szenenMitTreffern > 1) {
        // Szenen-Modus: Gesamtzahl über alle Szenen anzeigen
        const lokal = searchMatches.length;
        const pos = currentMatchIndex >= 0 ? (currentMatchIndex + 1) + '/' + lokal + ' hier · ' : '';
        countEl.textContent = pos + gesamt + ' Treffer in ' + szenenMitTreffern + ' Szenen';
      } else {
        countEl.textContent = searchMatches.length > 0
          ? `${currentMatchIndex >= 0 ? (currentMatchIndex + 1) + ' / ' : ''}${searchMatches.length} Treffer`
          : gesamt + ' Treffer (in anderen Szenen – ▼ springt hin)';
      }
    }

    function highlightCurrentMatch() {
      // Alle auf Standard zurück
      searchMatches.forEach(m => {
        if (m.style) { m.style.background = '#fde68a'; m.style.color = ''; }
      });
      // Aktuellen hervorheben
      if (currentMatchIndex >= 0 && currentMatchIndex < searchMatches.length) {
        const current = searchMatches[currentMatchIndex];
        current.style.background = '#f97316';
        current.style.color = 'white';
        current.scrollIntoView({ behavior: 'smooth', block: 'center' });
        _updateSearchCount();
      }
    }

    // Nächste/vorherige Szene mit Treffern finden (Dokumentreihenfolge, mit Umlauf)
    function _findSearchScene(dir) {
      const list = globalSearch.szenen;
      if (list.length === 0) return null;
      const idx = list.findIndex(e => e.szeneId === state.aktiveSzene);
      if (idx === -1) {
        // Aktive Szene hat keine Treffer → erste/letzte Szene mit Treffern
        return dir > 0 ? list[0].szeneId : list[list.length - 1].szeneId;
      }
      if (list.length === 1) return null; // nur die aktive Szene hat Treffer
      const nextIdx = (idx + dir + list.length) % list.length;
      return list[nextIdx].szeneId;
    }

    // Während der Suche in eine andere Szene springen: Suchleiste und Query überleben
    function _gotoSearchScene(szeneId, targetLocalIndex) {
      const query = document.getElementById('search-input')?.value || globalSearch.query;
      const replaceVal = document.getElementById('replace-input')?.value || '';
      _preserveSearch = { query, replaceVal };
      selectSzene(szeneId);
      // Nach dem Re-Render: Leiste wiederherstellen und in der neuen Szene suchen
      setTimeout(() => {
        buildSearchBar(query, replaceVal);
        doSearch();
        if (searchMatches.length > 0) {
          currentMatchIndex = targetLocalIndex >= 0
            ? Math.min(targetLocalIndex, searchMatches.length - 1)
            : searchMatches.length - 1;
          highlightCurrentMatch();
        }
        _preserveSearch = null;
      }, 60);
    }

    function doSearchNext() {
      if (searchMatches.length > 0 && currentMatchIndex < searchMatches.length - 1) {
        currentMatchIndex++;
        highlightCurrentMatch();
        return;
      }
      // Ende der aktiven Szene erreicht → nächste Szene mit Treffern (nur Szenen-Modus)
      if (document.getElementById('text-editor')) {
        const next = _findSearchScene(1);
        if (next) { _gotoSearchScene(next, 0); return; }
      }
      // Umlauf innerhalb der Szene
      if (searchMatches.length > 0) {
        currentMatchIndex = 0;
        highlightCurrentMatch();
      }
    }

    function doSearchPrev() {
      if (searchMatches.length > 0 && currentMatchIndex > 0) {
        currentMatchIndex--;
        highlightCurrentMatch();
        return;
      }
      if (document.getElementById('text-editor')) {
        const prev = _findSearchScene(-1);
        if (prev) { _gotoSearchScene(prev, -1); return; }
      }
      if (searchMatches.length > 0) {
        currentMatchIndex = searchMatches.length - 1;
        highlightCurrentMatch();
      }
    }

    function doReplace() {
      if (currentMatchIndex < 0 || currentMatchIndex >= searchMatches.length) return;
      const replaceWith = document.getElementById('replace-input')?.value || '';

      pushUndoImmediate();

      const mark = searchMatches[currentMatchIndex];
      mark.replaceWith(document.createTextNode(replaceWith));

      saveCurrentText();
      doSearch(); // Re-search
    }

    // Suchbegriff in einem HTML-String ersetzen – über DOM-Parsing,
    // damit NIE in Tags/Attributen (z.B. Klassennamen) ersetzt wird
    function _replaceInHtml(html, query, replaceWith) {
      const tmp = document.createElement('div');
      tmp.innerHTML = html;
      const queryLower = query.toLowerCase();
      let count = 0;
      const walker = document.createTreeWalker(tmp, NodeFilter.SHOW_TEXT, null, false);
      const textNodes = [];
      while (walker.nextNode()) textNodes.push(walker.currentNode);
      textNodes.forEach(node => {
        const text = node.textContent;
        const textLower = text.toLowerCase();
        if (textLower.indexOf(queryLower) === -1) return;
        let result = '';
        let pos = 0, found;
        while ((found = textLower.indexOf(queryLower, pos)) !== -1) {
          result += text.substring(pos, found) + replaceWith;
          pos = found + query.length;
          count++;
        }
        result += text.substring(pos);
        node.textContent = result;
      });
      return { html: tmp.innerHTML, count };
    }

    function doReplaceAll() {
      const query = document.getElementById('search-input')?.value;
      if (!query || query.length < 2) return;
      const replaceWith = document.getElementById('replace-input')?.value || '';

      // Treffer ausserhalb der aktuell sichtbaren Szene(n)?
      saveCurrentText();
      computeGlobalSearch(query);
      const sichtbareIds = new Set();
      if (document.getElementById('text-editor')) {
        if (state.aktiveSzene) sichtbareIds.add(state.aktiveSzene);
      } else {
        document.querySelectorAll('.fliesstext-editor[data-szene-id]').forEach(ed => sichtbareIds.add(ed.dataset.szeneId));
      }
      const andereSzenen = globalSearch.szenen.filter(e => !sichtbareIds.has(e.szeneId));
      const andereCount = andereSzenen.reduce((sum, e) => sum + e.count, 0);

      if (andereCount > 0) {
        if (!confirm('«' + query + '» wird im GANZEN Dokument ersetzt:\n\n' +
                     '• ' + andereCount + ' Treffer in ' + andereSzenen.length + ' anderen Szenen\n' +
                     '• ' + searchMatches.length + ' Treffer in der aktuellen Ansicht\n\n' +
                     'Hinweis: Ersetzungen in anderen Szenen können nicht per Undo rückgängig gemacht werden.\n\nFortfahren?')) {
          return;
        }
      } else if (searchMatches.length === 0) {
        return;
      }

      pushUndoImmediate();

      // 1) Sichtbare Treffer im DOM ersetzen
      let ersetztLokal = 0;
      for (let i = searchMatches.length - 1; i >= 0; i--) {
        searchMatches[i].replaceWith(document.createTextNode(replaceWith));
        ersetztLokal++;
      }
      saveCurrentText();

      // 2) Alle übrigen Szenen im DATENMODELL ersetzen (DOM-Parsing, kein rohes String-Replace)
      let ersetztAndere = 0;
      andereSzenen.forEach(e => {
        const html = state.textbuch[e.szeneId];
        if (!html) return;
        const res = _replaceInHtml(html, query, replaceWith);
        if (res.count > 0) {
          state.textbuch[e.szeneId] = res.html;
          ersetztAndere += res.count;
        }
      });
      if (ersetztAndere > 0) saveProjektDaten();

      const countEl = document.getElementById('search-count');
      if (countEl) countEl.textContent = (ersetztLokal + ersetztAndere) + ' ersetzt' +
        (ersetztAndere > 0 ? ' (' + ersetztAndere + ' in anderen Szenen)' : '');
      searchMatches = [];
      currentMatchIndex = -1;
      globalSearch = { query: '', szenen: [], totalCount: 0 };
    }

    function clearSearchHighlights() {
      _searchRoots().forEach(root => {
        const marks = root.querySelectorAll('mark.search-highlight');
        marks.forEach(mark => {
          mark.replaceWith(document.createTextNode(mark.textContent));
        });
        // Adjazente Text-Nodes zusammenführen
        root.normalize();
      });
    }
    
    // v1.2: Text als gestrichen markieren
    function toggleGestrichen() {
      const editor = document.getElementById('text-editor');
      if (!editor) return;
      
      const selection = window.getSelection();
      if (!selection.rangeCount) return;
      
      const range = selection.getRangeAt(0);
      const selectedText = range.toString().trim();
      if (!selectedText) return;
      
      // Undo speichern
      pushUndo();
      
      // Prüfen ob bereits gestrichen
      const parentEl = range.commonAncestorContainer.parentElement;
      if (parentEl && parentEl.classList.contains('format-gestrichen')) {
        // Streichung entfernen
        const text = parentEl.textContent;
        parentEl.replaceWith(document.createTextNode(text));
      } else {
        // Streichung hinzufügen
        const span = document.createElement('span');
        span.className = 'format-gestrichen';
        span.textContent = selectedText;
        range.deleteContents();
        range.insertNode(span);
      }
      
      selection.removeAllRanges();
      saveCurrentText();
    }
    
    // NEU: Ergänzung markieren
    function toggleErgaenzung() {
      const editor = document.getElementById('text-editor');
      if (!editor) return;
      
      const selection = window.getSelection();
      if (!selection.rangeCount) return;
      
      const range = selection.getRangeAt(0);
      const selectedText = range.toString().trim();
      if (!selectedText) return;
      
      // Undo speichern
      pushUndo();
      
      // Prüfen ob bereits Ergänzung
      const parentEl = range.commonAncestorContainer.parentElement;
      if (parentEl && parentEl.classList.contains('format-ergaenzung')) {
        // Ergänzung entfernen
        const text = parentEl.textContent;
        parentEl.replaceWith(document.createTextNode(text));
      } else {
        // Ergänzung hinzufügen
        const span = document.createElement('span');
        span.className = 'format-ergaenzung';
        span.textContent = selectedText;
        range.deleteContents();
        range.insertNode(span);
      }
      
      selection.removeAllRanges();

    // NEU: Ansicht wechseln
    function setTextAnsicht(ansicht) {

    // NEU: Editor-Klassen basierend auf Ansicht
    function getEditorClasses() {
      const classes = ['editor-content'];
      
      switch (state.textAnsicht) {

          // Keine Cues, keine Änderungsmarkierungen

    // Alle Fliesstext-Editoren speichern
    function saveAllFliesstextEditors() {
      const editors = document.querySelectorAll('.fliesstext-editor[data-szene-id]');
      editors.forEach(editor => {
        const szeneId = editor.dataset.szeneId;
        if (szeneId) {
          let content = stripCueMarkers(editor.innerHTML);
          content = stripInlineRegie(content);
          state.textbuch[szeneId] = content;
        }
      });
      debouncedSaveProjektDaten();

    // Fliesstext-Editoren Event-Listener registrieren (nach render())
    function initFliesstextEditors() {
      const editors = document.querySelectorAll('.fliesstext-editor[data-szene-id]');
      editors.forEach(editor => {
        const szeneId = editor.dataset.szeneId;
        
        // Standard-Absatztrenner
        try { document.execCommand('defaultParagraphSeparator', false, 'p'); } catch(e) {}
        
        // Debounced: Serialisierung (innerHTML + Regex) nicht bei jedem Tastendruck
        let _flowSaveTimer = null;
        editor.addEventListener('input', () => {
          if (_flowSaveTimer) clearTimeout(_flowSaveTimer);
          _flowSaveTimer = setTimeout(() => {
            _flowSaveTimer = null;
            let content = stripCueMarkers(editor.innerHTML);
            content = stripInlineRegie(content);
            state.textbuch[szeneId] = content;
            debouncedSaveProjektDaten();
          }, 400);
        });
        
        editor.addEventListener('focus', () => {
          setAktiveSzeneInFliesstext(szeneId);
        });
        
        editor.addEventListener('blur', () => {
          let content = stripCueMarkers(editor.innerHTML);
          content = stripInlineRegie(content);
          state.textbuch[szeneId] = content;
          saveProjektDaten();
        });
        
        // Paste: Bereinigung
        editor.addEventListener('paste', (e) => {
          // Einfache Text-Paste Bereinigung
        });
        
        // Enter-Handling + Leader-Key Format-Kürzel
        editor.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey && !e.metaKey) {
            e.preventDefault();
            const selection = window.getSelection();
            if (!selection.rangeCount) return;

            // Neuen Absatz einfügen
            const range = selection.getRangeAt(0);
            range.deleteContents();
            const newP = document.createElement('p');
            newP.classList.add('format-standard');
            newP.innerHTML = '<br>';
            range.insertNode(newP);

            // Cursor hinter neuen Absatz setzen
            const newRange = document.createRange();
            newRange.setStartAfter(newP);
            newRange.collapse(true);
            selection.removeAllRanges();
            selection.addRange(newRange);
          }
        });
      });
    }

    function execCommand(cmd, value = null) {
      // Undo speichern vor Änderung
      pushUndo();
      document.execCommand(cmd, false, value);
      saveCurrentText();
    }
    
    // NEU: Text mit Cue-Markern anreichern (nur für Anzeige)
    // Inline-Regieanweisungen: (Text in Klammern) in Dialogen erkennen
    function stripInlineRegie(html) {
      return html.replace(/<span class="inline-regie">([\s\S]*?)<\/span>/g, '$1');
    }
    
    // Cursor-Position als Text-Offset speichern
    function getTextOffset(root, node, offset) {
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
      let total = 0;
      while (walker.nextNode()) {
        if (walker.currentNode === node) return total + offset;
        total += walker.currentNode.textContent.length;
      }
      return total;
    }
    
    // Cursor anhand Text-Offset wiederherstellen
    function restoreTextOffset(root, targetOffset) {
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
      let total = 0;
      while (walker.nextNode()) {
        const len = walker.currentNode.textContent.length;
        if (total + len >= targetOffset) {
          try {
            const sel = window.getSelection();
            const range = document.createRange();
            range.setStart(walker.currentNode, Math.min(targetOffset - total, len));
            range.collapse(true);
            sel.removeAllRanges();
            sel.addRange(range);
          } catch(e) {}
          return;
        }
        total += len;
      }
    }
    
    // Live inline-regie im Editor anwenden (debounced)
    let _inlineRegieTimer = null;
    function applyInlineRegieToEditor() {
      const editor = document.getElementById('text-editor');
      if (!editor) return;

      // Nur anwenden wenn Dialog-Blöcke vorhanden
      if (!editor.querySelector('.format-dialog, .dialog-text')) return;

      // PERFORMANCE: Nur die betroffenen Dialog-Blöcke gezielt umschreiben.
      // Der frühere Voll-Ersatz von editor.innerHTML verursachte bei jeder
      // Tipp-Pause Reflow über die ganze Szene und Cursor-Sprünge.
      const sel = window.getSelection();
      const kandidaten = editor.querySelectorAll('.format-dialog, .dialog-text');
      const bearbeitet = new Set();

      kandidaten.forEach(el => {
        const block = (el.closest && el.closest('.format-dialog')) || el;
        if (bearbeitet.has(block) || !block.parentNode) return;
        bearbeitet.add(block);

        const oldHtml = block.outerHTML;
        const stripped = stripInlineRegie(oldHtml);
        const wrapped = wrapInlineRegie(stripped);
        if (wrapped === oldHtml) return; // Nichts zu tun in diesem Block

        // Cursor nur retten, wenn er in DIESEM Block steht
        let savedOffset = null;
        if (sel.rangeCount > 0 && block.contains(sel.anchorNode)) {
          savedOffset = getTextOffset(block, sel.anchorNode, sel.anchorOffset);
        }

        const temp = document.createElement('div');
        temp.innerHTML = wrapped;
        const neu = temp.firstElementChild;
        if (!neu) return;
        block.replaceWith(neu);

        if (savedOffset !== null) {
          restoreTextOffset(neu, savedOffset);
        }
      });
    }
    
    function scheduleInlineRegie() {
      clearTimeout(_inlineRegieTimer);
      _inlineRegieTimer = setTimeout(applyInlineRegieToEditor, 800);
    }
    
    function wrapInlineRegie(html) {
      if (!html || (!html.includes('dialog-text') && !html.includes('format-dialog'))) return html;
      const temp = document.createElement('div');
      temp.innerHTML = html;
      
      // Suche in .dialog-text UND direkt in .format-dialog (falls Text ausserhalb des Spans liegt)
      temp.querySelectorAll('.dialog-text, .format-dialog').forEach(el => {
        const isDialogContainer = el.classList.contains('format-dialog');
        
        // Erst bestehende Spans entfernen (unwrap)
        el.querySelectorAll('.inline-regie').forEach(span => {
          span.replaceWith(document.createTextNode(span.textContent));
        });
        
        // Text-Knoten durchgehen und (Klammertexte) wrappen
        const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
        const textNodes = [];
        while (walker.nextNode()) {
          const node = walker.currentNode;
          // Bei format-dialog Container: Nur Text ausserhalb von .figur-name und .dialog-text
          if (isDialogContainer) {
            const parent = node.parentElement;
            if (parent && (parent.classList.contains('figur-name') || parent.classList.contains('dialog-text'))) continue;
          }
          if (/\([^)]{2,}\)/.test(node.textContent)) {
            textNodes.push(node);
          }
        }
        
        textNodes.forEach(textNode => {
          const parts = textNode.textContent.split(/(\([^)]{2,}\))/g);
          if (parts.length <= 1) return;
          
          const fragment = document.createDocumentFragment();
          parts.forEach(part => {
            if (/^\([^)]{2,}\)$/.test(part)) {
              const span = document.createElement('span');
              span.className = 'inline-regie';
              span.textContent = part;
              fragment.appendChild(span);
            } else if (part) {
              fragment.appendChild(document.createTextNode(part));
            }
          });
          textNode.replaceWith(fragment);
        });
      });
      
      return temp.innerHTML;
    }

    function enrichTextWithCueMarkers(text, cues) {
      if (!cues || cues.length === 0) return text;
      
      let enrichedText = text;
      
      // Cues mit Ankertext sortieren nach Länge (längste zuerst, um Überlappungen zu vermeiden)
      const cuesWithAnker = cues
        .filter(c => c.ankerText)
        .sort((a, b) => b.ankerText.length - a.ankerText.length);
      
      cuesWithAnker.forEach(cue => {
        const anker = cue.ankerText;
        const marker = `<span class="cue-inline-marker ${CUE_TYPEN[cue.typ]?.class || 'cue-lx'}" contenteditable="false" data-cue-id="${cue.id}" onclick="editCue('${cue.id}')">${CUE_TYPEN[cue.typ]?.prefix || ''}${cue.nummer}</span>`;
        
        // Ankertext im Text finden und Marker dahinter einfügen
        // Nur das erste Vorkommen markieren
        const index = enrichedText.indexOf(anker);
        if (index !== -1) {
          const endIndex = index + anker.length;
          enrichedText = enrichedText.substring(0, endIndex) + marker + enrichedText.substring(endIndex);
        }
      });
      
      return enrichedText;
    }

    // Debounced-Variante für den input-Handler: verhindert, dass bei jedem
    // Tastendruck der komplette Editor serialisiert wird (Tipp-Latenz!)
    let _saveCurrentTextTimer = null;
    function debouncedSaveCurrentText() {
      if (_saveCurrentTextTimer) clearTimeout(_saveCurrentTextTimer);
      _saveCurrentTextTimer = setTimeout(() => {
        _saveCurrentTextTimer = null;
        saveCurrentText();
      }, 400);
    }

    function saveCurrentText(immediate = false) {
      // Anstehenden debounced Save verwerfen – wir speichern jetzt ohnehin frisch
      if (_saveCurrentTextTimer) { clearTimeout(_saveCurrentTextTimer); _saveCurrentTextTimer = null; }
      // Fliesstext-Modus: Alle Editoren speichern
      if (state.textbuchModus === 'fliesstext') {
        const editors = document.querySelectorAll('.fliesstext-editor[data-szene-id]');
        if (editors.length > 0) {
          editors.forEach(editor => {
            const szeneId = editor.dataset.szeneId;
            if (szeneId) {
              let content = stripCueMarkers(editor.innerHTML);
              content = stripInlineRegie(content);
              state.textbuch[szeneId] = content;
            }
          });
          if (immediate) {
            saveProjektDaten();
          } else {
            debouncedSaveProjektDaten();
          }
          return;
        }
      }
      
      // Szenen-Modus: Einzelnen Editor speichern
      const editor = document.getElementById('text-editor');
      if (editor && state.aktiveSzene) {
        // Cue-Marker und inline-regie Spans entfernen vor dem Speichern
        let content = stripCueMarkers(editor.innerHTML);
        content = stripInlineRegie(content);
        state.textbuch[state.aktiveSzene] = content;
        // State ist jetzt aktuell — localStorage verzögert (Performance)
        if (immediate) {
          saveProjektDaten(); // Sofort (z.B. vor Export/Szenenwechsel)
        } else {
          debouncedSaveProjektDaten(); // Verzögert (normales Tippen)
        }
      }
    }
    
    // NEU: Prüft ob Cue-Anker noch im Text existieren
    function checkCueAnkers(szeneId) {
      const textContent = state.textbuch[szeneId] || '';
      // HTML-Tags entfernen für die Suche
      const plainText = textContent.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ');
      
      const cuesInSzene = state.cues.filter(c => c.szeneId === szeneId && c.ankerText);
      const orphanedCues = [];
      
      cuesInSzene.forEach(cue => {
        // Ankertext normalisieren (Whitespace vereinheitlichen)
        const ankerNormalized = cue.ankerText.replace(/\s+/g, ' ').trim();
        if (!plainText.includes(ankerNormalized)) {
          orphanedCues.push(cue);
        }
      });
      
      return orphanedCues;
    }
    
    // NEU: Warnung anzeigen wenn Anker fehlen
    function showOrphanedCuesWarning(orphanedCues) {
      if (orphanedCues.length === 0) return;
      
      const cueList = orphanedCues.map(c => 
        `• ${CUE_TYPEN[c.typ]?.prefix || ''}${c.nummer}: "${c.ankerText.substring(0, 50)}${c.ankerText.length > 50 ? '...' : ''}"`
      ).join('\n');
      
      const action = confirm(
        `⚠️ Folgende Cues haben ihren Ankertext verloren:\n\n${cueList}\n\n` +
        `Der Text, an dem diese Cues positioniert waren, wurde geändert oder gelöscht.\n\n` +
        `Klicke OK, um die Cues zu bearbeiten und neu zu positionieren.\n` +
        `Klicke Abbrechen, um später zu entscheiden.`
      );
      
      if (action && orphanedCues.length > 0) {
        // Ersten verwaisten Cue öffnen
        editCue(orphanedCues[0].id);
      }
    }
    
    // NEU: Beim Szene-Wechsel prüfen
    function selectSzeneWithCheck(szeneId) {
      // Erst alte Szene prüfen
      if (state.aktiveSzene) {
        const orphaned = checkCueAnkers(state.aktiveSzene);
        if (orphaned.length > 0) {
          showOrphanedCuesWarning(orphaned);
        }
      }
      
      // Dann wechseln
      selectSzene(szeneId);
    }
    
    // NEU: Aktuelle Szene prüfen (vom Button)
    function checkCurrentSzeneAnkers() {
      if (!state.aktiveSzene) {
        alert('Keine Szene ausgewählt.');
        return;
      }
      
      const orphaned = checkCueAnkers(state.aktiveSzene);
      
      if (orphaned.length === 0) {
        const cuesWithAnker = state.cues.filter(c => c.szeneId === state.aktiveSzene && c.ankerText).length;
        if (cuesWithAnker === 0) {
          alert('✅ Keine Cues mit Ankertexten in dieser Szene.\n\nTipp: Markiere Text und klicke 💡🔊📺 um Cues mit Textposition zu erstellen.');
        } else {
          alert(`✅ Alle ${cuesWithAnker} Cue-Anker in dieser Szene sind gültig!`);
        }
      } else {
        showOrphanedCuesWarning(orphaned);
      }
    }

    // ============================================
    // RENDER MAIN
    // ============================================
    // ============================================
    // KI-ASSISTENT FUNKTIONEN (v1.7)
    // ============================================
    
    // API-Key aus localStorage oder IndexedDB holen
    let _cachedApiKey = null;
    
    function getApiKey() {
      if (_cachedApiKey) return _cachedApiKey;
      const key = localStorage.getItem('nina_rebu_api_key') || '';
      if (key) _cachedApiKey = key;
      return key;
    }
    
    function saveApiKey(key) {
      _cachedApiKey = key;
      localStorage.setItem('nina_rebu_api_key', key);
      // Zusätzlich in IndexedDB für bessere Persistenz bei file://
      try {
        const req = indexedDB.open('regiebuch_settings', 1);
        req.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('settings')) {
            db.createObjectStore('settings');
          }
        };
        req.onsuccess = (e) => {
          const db = e.target.result;
          const tx = db.transaction('settings', 'readwrite');
          tx.objectStore('settings').put(key, 'api_key');
        };
      } catch(e) { /* IndexedDB nicht verfügbar */ }
    }
    
    // Beim Start: Key aus IndexedDB wiederherstellen falls localStorage leer
    function restoreApiKey() {
      if (getApiKey()) return; // bereits vorhanden
      try {
        const req = indexedDB.open('regiebuch_settings', 1);
        req.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('settings')) {
            db.createObjectStore('settings');
          }
        };
        req.onsuccess = (e) => {
          const db = e.target.result;
          const tx = db.transaction('settings', 'readonly');
          const getReq = tx.objectStore('settings').get('api_key');
          getReq.onsuccess = () => {
            if (getReq.result) {
              _cachedApiKey = getReq.result;
              localStorage.setItem('nina_rebu_api_key', getReq.result);
              render(); // UI aktualisieren
            }
          };
        };
      } catch(e) { /* IndexedDB nicht verfügbar */ }
    }

    // API-Key testen
    async function testApiKey() {
      const apiKey = getApiKey();
      if (!apiKey || !apiKey.trim()) {
        apiKeyError = 'Bitte zuerst einen Key eingeben';
        apiKeyStatus = 'error';
        render();
        return;
      }
      
      apiKeyStatus = 'testing';
      apiKeyError = '';
      render();
      
      try {
        const response = await rebuFetchWithTimeout('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: CLAUDE_MODEL,
            max_tokens: 10,
            messages: [{ role: 'user', content: 'Antworte nur mit: OK' }]
          })
        }, 30000);

        if (response.ok) {
          apiKeyStatus = 'success';
        } else {
          const err = await response.json();
          apiKeyStatus = 'error';
          const errMsg = err.error?.message || '';
          if (response.status === 401) {
            apiKeyError = 'Ungültiger API-Key';
          } else if (response.status === 403) {
            apiKeyError = 'Keine Berechtigung (Key gesperrt?)';
          } else if (response.status === 404 || /model/i.test(errMsg)) {
            apiKeyError = 'Modell «' + CLAUDE_MODEL + '» nicht gefunden. Bitte in den KI-Einstellungen ein gültiges Modell wählen.';
          } else if (errMsg) {
            apiKeyError = errMsg;
          } else {
            apiKeyError = `Fehler ${response.status}`;
          }
        }
      } catch (err) {
        apiKeyStatus = 'error';
        // Zeitüberschreitung von rebuFetchWithTimeout verständlich weitergeben,
        // sonst generischer Netzwerkfehler.
        apiKeyError = (err && /Zeitüberschreitung/.test(err.message || ''))
          ? err.message
          : 'Netzwerkfehler – bitte Verbindung prüfen';
      }
      
      render();
    }

    // v2.0: Warnung beim Schließen (nur für lokale Projekte)
    // ============================================
    // MEHR-TAB-SCHUTZ
    // Verhindert das stille gegenseitige Überschreiben, wenn dasselbe Projekt
    // in zwei Browser-Tabs offen ist. Jeder Tab hat eine eigene Kennung; wer
    // speichert, hinterlegt sie. Ein anderer Tab bemerkt das und warnt, statt
    // seinen älteren Stand kommentarlos darüberzuschreiben.
    // ============================================
    var REBU_TAB_ID = 'tab-' + Math.random().toString(36).slice(2) + '-' + Date.now();
    var REBU_SAVE_OWNER_KEY = STORAGE_PREFIX + 'save_owner';

    function showTabConflictBanner() {
      if (document.getElementById('rebu-tab-conflict')) return;
      var bar = document.createElement('div');
      bar.id = 'rebu-tab-conflict';
      bar.style.cssText = 'position:fixed;left:0;right:0;bottom:0;z-index:99999;background:#b45309;color:#fff;' +
        'font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px;padding:10px 16px;' +
        'display:flex;align-items:center;gap:12px;box-shadow:0 -2px 8px rgba(0,0,0,0.2);';
      var txt = document.createElement('span');
      txt.style.flex = '1';
      txt.textContent = '⚠️ Dieses Projekt wurde in einem anderen Tab gespeichert. Wenn du hier weiterarbeitest und speicherst, überschreibst du den neueren Stand.';
      var reload = document.createElement('button');
      reload.textContent = 'Neu laden';
      reload.style.cssText = 'background:#fff;color:#b45309;border:none;border-radius:4px;padding:6px 12px;font-weight:600;cursor:pointer;';
      reload.onclick = function () { location.reload(); };
      var dismiss = document.createElement('button');
      dismiss.textContent = 'Trotzdem weiter';
      dismiss.style.cssText = 'background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.6);border-radius:4px;padding:6px 12px;cursor:pointer;';
      dismiss.onclick = function () { bar.remove(); };
      bar.appendChild(txt);
      bar.appendChild(reload);
      bar.appendChild(dismiss);
      document.body.appendChild(bar);
    }

    window.addEventListener('storage', function (e) {
      if (!e.key || e.key !== REBU_SAVE_OWNER_KEY || !e.newValue) return;
      try {
        var info = JSON.parse(e.newValue);
        if (info && info.tab && info.tab !== REBU_TAB_ID && info.projekt === state.projektId) {
          state._externalSaveDetected = true;

    });

        return message;
      }
    });

    // Kontext für KI zusammenstellen
    function buildKiContext() {
      let context = `Du bist ein erfahrener Dramaturg und Theaterassistent. Du hilfst beim Erstellen eines Regiebuchs.
WICHTIG: Schreibe immer in Schweizer Rechtschreibung – verwende "ss" statt "ß" (z.B. "gross" statt "groß", "heissen" statt "heißen", "Strasse" statt "Straße").

PROJEKT: "${state.projektMeta?.titel || 'Unbenannt'}"
${state.projektMeta?.untertitel ? `Untertitel: ${state.projektMeta.untertitel}` : ''}
${state.projektMeta?.autor ? `Autor: ${state.projektMeta.autor}` : ''}
${state.projektMeta?.logline ? `Logline: ${state.projektMeta.logline}` : ''}

`;
      
      // Figuren
      if (state.figuren.length > 0) {
        context += `FIGUREN (${state.figuren.length}):\n`;
        state.figuren.forEach(f => {
          context += `- ${f.name}${f.kuerzel ? ` (${f.kuerzel})` : ''}: ${f.beschreibung || 'Keine Beschreibung'}`;
          if (f.want) context += ` | Will: ${f.want}`;
          if (f.need) context += ` | Braucht: ${f.need}`;
          context += '\n';
        });
        context += '\n';
      }
      
      // Aktuelle Szene
      if (state.aktiveSzene) {
        const szene = state.szenen.find(s => s.id === state.aktiveSzene);
        if (szene) {
          context += `AKTUELLE SZENE: ${szene.nummer} "${szene.titel}"
Ort: ${szene.ort || '-'} | Zeit: ${szene.zeit || '-'}
${szene.zusammenfassung ? `Zusammenfassung: ${szene.zusammenfassung}` : ''}
`;
          
          // Figuren der Szene
          const figurenNamen = szene.figuren?.map(fId => {
            const f = state.figuren.find(fig => fig.id === fId);
            return f?.name;
          }).filter(Boolean).join(', ');
          if (figurenNamen) context += `Figuren in Szene: ${figurenNamen}\n`;
          
          // Text der Szene (vollständig)
          const szenenText = state.textbuch[state.aktiveSzene];
          if (szenenText) {
            // HTML zu Text konvertieren
            const tmp = document.createElement('div');
            tmp.innerHTML = szenenText;
            let plainText = tmp.textContent || tmp.innerText || '';
            context += `\nSZENEN-TEXT:\n${plainText}\n`;
          }
        }
      }
      
      // Alle Szenen MIT DIALOGTEXT für dramaturgische Analyse
      if (state.szenen.length > 0) {
        // Hilfsfunktion: HTML → lesbarer Text
        const htmlToText = (html) => {
          if (!html) return '';
          return html
            .replace(/<[^>]*class="[^"]*figur[^"]*"[^>]*>(.*?)<\/[^>]+>/gi, '\n$1: ')
            .replace(/<[^>]*class="[^"]*figur-name[^"]*"[^>]*>(.*?)<\/[^>]+>/gi, '\n$1: ')
            .replace(/<[^>]*class="[^"]*regie[^"]*"[^>]*>(.*?)<\/[^>]+>/gi, '($1) ')
            .replace(/<\/?(p|div|br)[^>]*>/gi, '\n')
            .replace(/<[^>]+>/g, '')
            .replace(/&nbsp;/g, ' ').replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>')
            .replace(/\n{3,}/g, '\n\n')
            .trim();
        };

        // Gesamtlänge berechnen für Smart-Kürzung
        let totalTextLength = 0;
        state.szenen.forEach(s => {
          const txt = state.textbuch[s.id];
          if (txt) totalTextLength += txt.length;
        });
        const maxPerScene = totalTextLength > 80000 ? 1500 : 0; // 0 = unbegrenzt

        context += `\nALLE SZENEN MIT DIALOGEN – DRAMATURGISCHER ÜBERBLICK (${state.szenen.length}):\n`;
        if (maxPerScene > 0) context += `(Hinweis: Dialoge pro Szene auf ${maxPerScene} Zeichen gekürzt — Stück ist sehr lang)\n`;
        context += '\n';

        state.szenen.forEach((s, idx) => {
          const figurenNamen = s.figuren?.map(fId => {
            const f = state.figuren.find(fig => fig.id === fId);
            return f ? (f.kuerzel || f.name) : '';
          }).filter(Boolean).join(', ');
          const isAktiv = s.id === state.aktiveSzene;
          context += `${isAktiv ? '→ ' : ''}${s.nummer} "${s.titel}"${s.ort ? ` @ ${s.ort}` : ''}`;
          if (figurenNamen) context += ` | Figuren: ${figurenNamen}`;
          if (s.zusammenfassung) {
            context += `\n  Zusammenfassung: ${s.zusammenfassung}`;
          }
          if (s.bemerkungen) {
            context += `\n  Regie-Bemerkungen: ${s.bemerkungen}`;
          }
          // Dialogtext der Szene
          const szenenHtml = state.textbuch[s.id];
          if (szenenHtml) {
            let dialogText = htmlToText(szenenHtml);
            if (maxPerScene > 0 && dialogText.length > maxPerScene) {
              dialogText = dialogText.slice(0, maxPerScene) + '\n[... gekürzt, ' + dialogText.length + ' Zeichen insgesamt]';
            }
            if (dialogText) {
              context += `\n  --- SZENENTEXT ---\n${dialogText}\n  --- ENDE ---`;
            }
          }
          context += '\n\n';
        });
      }
      
      return context;
    }
    
    // Nachricht an KI senden
    async function sendKiMessage(userMessage) {
      if (!userMessage?.trim()) return;
      
      const apiKey = getApiKey();
      if (!apiKey) {
        alert('Bitte zuerst einen API-Key hinterlegen (Menü → KI-Einstellungen…).');
        return;
      }
      
      // User-Nachricht hinzufügen
      state.kiMessages.push({ role: 'user', content: userMessage.trim() });
      state.kiInput = '';
      state.kiLoading = true;
      state._kiScrollToBottom = true;
      render();
      
      try {
        // Kontext aufbauen
        const systemPrompt = buildKiContext() + `

WICHTIGE REGELN:
- Antworte auf Deutsch
- Sei hilfreich, präzise und kreativ
- Bei Szenen-Analysen: Gehe auf dramaturgische Aspekte ein (Ziel, Konflikt, Wendepunkte)
- Bei Dialog-Verbesserungen: Biete konkrete Alternativen an
- Formatiere mit **fett** für wichtige Begriffe
- Halte Antworten kompakt (max. 300 Wörter), ausser bei kreativen Aufgaben`;
        
        // Nachrichten für API vorbereiten (ohne lokale Begrüssung)
        const apiMessages = state.kiMessages
          .filter(m => !m.isLocal)
          .map(m => ({ role: m.role, content: m.content }));
        
        // API-Aufruf
        const response = await rebuFetchWithTimeout('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: CLAUDE_MODEL,
            max_tokens: 2000,
            system: systemPrompt,
            messages: apiMessages
          })
        }, 90000);

        if (!response.ok) {
          const errText = await response.text();
          let errMsg = 'API-Fehler';
          try {
            const errJson = JSON.parse(errText);
            errMsg = errJson.error?.message || errMsg;
            if (errMsg.includes('invalid x-api-key') || errMsg.includes('invalid_api_key')) {
              errMsg = 'Ungültiger API-Key. Bitte überprüfe den Key unter Menü → KI-Einstellungen…';
            } else if (errMsg.includes('rate_limit')) {
              errMsg = 'Zu viele Anfragen. Bitte warte kurz und versuche es erneut.';
            } else if (errMsg.includes('credit') || errMsg.includes('billing')) {
              errMsg = 'Kein API-Guthaben mehr. Bitte prüfe dein Anthropic-Konto.';
            }
          } catch (e) {
            errMsg = errText.substring(0, 200);
          }
          throw new Error(errMsg);
        }
        
        const result = await response.json();

        // Antwort extrahieren
        let fullText = '';
        for (const block of (result.content || [])) {
          if (block.type === 'text') {
            fullText += block.text;
          }
        }
        // Bei abgeschnittener Antwort (Token-Limit) einen deutlichen Hinweis anhaengen.
        if (result.stop_reason === 'max_tokens') {
          fullText += '\n\n— [Hinweis: Die Antwort wurde wegen des Token-Limits abgeschnitten.]';
        }

        // Antwort hinzufügen
        state.kiMessages.push({ role: 'assistant', content: fullText.trim() });
        
      } catch (err) {
        console.error('KI-Fehler:', err);
        state.kiMessages.push({ 
          role: 'assistant', 
          content: `❌ Fehler: ${err.message}\n\n💡 Bitte prüfe deinen API-Key unter Menü → KI-Einstellungen…`
        });
      } finally {
        state.kiLoading = false;
        state._kiScrollToBottom = true;
        render();
      }
    }

        ${renderKiPanel()}
      `;
      
      // KI-Panel Scroll-Position wiederherstellen (#5)
      const kiMsgsNew = document.getElementById('ki-messages');
      if (kiMsgsNew) {
        if (state._kiScrollToBottom) {
          kiMsgsNew.scrollTop = kiMsgsNew.scrollHeight;
          state._kiScrollToBottom = false;
        } else if (kiScrollTop) {
          kiMsgsNew.scrollTop = kiScrollTop;
        }
        state._kiScrollTop = kiMsgsNew.scrollTop;
      }
      
      // Event-Listener für Editor
      const editor = document.getElementById('text-editor');
      if (editor) {
        // Standard-Absatztrenner auf <p> setzen (statt <div>)
        try { document.execCommand('defaultParagraphSeparator', false, 'p'); } catch(e) {}
        
        // Initialzustand für Undo sichern
        initUndoForScene();
        
        editor.addEventListener('input', () => {
          // PERFORMANCE: saveCurrentText serialisiert den GANZEN Editor (innerHTML
          // + 2 Regex-Durchläufe). Das darf nicht bei jedem Tastendruck laufen –
          // sonst wird das Tippen in langen Szenen zäh. Darum debounced.
          debouncedSaveCurrentText();
          debouncedPushUndo(); // Undo-Snapshot nach Tipp-Pause
          scheduleInlineRegie(); // Inline-Regie nach Tipp-Pause formatieren
        });
        editor.addEventListener('blur', () => { saveCurrentText(true); applyInlineRegieToEditor(); });
        
        // Browser-Undo für diesen Editor deaktivieren (wir verwenden eigenes)
        editor.addEventListener('beforeinput', (e) => {
          if (e.inputType === 'historyUndo' || e.inputType === 'historyRedo') {
            e.preventDefault();
            if (e.inputType === 'historyUndo') undo();
            else redo();
          }
        });
        
        // Paste: Undo-Snapshot + optionale Bereinigung
        editor.addEventListener('paste', (e) => {
          pushUndoImmediate();
        });
        
        // Enter-Handling: saubere Absätze erzeugen
        editor.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey && !e.metaKey) {
            e.preventDefault();
            
            const selection = window.getSelection();
            if (!selection.rangeCount) return;
            
            pushUndo();
            
            // Aktuellen Absatz und seine Klasse finden
            let currentBlock = selection.anchorNode;
            while (currentBlock && currentBlock !== editor) {
              if (currentBlock.nodeType === 1 && (currentBlock.tagName === 'P' || currentBlock.tagName === 'DIV')) break;
              currentBlock = currentBlock.parentNode;
            }
            
            const currentClass = currentBlock?.className || '';
            const isDialog = currentClass.includes('format-dialog');
            
            // Range: alles ab Cursor bis Ende des Absatzes
            const range = selection.getRangeAt(0);
            const afterRange = document.createRange();
            afterRange.setStart(range.endContainer, range.endOffset);
            if (currentBlock && currentBlock !== editor) {
              afterRange.setEndAfter(currentBlock.lastChild || currentBlock);
            } else {
              afterRange.setEnd(range.endContainer, range.endOffset);
            }
            
            // Inhalt nach Cursor extrahieren
            const afterContent = afterRange.extractContents();
            const afterText = afterContent.textContent.trim();
            
            // Neues Element erstellen
            const newEl = document.createElement('p');
            
            if (isDialog && afterText) {
              // Dialog-Absatz: neuer Absatz wird Standard (Fliesstext weiter)
              newEl.className = 'format-dialog';
              // Gleiche Figur beibehalten
              const figurSpan = currentBlock.querySelector('.figur-name');
              const figurName = figurSpan ? figurSpan.textContent : '';
              newEl.innerHTML = `<span class="figur-name">${escapeHtml(figurName)}</span><span class="dialog-text">${escapeHtml(afterText)}</span>`;
            } else if (afterText) {
              // Gleiche Klasse beibehalten
              newEl.className = currentClass.replace('format-dialog', '').trim() || 'format-standard';
              newEl.appendChild(afterContent);
            } else {
              // Leerer neuer Absatz: Standard-Format
              newEl.className = 'format-standard';
              newEl.innerHTML = '<br>';
            }
            
            // Neues Element nach aktuellem einfügen
            if (currentBlock && currentBlock !== editor && currentBlock.parentNode) {
              currentBlock.parentNode.insertBefore(newEl, currentBlock.nextSibling);
            } else {
              editor.appendChild(newEl);
            }
            
            // Cursor an Anfang des neuen Elements setzen
            const newRange = document.createRange();
            if (newEl.querySelector('.dialog-text')) {
              newRange.setStart(newEl.querySelector('.dialog-text'), 0);
            } else if (newEl.firstChild) {
              newRange.setStart(newEl.firstChild, 0);
            } else {
              newRange.setStart(newEl, 0);
            }
            newRange.collapse(true);
            selection.removeAllRanges();
            selection.addRange(newRange);
            
            saveCurrentText();
            return;
          }
          
          if (e.ctrlKey || e.metaKey) {
            // Undo/Redo
            if (e.key === 'z' && !e.shiftKey) {
              e.preventDefault();
              undo();
            } else if ((e.key === 'z' && e.shiftKey) || e.key === 'y') {
              e.preventDefault();
              redo();
            }

            // Suchen & Ersetzen (Ctrl+H oder Ctrl+F)
            if (e.key === 'h' || e.key === 'f') {
              e.preventDefault();
              toggleSearchReplace();
            }
          }
        });
      }
      
      updateUndoButtons();
      
      // Initialer Undo-Snapshot setzen
      const editorInit = document.getElementById('text-editor');
      if (editorInit && state.aktiveSzene) {
        lastUndoContent = stripCueMarkers(editorInit.innerHTML);
        if (state.undoStack.length === 0) {
          pushUndo();
        }
      }
      
      // Bottom-Player wiederherstellen wenn etwas spielt
      if (state.currentlyPlaying && state.currentView === 'textbuch') {
        requestAnimationFrame(() => updateBottomPlayer());
      }
      
      // FLIESSTEXT-MODUS: Editoren initialisieren
      if (state.textbuchModus === 'fliesstext' && state.currentView === 'textbuch') {
        requestAnimationFrame(() => initFliesstextEditors());
      }
      
      // Post-render: idb:-Titelbilder asynchron laden
      requestAnimationFrame(() => {
        document.querySelectorAll('img[data-idb-src]').forEach(async (img) => {
          const ref = img.getAttribute('data-idb-src');
          if (ref) {
            const url = await resolveTitelbild(ref);
            if (url) img.src = url;
          }
        });
        // Aktive Szene in der Sidebar sichtbar halten
        const activeSzene = document.querySelector('.szene-item.active');
        if (activeSzene) {
          activeSzene.scrollIntoView({ behavior: 'auto', block: 'center' });
        }
      });
    }

    function setUebersichtTab(t) { state.uebersichtTab = t; render(); }

    function figChip(f, cls) {

    }

    function renderUebersichtenView() {
      const tab = state.uebersichtTab || 'matrix';
      const tabs = [
        { id: 'matrix', label: '📊 Figuren-Szenen-Matrix' },
        { id: 'auftritte', label: '🚪 Auftritte & Abgänge' },
        { id: 'bloecke', label: '🧩 Probenblöcke' },

      if (tab === 'auftritte') inner = renderAuftrittsListe();
      else if (tab === 'bloecke') inner = renderProbenbloecke();
      else if (tab === 'striche') inner = renderStrichverwaltung();
      else inner = renderFigurenSzenenMatrix();
      return `
        <div class="flex-1 overflow-y-auto bg-gray-50">
          <div class="max-w-6xl mx-auto p-6">
            <h2 class="text-xl font-bold mb-1">Regie-Übersichten</h2>
            <p class="text-sm text-gray-500 mb-4">Auswertungen aus deinem Stück – Bühnenpräsenz, Auftritte und Striche.</p>
            <div class="flex gap-1 border-b border-gray-200 mb-5">
              ${tabs.map(t => `
                <button onclick="setUebersichtTab('${t.id}')"
                  class="px-4 py-2 text-sm font-medium border-b-2 -mb-px ${tab === t.id ? 'border-blue-600 text-blue-700' : 'border-transparent text-gray-500 hover:text-gray-700'}">
                  ${t.label}
                </button>`).join('')}
            </div>
            ${inner}
          </div>
        </div>`;
    }

    // --- Figuren-Szenen-Matrix ---
    function renderFigurenSzenenMatrix() {
      const szenen = state.szenen || [];
      const figuren = state.figuren || [];
      if (szenen.length === 0 || figuren.length === 0) {
        return uebersichtEmpty('Für die Matrix brauchst du mindestens eine Figur und eine Szene.');
      }
      const drin = (s, f) => (s.figuren || []).includes(f.id);

      const kopf = szenen.map(s =>
        `<th class="px-1 py-2 text-xs font-semibold text-gray-600 whitespace-nowrap" title="${escapeHtml(s.titel || '')}">${escapeHtml(s.nummer || '·')}</th>`
      ).join('');

      const zeilen = figuren.map(f => {
        const zellen = szenen.map(s =>
          `<td class="text-center px-2 py-1 border border-gray-100 ${drin(s, f) ? 'bg-blue-600 text-white font-bold' : 'text-gray-200'}">${drin(s, f) ? '●' : '·'}</td>`
        ).join('');
        const anzahl = szenen.filter(s => drin(s, f)).length;
        return `<tr>
          <th class="sticky left-0 z-10 bg-white px-2 py-1 text-left text-sm whitespace-nowrap border border-gray-100">
            <span class="font-semibold">${escapeHtml(f.kuerzel || '')}</span> <span class="text-gray-400 font-normal">${escapeHtml(f.name || '')}</span>
          </th>
          ${zellen}
          <td class="text-center px-2 text-xs text-gray-500 font-semibold">${anzahl}</td>
        </tr>`;
      }).join('');

      const fuss = szenen.map(s =>
        `<td class="text-center px-1 text-xs text-gray-500 font-medium">${(s.figuren || []).length}</td>`
      ).join('');

      // Doppelbesetzung: Figurenpaare ohne gemeinsame Szene
      const aktive = figuren.filter(f => szenen.some(s => drin(s, f)));
      const paare = [];
      for (let i = 0; i < aktive.length; i++) {
        for (let j = i + 1; j < aktive.length; j++) {
          const a = aktive[i], b = aktive[j];
          const gemeinsam = szenen.some(s => drin(s, a) && drin(s, b));
          if (!gemeinsam) paare.push([a, b]);
        }
      }
      const paareHtml = paare.slice(0, 40).map(([a, b]) =>
        `<span class="inline-flex items-center gap-1 bg-emerald-50 text-emerald-800 rounded px-2 py-0.5 text-xs mr-2 mb-2">
           ${escapeHtml(a.kuerzel || a.name || '?')} <span class="text-emerald-400">⟷</span> ${escapeHtml(b.kuerzel || b.name || '?')}
         </span>`
      ).join('');

      return `
        <div class="card p-4 overflow-x-auto">
          <table class="border-collapse text-sm">
            <thead>
              <tr>
                <th class="sticky left-0 z-10 bg-white px-2 py-2 text-left text-xs text-gray-400">Figur \\ Szene</th>
                ${kopf}
                <th class="px-2 text-xs text-gray-400">Σ</th>
              </tr>
            </thead>
            <tbody>${zeilen}</tbody>
            <tfoot>
              <tr>
                <th class="sticky left-0 z-10 bg-white px-2 py-1 text-left text-xs text-gray-400">Figuren je Szene</th>
                ${fuss}
                <td></td>
              </tr>
            </tfoot>
          </table>
          <p class="text-xs text-gray-400 mt-3">● = Figur ist in der Szene. Rechte Spalte: Szenen je Figur. Fusszeile: Figuren je Szene.</p>
        </div>
        <div class="card p-4 mt-4">
          <h3 class="text-sm font-semibold mb-2">Mögliche Doppelbesetzungen</h3>
          ${paare.length === 0
            ? '<p class="text-xs text-gray-400">Keine zwei Figuren sind durchgehend getrennt – jede teilt sich mit jeder mindestens eine Szene.</p>'
            : `<p class="text-xs text-gray-500 mb-3">Diese Figurenpaare stehen nie gleichzeitig auf der Bühne und könnten von derselben Person gespielt werden${paare.length > 40 ? ' (erste 40 von ' + paare.length + ')' : ''}:</p>${paareHtml}`}
        </div>`;
    }

    // --- Auftritts-/Abgangsliste ---
    function renderAuftrittsListe() {
      const szenen = state.szenen || [];
      if (szenen.length === 0) {
        return uebersichtEmpty('Noch keine Szenen vorhanden.');
      }
      const figById = id => state.figuren.find(f => f.id === id);
      const present = szenen.map(s => (s.figuren || []).map(figById).filter(Boolean));

      const bloecke = szenen.map((s, i) => {
        const jetzt = present[i];
        const vorher = i > 0 ? present[i - 1] : [];
        const nachher = i < szenen.length - 1 ? present[i + 1] : [];
        const idSet = arr => new Set(arr.map(f => f.id));
        const vorherIds = idSet(vorher), nachherIds = idSet(nachher);
        const auftritt = jetzt.filter(f => !vorherIds.has(f.id));
        const abgang = jetzt.filter(f => !nachherIds.has(f.id));

        const reihe = (label, arr, cls) => arr.length === 0 ? '' : `
          <div class="flex items-start gap-2 mb-1">
            <span class="text-xs text-gray-400 w-20 flex-shrink-0 pt-0.5">${label}</span>
            <span class="flex-1">${arr.map(f => figChip(f, cls)).join(' ')}</span>
          </div>`;

        return `
          <div class="card p-4 mb-3">
            <h3 class="text-sm font-semibold mb-2">${escapeHtml(s.nummer || '')} ${escapeHtml(s.titel || '')}
              ${(s.ort || s.zeit) ? `<span class="text-gray-400 font-normal">· ${escapeHtml([s.ort, s.zeit].filter(Boolean).join(' / '))}</span>` : ''}
            </h3>
            ${jetzt.length === 0 ? '<p class="text-xs text-gray-400">Keine Figuren zugeordnet.</p>' : `
              ${reihe('Auf der Bühne', jetzt, 'bg-gray-100 text-gray-700')}
              ${reihe('Auftritt', auftritt, 'bg-emerald-100 text-emerald-800')}
              ${reihe('Abgang', abgang, 'bg-amber-100 text-amber-800')}
            `}
          </div>`;
      }).join('');

      return `
        <div>
          <p class="text-xs text-gray-400 mb-3">Abgeleitet aus der Figuren-Zuordnung je Szene: «Auftritt» = neu gegenüber der vorherigen Szene, «Abgang» = nicht mehr in der nächsten Szene. Feinheiten innerhalb einer Szene stehen im Textbuch.</p>
          ${bloecke}
        </div>`;
    }

    // --- Strichverwaltung ---
    function getStricheInSzene(szeneId) {
      const tmp = document.createElement('div');
      tmp.innerHTML = state.textbuch[szeneId] || '';
      const out = [];
      tmp.querySelectorAll('.format-gestrichen').forEach((n, i) => out.push({ index: i, text: n.textContent || '' }));
      return out;
    }

    function strichAufheben(szeneId, index) {
      const tmp = document.createElement('div');
      tmp.innerHTML = state.textbuch[szeneId] || '';
      const nodes = tmp.querySelectorAll('.format-gestrichen');
      if (index < 0 || index >= nodes.length) return;
      nodes[index].replaceWith(document.createTextNode(nodes[index].textContent || ''));
      state.textbuch[szeneId] = tmp.innerHTML;
      saveProjektDaten();
      render();
    }

    function alleStricheAufheben(szeneId) {
      if (!confirm('Alle Striche dieser Szene aufheben? Der gestrichene Text wird wieder normal gespielt.')) return;
      const tmp = document.createElement('div');
      tmp.innerHTML = state.textbuch[szeneId] || '';
      tmp.querySelectorAll('.format-gestrichen').forEach(n => n.replaceWith(document.createTextNode(n.textContent || '')));
      state.textbuch[szeneId] = tmp.innerHTML;
      saveProjektDaten();
      render();
    }

    // --- Probenblöcke (Szenen mit exakt gleicher Besetzung) ---
    // Gruppiert nach Schauspieler:innen, sobald die Besetzung im Ensemble
    // eingetragen ist (Doppelbesetzung wird so korrekt zusammengefasst); solange
    // keine Besetzung vorliegt, ersatzweise nach Rollen. Dieselbe Berechnung
    // speist die Ansicht und den NINA-Export an Propla.
    function computeSzenenbloecke() {
      const szenen = state.szenen || [];
      const rolleZuPerson = {};
      (state.ensemble || []).forEach(p => {
        (p.rolleIds || []).forEach(fId => {
          if (!rolleZuPerson[fId]) rolleZuPerson[fId] = [];
          rolleZuPerson[fId].push(p.id);
        });
      });
      const hatCasting = Object.keys(rolleZuPerson).length > 0;

      const gruppen = new Map();
      szenen.forEach(s => {
        const figIds = (s.figuren || []).slice();
        const tokens = new Set();
        const personIds = new Set();
        figIds.forEach(fId => {
          const persons = rolleZuPerson[fId];
          if (persons && persons.length) {
            persons.forEach(pid => { tokens.add('p:' + pid); personIds.add(pid); });
          } else {
            tokens.add('r:' + fId);
          }
        });
        const key = Array.from(tokens).sort().join('|');
        if (!gruppen.has(key)) gruppen.set(key, { key, figIds: new Set(), personIds: new Set(), scenes: [] });
        const g = gruppen.get(key);
        figIds.forEach(id => g.figIds.add(id));
        personIds.forEach(id => g.personIds.add(id));
        g.scenes.push(s);
      });

      const bloecke = Array.from(gruppen.values()).map(g => ({
        figIds: Array.from(g.figIds),
        personIds: Array.from(g.personIds),
        scenes: g.scenes,
        hatCasting
      }));
      bloecke.sort((a, b) => b.scenes.length - a.scenes.length);
      return bloecke;
    }

    function renderProbenbloecke() {
      const szenen = state.szenen || [];
      if (szenen.length === 0) return uebersichtEmpty('Noch keine Szenen vorhanden.');
      const bloecke = computeSzenenbloecke();
      const personName = id => (state.ensemble.find(p => p.id === id) || {}).name || '?';
      const mehrfach = bloecke.filter(b => b.scenes.length > 1).length;

      const bloeckeHtml = bloecke.map((b, i) => {
        const leer = b.figIds.length === 0 && b.personIds.length === 0;
        const wer = b.personIds.length
          ? b.personIds.map(pid => figChip({ name: personName(pid), kuerzel: personName(pid) }, 'bg-indigo-100 text-indigo-800')).join(' ')
          : b.figIds.map(fid => figChip(state.figuren.find(x => x.id === fid) || {}, 'bg-gray-100 text-gray-700')).join(' ');
        const szenenHtml = b.scenes.map(s =>
          `<span class="inline-block bg-white border border-gray-200 rounded px-2 py-0.5 text-xs mr-1 mb-1">${escapeHtml(s.nummer || '')} ${escapeHtml(s.titel || '')}</span>`
        ).join('');
        return `
          <div class="card p-4 mb-3">
            <div class="flex justify-between items-center mb-2">
              <h3 class="text-sm font-semibold">Block ${i + 1} <span class="text-gray-400 font-normal">· ${b.scenes.length} ${b.scenes.length === 1 ? 'Szene' : 'Szenen'}</span></h3>
            </div>
            <div class="mb-2">${leer ? '<span class="text-xs text-gray-400">Keine Figuren zugeordnet</span>' : wer}</div>
            <div>${szenenHtml}</div>
          </div>`;
      }).join('');

      const casting = bloecke.length > 0 && bloecke[0].hatCasting;
      return `
        <div>
          <p class="text-xs text-gray-400 mb-3">Szenen mit exakt gleicher Besetzung – gruppiert ${casting ? 'nach Schauspieler:innen (Doppelbesetzung berücksichtigt)' : 'nach Rollen (im Ensemble ist noch keine Besetzung eingetragen)'}. Blöcke mit mehreren Szenen lassen sich am Stück proben. ${mehrfach} von ${bloecke.length} ${bloecke.length === 1 ? 'Block bündelt' : 'Blöcken bündeln'} mehr als eine Szene. Diese Blöcke gehen auch an Propla.</p>
          ${bloeckeHtml}
        </div>`;
    }

    function renderStrichverwaltung() {
      const szenen = state.szenen || [];
      let total = 0, totalChars = 0;
      const bloecke = szenen.map(s => {
        const striche = getStricheInSzene(s.id);
        if (striche.length === 0) return '';
        total += striche.length;
        striche.forEach(x => { totalChars += x.text.length; });
        const items = striche.map(x => `
          <div class="flex items-start gap-3 py-1.5 border-b border-gray-50 last:border-0">
            <span class="flex-1 text-sm text-gray-400 line-through">${escapeHtml(x.text) || '<span class="text-gray-300">(leer)</span>'}</span>
            <button onclick="strichAufheben('${s.id}', ${x.index})" class="text-xs text-blue-600 hover:text-blue-800 flex-shrink-0">aufheben</button>
          </div>`).join('');
        return `
          <div class="card p-4 mb-3">
            <div class="flex justify-between items-center mb-2">
              <h3 class="text-sm font-semibold">${escapeHtml(s.nummer || '')} ${escapeHtml(s.titel || '')}
                <span class="text-gray-400 font-normal">· ${striche.length} ${striche.length === 1 ? 'Strich' : 'Striche'}</span>
              </h3>
              <button onclick="alleStricheAufheben('${s.id}')" class="text-xs text-gray-500 hover:text-red-600">alle aufheben</button>
            </div>
            ${items}
          </div>`;
      }).join('');

      if (total === 0) {
        return uebersichtEmpty('In diesem Stück sind noch keine Striche gesetzt. Streichen kannst du im Textbuch über die Formatierung.');
      }
      return `
        <div>
          <div class="card p-4 mb-4 flex items-center gap-8">
            <div><div class="text-2xl font-bold text-gray-700">${total}</div><div class="text-xs text-gray-500">Striche gesamt</div></div>
            <div><div class="text-2xl font-bold text-gray-700">${totalChars}</div><div class="text-xs text-gray-500">gestrichene Zeichen</div></div>
          </div>
          ${bloecke}
          <p class="text-xs text-gray-400 mt-2">«aufheben» macht einen Strich rückgängig – der Text wird wieder normal gespielt. Das ändert das Textbuch.</p>
        </div>`;
    }

    // ============================================
    // TITELBLATT VIEW (wie gedrucktes Regiebuch)
    // ============================================
